<page-area>
  <template slot="breadcrumbs-area">
     <h3 class="kt-subheader__title">{{$t('navigation.fee')}}</h3>
     <span class="kt-subheader__separator kt-hidden"></span>
     <div class="kt-subheader__breadcrumbs">
        <a href="#" class="kt-subheader__breadcrumbs-home">
           <i class="flaticon2-shelter"></i>
        </a>
        <span class="kt-subheader__breadcrumbs-separator"></span>
        <a href="" class="kt-subheader__breadcrumbs-link">
           {{$t('navigation.creditNotes')}}
        </a>
     </div>
  </template>


  <portlet-area action="1" :title="$t('navigation.creditNotes')">
     <template slot="portlet-body" >

        <div class="row">

           <div class="col-md-3">
              <div class="form-group">
                <label for="session-id">Session</label>
                <select-ex id="session-id" :options="termModel" keyValue="sessionId" displayValue="fullName"
                  v-model="sessionId"  @input="loadCity" ></select-ex>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label class="form-control-label">{{$t('modal.reports.feeReports.city')}}</label>
                <select-ex :options="cityList" keyValue="cityId" displayValue="fullName" v-model="cityId"
                @input="loadSubCity">
                </select-ex>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label class="form-control-label">{{$t('modal.reports.feeReports.subCity')}}</label>
                <select-ex :options="subCityList" keyValue="subCityId" displayValue="subCityName" v-model="subCityId"
                @input="loadClass">
                </select-ex>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                 <label class="form-control-label">{{$t('modal.reports.feeReports.class')}}</label>
                 <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"
                 @input="loadCollector" >
                 </select-ex>
                </select-ex>
              </div>
            </div>

            <div class="col-md-3 form-group">
              <label class="form-control-label">{{$t('modal.reports.feeReports.collector')}}
              </label>
              <select-ex :options="CollectorList" keyValue="collectorId" displayValue="description"
              v-model="collectorId" disabled>
          </select-ex>
            </div>
           </div>
            
           <div class="row">
             <div class="col-md-10 form-group"></div>
             <div class="col-md-2 form-group">
             <button @click="Getdata()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
               <i class="la la-refresh"></i> {{$t('button.reload')}}
               </button>
               <button class="btn btn-primary btn-light btn-hover btn-sm" :disabled="!isDisabled" @click="Savedata()" >Save</button>
             </div>
             </div>

           <div style="overflow-x: none !important">
             
          <div class="row mt-3" v-if="data.length>0">
           <div class="col-md-12">
             <div class="fixed-header-table">
               <table class="table table-striped table-hover">
                 <thead>
                   <tr>
                     <th>Refference No.</th>
                     <th>Student's Name</th>
                     <th>Challan No.</th>
                     <th>Installment No.</th>
                     <th>Amount</th>
                     <th>Refund Date</th>
                     <th><label class="kt-checkbox kt-checkbox--brand">
                         <input type="checkbox"  @change="updall" v-model="chkall">
                         <span></span>
                       </label></th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr  v-for="item in data">
                     <td class="v-align-middle"> {{item.refferenceNo}} </td>
                     <td class="v-align-middle"> {{item.studentName}} </td>
                     <td class="v-align-middle"> {{item.challanNo}} </td>
                     <td class="v-align-middle"> {{item.installmentNo}} </td>
                     <td class="v-align-middle"> {{item.amount}} </td>
                     <td class="v-align-middle">
                       <input type="date" placeholder="Select Date" class="mx-datepicker input-28 "  :not-after="dueDate" id="change-width"
                 v-model="item.paidDate" format="DD/MM/YYYY" lang="en" @change="selectDate(item.paidDate)">
                     </td>
                     <td class="v-align-middle">
                       <label class="kt-checkbox kt-checkbox--brand">
                         <input type="checkbox" :disabled="item.paidDate==null"  v-model="item.isChecked" @change="updatechek()">
                         <span></span>
                       </label>
                       <!-- <div class="custom-control custom-checkbox">
                     <input v-model="item.isSelected" type="checkbox" class="custom-control-input" :id="item.rollNo">
                     <label class="custom-control-label" :for="item.rollNo"></label>
                   </div> -->
                     </td>
                   </tr>
                 </tbody>
               </table>
             </div>
           </div>
         </div>
           <!-- <grid :data="data" :columns="columns" pre="modal.studentcreditnotes."  >
              <template slot="action-area">
                 <button @click="Getdata()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
                 <i class="la la-refresh"></i> {{$t('button.reload')}}
                 </button>
                 <button class="btn btn-primary btn-light btn-hover btn-sm" :disabled="!isDisabled" @click="Savedata()" >Save</button>
               </template>
              <template slot="refundDate" slot-scope="item">
                 <!-- <date-picker  placeholder="Select Date" class="mx-5 datepicker   input-28 h-500"  :not-after="dueDate" id="change-width"    
                 v-model="item.row.paidDate" format="DD/MM/YYYY" lang="en"></date-picker> -->
                 <!-- <input type="date" placeholder="Select Date" class="mx-datepicker input-28 "  :not-after="dueDate" id="change-width"
                 v-model="item.row.paidDate" format="DD/MM/YYYY" lang="en">
               </template>
               <template slot="isSelected-header" slot-scope="item">
                 <label class="kt-checkbox kt-checkbox--brand mb-0">All <input type="checkbox"   @change="updall" v-model="chkall" class="mb-0">
                   <span></span>
                 </label>
               </template>
               <template slot="isSelected" slot-scope="item">
                 <label class="kt-checkbox kt-checkbox--brand">
                   <input type="checkbox" :disabled="item.paidDate==null" v-model="item.isChecked" @change="updatechek()">
                   <span></span>
                 </label>
                 <!-- <input type="checkbox" v-model="item.row.isChecked"> -->
               <!-- </template>
            </grid> --> 
           </div>
     </template>
  </portlet-area>
</page-area>
