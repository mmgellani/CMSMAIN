<modal name="report-viewer-eng" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :adaptive="false" transition="bounce" width="90%" top="10" height="90%" @opened="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">Reports</h3>
                <p> Preview </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="close()">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div id="viewerContent" style="width:100%;height:100%;"></div>
        </div>
    </div>
    <div class="modal-footer" style="display:none">
    </div>
</modal>
