<div class="limiter">
  <status-bar :clear-after="5" locale-prefix="dict"></status-bar>
  <div class="container-login100">
    <div class="wrap-login100 p-t-190 p-b-30">
      <form class="login100-form validate-form">
        <div class="login100-form-avatar">
          <img src="~assets/images/logo.png" alt="AVATAR">
        </div>

        <span class="login100-form-title p-t-20 p-b-45">
          <span class="light">EMS</span> <strong>360</strong>
        </span>

        <div class="wrap-input100 validate-input m-b-10" data-validate="Username is required">
          <input class="input100" type="text" name="username" :placeholder="$t('login.placeholder.email')"
            v-model.trim="username">
          <span class="focus-input100"></span>
          <span class="symbol-input100">
            <i class="fa fa-user"></i>
          </span>
        </div>

        <div class="wrap-input100 validate-input m-b-10" data-validate="Password is required">
          <input class="input100" type="password" name="pass" :placeholder="$t('login.placeholder.password')"
            v-model.trim="password">
          <span class="focus-input100"></span>
          <span class="symbol-input100">
            <i class="fa fa-lock"></i>
          </span>
        </div>

        <div class="container-login100-form-btn p-t-10">
          <button class="login100-form-btn" @click.prevent="login()">
            Login
          </button>

          <button v-for="(provider,index) in externalProviders" class="btn login-btn mt-4"
            @click.prevent="loginExternal(provider.providerId)">
            <i class="fa fa-lg" v-bind:class="[externalProviders[index].iconClass]"></i>
            {{$t(provider.localeKeys.name)}}
          </button>
        </div>

        <div class="text-center w-full p-t-25 p-b-230">
          <a href="#" class="txt1">
            Forgot Username / Password?
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
