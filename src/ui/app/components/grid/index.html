<div class="row">
    <div class="col-md-3">
        <div class="form-group ">
            <div class="kt-input-icon kt-input-icon--left" v-if="data.length">
                <input type="text" id="grid_search" ref="grid_search" class="form-control"
                    v-model="searchQuery" placeholder="Search...">
                <span class="kt-input-icon__icon kt-input-icon__icon--left">
                    <span><i class="la la-search"></i></span>
                </span>
            </div>
        </div>
    </div>
    <div class="col-md-6 offset-md-3 text-right">
        <slot name="action-area"></slot>
    </div>

    <template v-if="data">
        <template v-if="data.length > 0">
            <div class="col-md-12">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Sr No.</th>
                                <th v-for="key in columns" :width="key.width">
                                    <template v-if="typeof $scopedSlots[key.key + '-header'] !== 'undefined'"
                                        class="align-middle">
                                        <slot :name="key.key + '-header'" :field="key.key"></slot>
                                    </template>
                                    <template v-else class="align-middle">
                                        <template v-if='key.sort' class="align-middle">
                                            {{ $t(pre + 'grid.' + key.key) }}
                                            <span class="fa fa-sort" @click="sortBy(key.key)"></span>
                                        </template>
                                        <template v-else class="align-middle">
                                            {{ $t(pre + 'grid.' + key.key) }}
                                        </template>
                                    </template>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(item, index) in dataPerPage">
                                <td class="align-middle"> {{ serialNumber(index) }} </td>
                                <template v-for="field in columns">
                                    <td v-if="typeof $scopedSlots[field.key] !== 'undefined'" class="align-middle">
                                        <slot :name="field.key" :field="field.key" :row="item"></slot>
                                    </td>
                                    <td v-else class="align-middle">
                                        <span v-html="item[field.key]"></span>
                                    </td>
                                </template>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-4 mt-2">
                <div class="kt-pagination  kt-pagination--brand" v-if="data.length > rowsPerPage">
                    <ul class="kt-pagination__links">
                        <li class="kt-pagination__link--first" title="First">
                            <a href="#"><i class="fa fa-angle-double-left kt-font-brand"></i></a>
                        </li>
                        <li class="kt-pagination__link--next" @click.prevent="movePages(-1)" title="Previous">
                            <a href="#"><i class="fa fa-angle-left kt-font-brand"></i></a>
                        </li>
                        <li class="kt-pagination__link--active">
                            <a href="#">
                                {{startRow / rowsPerPage + 1}} / {{Math.ceil(filteredData.length / rowsPerPage)}}
                            </a>
                        </li>
                        <li class="kt-pagination__link--prev" @click.prevent="movePages(1)" title="Next">
                            <a href="#"><i class="fa fa-angle-right kt-font-brand"></i></a>
                        </li>
                        <li class="kt-pagination__link--last" title="Last">
                            <a href="#"><i class="fa fa-angle-double-right kt-font-brand"></i></a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-md-4 text-center mt-2">
                Showing <strong>{{startRow + 1}} to {{Math.ceil(data.length)< 10 ? Math.ceil(data.length) : startRow + rowsPerPage}}</strong> of
                {{Math.ceil(data.length)}}</span>{{Math.ceil(data.length)==1 ? ' entry' : ' entries'}}
            </div>
            <div class="col-md-1 offset-md-3 mt-2">
                <select class="form-control form-control-sm" v-model="rowsPerPage">
                    <option :value="item" v-for="item in pageSizeMenu">{{item}}</option>
                </select>
            </div>
        </template>
        <template v-else>
            <div class="row">
                <div class="col-md-12 text-center">
                    There is no record.
                </div>
            </div>
        </template>
    </template>
</div>
