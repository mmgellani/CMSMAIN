<div class="kt-content  kt-grid__item kt-grid__item--fluid kt-grid kt-grid--hor" id="kt_content"
  style=" padding-top:0px !important; padding-bottom:25px !important; position: relative !important;">
  <div class="kt-container  kt-container--fluid  kt-grid__item kt-grid__item--fluid">
    <ul class="kt-sticky-toolbar" style="margin-top: 30px; height: 100px; top:50% !important;"
      v-if="roleDashboardList.length>2">
      <li class="kt-sticky-toolbar__item kt-sticky-toolbar__item--info" title="customize">
        <a @click.prevent="openDashboardWidget()" class="customize-btn">CUSTOMIZE</a>
      </li>
    </ul>

    <div class="row">
      <div class="col-md-12">
        <h2 style="color:#52565e;font-size:1.5rem;font-weight:400;">Dashboard</h2>
      </div>
    </div>
    <div class="row mt-3" v-if="dashboardwidget">
      <div class="col-md-12">
        <collapsible-widget>

          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px"
              @click="loadcheck('dashboardwidget')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="content">
            <div class="row mt-3">
              <div class="col-md-3">
                <div class="card-box" style="height: 140px; background: rgb(121, 115, 116); color:#fff;">
                  <div class="inner">
                    <i class="la la-home" style="font-size: 17px;"> </i>
                    <h6 class="mb-0 mt-3">Welcome</h6>
                    <h5 class="mb-0" style="font-weight: 500;">{{displayName}}!</h5>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card-box" style="background: #3a4a7d; height: 140px;">
                  <div class="inner">
                    <h5 class="kt-portlet__head-title">
                      <i class="la la-clock-o" style="font-size: 17px;"></i> Current Time
                    </h5>
                    <span class="clock">
                      <div class="hours">
                        <small>{{ curDateTime.hours }}</small>
                        <small>Hours</small>
                      </div>
                      <span class="colon">:</span>
                      <div class="min">
                        <small>{{ curDateTime.minutes }}</small>
                        <small>Minutes</small>
                      </div>
                      <span class="colon">:</span>
                      <div class="sec">
                        <small>{{ curDateTime.seconds }}</small>
                        <small>seconds</small>
                      </div>
                    </span>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card-box" style="background: #ff8590; height: 140px;">
                  <div class="inner">
                    <h5 class="kt-portlet__head-title">
                      <i class="la la-calendar" style="font-size: 17px;"></i> Current Date
                    </h5>
                    <span class="clock bg-color">
                      <div class="hours bg-color">
                        <small>{{ curDateTime.day }}</small>
                        <small>day</small>
                      </div>
                      <span class="colon">:</span>
                      <div class="min bg-color">
                        <small>{{ curDateTime.month }}</small>
                        <small>month</small>
                      </div>
                      <span class="colon">:</span>
                      <div class="sec bg-color" style="margin-right:25px;">
                        <small>{{ curDateTime.year }}</small>
                        <small>year</small>
                      </div>
                    </span>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card-box" style="background: #6689f2; height: 140px;">
                  <div class="inner">
                    <h5 class="kt-portlet__head-title">
                      <i class="fa fa-thermometer-half" style="font-size: 17px;"></i> Today's Weather
                    </h5>
                    <div class="weather-div mt-2">
                      <img class="icon-img mt-1" :src="icon">
                      <h2 class="mt-3">{{curWeather.temp}}</h2> &nbsp;<span class="mt-4">°C</span>
                      <p class="mt-4 ml-2" style="font-size: 12px; font-weight: 800;">{{curWeather.description}}</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </collapsible-widget>
      </div>

    </div>
    <div class="row mt-2" v-if="todolist">
      <div class="col-md-12">
        <collapsible-widget>
          <template slot="title">
            Todo List
          </template>
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('todolist')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>

          <template slot="content">
            <div class="row">
              <div class="col-md-12 text-right">
                <button class="btn btn-outline-primary btn-icon btn-sm btn-circle" title="Add task"
                  @click="insertModel"><i class="la la-plus"></i></button>
              </div>
            </div>
            <div class="row">
              <div class="col-md-12">
                <div class="fixed-header-table">
                  <table class="table table-striped table-hover">
                    <thead>
                      <tr>
                        <th>Status</th>
                        <th>Activity</th>
                        <th>Date</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody v-if="toDoList.length>0">
                      <tr v-for="item in toDoList">
                        <td class="align-middle">


                          <div class="check-box check-box-completed">
                            <input v-model="item.taskStatus" type="radio" :id="item.todoListId" :name="item.todoListId"
                              value="true" v-on:change="updateModel(item)">
                            <label :for="item.todoListId">Completed</label>
                          </div>
                          <!-- <div class="check-box check-box-pending">
                            <input v-model="item.taskStatus"  type="radio" id="Pending" :name="item.todoListId"
                              value="false">
                            <label for="Pending" class="pr-4">Pending</label>
                          </div> -->
                        </td>
                        <td class="align-middle">{{item.title}}</td>
                        <td class="align-middle"> <span v-html="formatDate(item.dated)"></span></td>
                        <td class="align-middle">
                          <button class="btn btn-outline-primary btn-icon btn-sm btn-circle" title="Edit"
                            @click="editModel(item)"><i class="la la-edit"></i></button>
                          <button class="btn btn-outline-danger btn-icon btn-sm btn-circle" title="Delete"
                            @click="deleteModel(item)"><i class="la la-trash"></i></button>
                          <button class="btn btn-outline-success btn-icon btn-sm btn-circle" title="Done"
                            @click="updateModel(item)"><i class="la la-check"></i></button>
                        </td>
                      </tr>
                    </tbody>
                    <div v-else class="mt-4">
                      There is no task.
                    </div>
                  </table>
                </div>
              </div>
            </div>
          </template>
        </collapsible-widget>
      </div>

    </div>

    <div class="row mt-3" v-if="admissionCountWidget">
      <div class="col-md-12">
        <collapsible-widget>
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px"
              @click="loadcheck('admissionCountWidget')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="toolbar">
            <div class="d-inline mr-2">
              <button class="btn btn-icon btn-sm btn-circle dashboard-btn" title="Add task"
                @click="filterModel('admissionCountWidget')"><i class="fa fa-cog"></i></button>
            </div>
          </template>
          <template slot="title">
            Admission Count
          </template>
          <template slot="content">
            <div class="row">
              <div class="col-md-3">
                <div class="card-box" style="background: #3a4a7d; height: 140px;">
                  <!-- <button class="btn btn-icon btn-sm btn-circle dashboard-btn" title="Add task"
                    @click="filterModel('admissionCountWidget')"><i class="fa fa-cog"></i></button> -->
                  <div class="inner">
                    <h5 class="kt-portlet__head-title">
                      <i class="fa fa-area-chart" style="font-size: 14px;"></i> Admission Count
                    </h5>
                    <span class="clock">
                      <div v-for="item in datas" class="hours">
                        <h5>{{ item.admissionCountWiz }}</h5>
                      </div>
                    </span>
                  </div>
                </div>
              </div>
              <div class="col-md-3">
                <div class="card-box" style="background: #3a4a7d; height: 140px;">
                  <div class="inner">
                    <h5 class="kt-portlet__head-title">
                      <i class="fa fa-area-chart" style="font-size: 14px;"></i> Fee Paid Count
                    </h5>
                    <span class="clock">
                      <div v-for="item in admissionFeeCountList" class="hours">
                        <h5>{{ item.admissionCountFeeWise }}</h5>
                      </div>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </collapsible-widget>
      </div>

    </div>

    <div class="row mt-5" v-if="roleDashboardList.length < 3">
      <div class="col-md-12 text-center">
        <a id="customize-button" @click.prevent="openDashboardWidget()"
          class="btn btn-hover btn-sm btn-primary btn-font">CUSTOMIZE</a>
      </div>
    </div>
    <div class="row  mt-4">
      <div class="col-md-6" v-if="heldVsUnheld">
        <collapsible-widget>
          <template slot="title">
            Held Vs Un-Held
          </template>
          
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('heldVsUnheld')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="content">
            <heldVsUnheld></heldVsUnheld>
          </template>
        </collapsible-widget>

      </div>
      <div class="col-md-6" v-if="approvedVsUnapproved">
        <collapsible-widget>
          <template slot="title">
            Approved Vs Un-Approved
          </template>
          
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('approvedVsUnapproved')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>

          <template slot="content">
            <approvedVsUnapproved></approvedVsUnapproved>
          </template>
        </collapsible-widget>

      </div>
      <div class="col-md-12 mb-2" v-if="formcollectionsingle">
        <collapsible-widget>
          <template slot="title">
            Form Collection-Fee Paid-Enrolled
          </template>
          
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('form-collection-single')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="content">
            <form-collection-single></form-collection-single>
          </template>
        </collapsible-widget>
      </div>

      <div class="col-md-12" v-if="concessionGraph">
        <collapsible-widget>
          <template slot="title">
            Concession
          </template>
          
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('concessionGraph')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="content">
            <concessionGraph></concessionGraph>
          </template>
        </collapsible-widget>

      </div>

      <div class="col-md-12" v-if="revenueGraph">
        <collapsible-widget>
          <template slot="title">
            Revenue/Student
          </template>
          <template slot="cross">
            <div class="delete mr-3 d-inline" title="Delete" style="margin-top:14px" @click="loadcheck('revenueGraph')">
              <i id="up" class="la la-trash"></i>
            </div>
          </template>
          <template slot="content">
            <revenueGraph></revenueGraph>
          </template>
        </collapsible-widget>
      </div>
    </div>
  </div>
  <toDoList-add-edit-model v-on:submit="loadToDoList"></toDoList-add-edit-model>
  <filter-model v-on:submit="loadAdmissionCount(), loadAdmissionCountFeeWise()"></filter-model>
</div>
