<widget-box class="col-lg-4 col-md-6 col-12 col-sm-6">
    <template slot="title">
        <!-- <div class="row"> -->
        <!-- <div class="col=md-3"> -->
        <div @click="refreshData" class="justify-content-between" style="display: flex">

            <span class="circle bg-warning text-warning  mr-xs" style="font-size: 4px; margin-top:7px; ">.</span>

            <div style="flex-grow: 1">Admission</div>
        </div>
        <br>
        <!-- </div> -->
        <!-- <div class="col-md-8"> -->
        <div class="row">
            <div class="col-md-5">
                <div class="form-group">
                    <select :disabled="!check" @change="loadSubCity" class="form-control form-control-sm" placeholder="City" v-model="cityId" required>
                        <option :key="index" :value="model.cityId" v-for="(model,index) in cityList">
                            {{model.fullName}}
                        </option>
                    </select>
                    <label>City</label>
                </div>



                
            </div>


            <div class="col-md-5">
                <div class="form-group">
                    <select :disabled="!check" @change="cityWiseData" class="form-control form-control-sm" placeholder="Sub City" v-model="subCityId" required>
                        <option :key="index" :value="model.subCityId" v-for="(model,index) in subCityList">
                            {{model.name}}
                        </option>
                    </select>
                    <label>Sub City</label>
                </div>
            </div>
            <div class="col-md-2">
                <input @change="refreshData" type="checkbox" v-model="check" class="switch">
            </div>
        </div>
        <!-- </div> -->
        <!-- </div> -->
    </template>
    <template slot="content">

        <h4 class="fw-semi-bold ml-lg mb-lg">{{ admissionCount }}</h4>
        <i class="la la-arrow-right text-success rotate-315"></i>
        <p class="text-muted mb-0 mr"><small>Collection</small></p>

        <div class="d-flex border-top" style="margin-bottom: 0;">

            <div class="w-50 border-right p-3 px-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h6>{{paidChallanCount}}</h6>
                    <i class="la la-arrow-right text-success rotate-315"></i>
                </div>
                <p class="text-muted mb-0 mr"><small>Confirmed</small></p>
            </div>
            <div class="w-50 p-3 px-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h6>{{enrollmentCount}}</h6>
                    <i class="la la-arrow-right text-danger rotate-45"></i>
                </div>
                <p class="text-muted mb-0 mr"><small>Enrolled</small></p>
            </div>
        </div>
    </template>
</widget-box>
