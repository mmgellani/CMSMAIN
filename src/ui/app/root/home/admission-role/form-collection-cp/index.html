<widget-box class="col-lg-4 col-md-6 col-12 col-sm-6" >
        <template slot="title">Comparison</template>
        <template slot="content">
          <p class="text-muted d-flex flex-wrap justify-content-between">
            <small class="mr-lg d-flex align-items-center" data-toggle="tooltip" data-placement="top" title="Year 2019">
              <span class="circle bg-success text-success mr-xs" style="font-size: 4px; background-color:#66C2A5">.</span>
              This Period
            </small>
            <small class="mr-lg d-flex align-items-center" data-toggle="tooltip" data-placement="top" title="Year 2018">
              <span class="circle bg-warning text-warning mr-xs"
                style="font-size: 4px; background-color: #E1917A">.</span>
              Last Period
            </small>
          </p>
          <h6>Actual</h6>
          <a href="#" data-toggle="tooltip" data-placement="top" :title="this.feeCount">
            <div class="progress progress-xs mb-sm">
              <div class="progress-bar bg-success" role="progressbar" :style="{width:this.percentageCountA+'%'}"
                aria-valuenow=feeCount aria-valuemin="0" aria-valuemax="19104"> </div>
            </div>
          </a>
          <a href="#" data-toggle="tooltip" data-placement="top" :title="this.lastPeriodActual">
            <div class="progress progress-xs">
              <div class="progress-bar bg-warning" role="progressbar" style="width: 100%;" aria-valuenow="19104"
                aria-valuemin="0" aria-valuemax="19104"></div>
            </div>
          </a>
          <h6 class="mt-sm">Budgeted</h6>
          <a href="#" data-toggle="tooltip" data-placement="top" :title="this.feeCount">
            <div class="progress progress-xs mb-sm">
              <div class="progress-bar bg-success" role="progressbar" :style="{width:this.percentageCountB+'%'}"
                aria-valuenow=feeCount aria-valuemin="0" aria-valuemax="30000"></div>
            </div>
          </a>
          <a href="#" data-toggle="tooltip" data-placement="top" :title="this.lastPeriodBudgeted">
            <div class="progress progress-xs">
              <div class="progress-bar bg-warning" role="progressbar" style="width: 100%;" aria-valuenow="21000"
                aria-valuemin="0" aria-valuemax="21000"></div>
            </div>
          </a>
        </template>
      </widget-box>
