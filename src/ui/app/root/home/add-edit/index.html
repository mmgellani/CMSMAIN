<modal name="toDoList-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="false" transition="bounce" width="40%" top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('modal.todoList.todoList')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">{{$t('modal.todoList.gird.status')}}</label>
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{data.taskStatus ? 'Completed' : 'Pending'}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" v-model="data.taskStatus">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row mt-2">

                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">Title <span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.title.$error}" v-model.trim="data.title"
                            @input="$v.data.title.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.title.$error">
                            <span v-if="!$v.data.title.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.todoList.date')}}
                            <span style="color:red">
                                *</span></label>
                        <date-picker class="input-28" id="change-width" ref="changeWidth" format="DD/MM/YYYY" lang="en"
                            v-model="data.dated" :not-before="currDate">
                        </date-picker>
                    </div>
                </div>


            </div>
            <div class="row">
                <div class="col-md-12">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.todoList.description')}}<span style="color:red">
                                *</span></label>
                        <textarea rows="4" cols="50" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.description.$error}" v-model.trim="data.description"
                            @input="$v.data.description.$touch()">

                        </textarea>
                        <div class="invalid-feedback" v-show="$v.data.description.$error">
                            <span v-if="!$v.data.description.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
