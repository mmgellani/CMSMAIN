<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.examination')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.SeatingPlanStudent')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.SeatingPlanStudent')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSession')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId"
              @input="loadCityCampus">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupCampus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" groupBy="cityName"
              v-model="campusId" @input="loadProgramsOfCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupProgram')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
              groupBy="programName" v-model="programDetailId" @input="loadClass"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupClass')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"
              @input="loadSections"></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSection')}}</label>
            <select-ex :options="courseList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId" @input="refreshData"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.seatingPlanDateSheetList')}}</label>
            <select-ex :options="dateSheetList" keyValue="dateSheetId" displayValue="examName" v-model="datesheetId">
            </select-ex>
          </div>
        </div>
      </div>
      <grid :data="data" :columns="columns" pre="modal.seatingSeatingPlan.">
        <template slot="action-area">
          <button data-toggle="modal" data-target="#myModal" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i> {{$t('button.save')}}
          </button>
          <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">
            {{$t('modal.seatingSeatingPlan.grid.action')}}<input class="mb-0" type="checkbox" @change="checkAll()"
              v-model="isCheckedAll">
            <span></span>
          </label>
        </template>
        <template slot="action" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand">
            <input type="checkbox" v-model="item.row.isSelected">
            <span></span>
          </label>
        </template>
      </grid>
    </template>
  </portlet-area>
  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.SeatingPlanStudent')}}</h3>
            <p>Confirmation</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure that you want to Save?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            :disabled="data.length==0" @click="insertModel">
            <i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
</page-area>
