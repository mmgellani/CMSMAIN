<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.examination')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.seatingPlanDateSheetDetailList')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.seatingPlanDateSheetDetailList')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.seatingPlanDateSheetDetailList.session')}}</label>
            <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model.trim="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.seatingPlanDateSheetDetailList.campus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" groupBy="cityName"
              v-model.trim="campusId" @input="loadProgramsOfCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.seatingPlanDateSheetDetailList.program')}}</label>
            <select-ex :options="campusProgramLinkList" groupBy="programName" key-value="campusProgramId"
              display-value="description" v-model.trim="campusProgramId" @input="loadDateSheet"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.seatingPlanDateSheetDetailList.grid.examName')}}</label>
            <select-ex :options="dateSheetList" key-value="dateSheetId"
              display-value="examName" v-model.trim="dateSheetId" @input="refreshData"></select-ex>
          </div>
        </div>
      </div>
      <grid :data="datas" :columns="columns" pre="modal.seatingPlanDateSheetDetailList.">
        <template slot="action-area">
          <button v-if="canAdd" @click="insertModel" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>
          <button @click="deleteModel(item.row)" v-if="canDelete" title="Delete" type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle">
            <i class="la la-trash"></i>
          </button>
        </template>
        <template slot="statusId" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1">Active</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>InActive</span>
        </template>
        <template slot="dateSheetDate" slot-scope="item">
          {{item.row.dateSheetDate|formatDMY}}
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="refreshData"></add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
</page-area>
