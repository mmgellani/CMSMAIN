<modal name="datesheetdetail-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="false" transition="bounce" top="10" width="40%" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.seatingPlanDateSheetDetailList')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.seatingPlanDateSheetDetailList.dateSheetDate')}}<span style="color:red">
                                *</span></label>
                        <date-picker class="input-28" id="change-width" ref="changeWidth"
                            v-model.trim="data.dateSheetDate" format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"
                            @input="$v.data.dateSheetDate.$touch()">
                        </date-picker>
                        <div class="invalid-feedback" v-show="$v.data.dateSheetDate.$error">
                            <span v-if="!$v.data.dateSheetDate.required">{{$t('validation.required')}}</span>
                        </div>

                        <!-- <input type="date" v-model="data.dateSheetDate" class="form-control" /> -->
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.seatingPlanDateSheetDetailList.fromTime')}}<span style="color:red">
                                *</span></label>
                        <input class="form-control form-control-sm" type="time"
                            :class="{'is-invalid': $v.data.fromTime.$error}" v-model.trim="data.fromTime"
                            @input="$v.data.fromTime.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fromTime.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <!-- <input class="form-control" type="time" v-model="data.toTime">
                        <input class="form-control" type="time" v-model="data.fromTime"> -->
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.seatingPlanDateSheetDetailList.toTime')}}<span style="color:red">
                                *</span></label>
                        <input class="form-control form-control-sm" type="time"
                            :class="{'is-invalid': $v.data.toTime.$error}" v-model.trim="data.toTime"
                            @input="$v.data.toTime.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.toTime.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
