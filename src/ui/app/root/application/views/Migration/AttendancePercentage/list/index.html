<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.ssetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.migrate')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.attendancePercentage')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.attendancePercentage')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.session')}}</label>
            <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.campus')}}</label>
            <select-ex @input="loadProgramsOfCampus" :options="campusCityList" keyValue="campusId"
              displayValue="campusName" v-model="campusId" groupBy="cityName">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.program')}}</label>
            <select-ex @input="loadClass" :options="campusProgramLinkList" keyValue="programDetailId"
              displayValue="description" v-model="programDetailId" groupBy="programName">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.class')}}</label>
            <select-ex @input="loadSections" :options="classList" keyValue="classId" displayValue="fullName"
              v-model="classId">
            </select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.fromDate')}}</label>
            <date-picker class="input-28" id="change-width" ref="changeWidth" v-model.trim="fromdatestring"
              format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.toDate')}}</label>
            <date-picker class="input-28" id="change-width" ref="changeWidth" v-model.trim="todatestring"
              format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.migrateAttendancePercentage.section')}}</label>
            <select-ex @input="refreshData" :options="courseList" keyValue="sectionCourseLinkId"
              displayValue="sectionName" v-model="sectionCourseLinkId">
            </select-ex>
          </div>
        </div>
      </div>

            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>

  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.attendancePercentage')}}</h3>
            <p>Confirmation</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to Insert the Record?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-hover btn-sm btn-primary" data-dismiss="modal" type="butto" @click="insertModel">
            <i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
