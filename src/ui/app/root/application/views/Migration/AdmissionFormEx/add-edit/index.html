                <div class="col-md-3">
                    <div class="form-group">
                        <label>{{$t('modal.migrateAdmission.boardRollNo')}}<span style="color:red"> *</span></label>
                        <input class="form-control form-control-sm" v-model="model.rollNo" required v-uppercase
                            v-restrict.number maxlength="10"
                            :disabled="data.admissionTypeId.length == 0 || degreeStatus==true" />
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label>{{$t('modal.migrateAdmission.boardName')}}<span style="color:red">
                                *</span></label>
                        <select-ex :options="BoardList" keyValue="fullName" displayValue="fullName"
                            v-model="model.board" required
                            :disabled="data.admissionTypeId.length == 0 || degreeStatus==true">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label>{{$t('modal.migrateAdmission.passingYear')}}<span style="color:red">
                                *</span></label>
                        <the-mask :mask="'####'" class="form-control form-control-sm"
                            v-model.trim="studentModel.parentCNIC" v-model="model.year" v-restrict.number maxlength='4'
                            :disabled="data.admissionTypeId.length == 0 || degreeStatus==true" />
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label>{{$t('modal.migrateAdmission.obtainedMarks')}}<span style="color:red">
                                *</span></label>
                        <input class="form-control form-control-sm" v-model="model.obtainMarks" v-restrict.number
                            maxlength='4' :disabled="data.admissionTypeId.length == 0 || degreeStatus==true" />
                    </div>
                </div>

            </div>
            <div class="row" v-for="(model,index) in academicInfoList">
                <div class="col-md-3">
                    <div class="form-group">
                        <label>{{$t('modal.migrateAdmission.totalMarks')}}<span style="color:red">
                                *</span></label>
                        <select-ex :options="MarksList" keyValue="marks" displayValue="marks" v-model="model.totalMarks"
                            required :disabled="data.admissionTypeId.length == 0 || degreeStatus==true">
                        </select-ex>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i>{{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
