<page-area>

  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.ssetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.migrate')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.enrollmentBulkWithoutPaid')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.enrollmentBulkWithoutPaid')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label> {{$t('navigation.setupSession')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId"
              @input="loadCityCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label> {{$t('navigation.setupCampus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" v-model="campusId"
              groupBy="cityName" @input="loadProgramsOfCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label> {{$t('navigation.setupProgram')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="campusProgramId" displayValue="description"
              v-model="campusProgramId"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupClass')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classid"
              @input="loadSections"></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupGender')}}</label>
            <select-ex :options="genderModel" keyValue="genderId" displayValue="description" v-model="idGender">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupAdmissionType')}}</label>
            <select-ex :options="admissionTypeList" keyValue="admissionTypeId" displayValue="fullName"
              v-model="admissionTypeId"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.feeConcession')}}</label>
            <select-ex :options="concessionList" keyValue="scholarshipCriteriaId" displayValue="concession"
              v-model="scholarshipCriteriaId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSection')}}</label>
            <select-ex :options="sectionList" keyValue="sectionId" displayValue="sectionName" v-model="sectionId">
            </select-ex>
          </div>
        </div>
      </div>
      <grid :data="datas" :columns="columns" pre="modal.migrateHadafMigration.">
        <template slot="rollNo" slot-scope="item">
          <input @blur="enableCheckBox(item.row)" class="form-control form-control-sm" v-model="item.row.rollNo"
            type="text" placeholder="RollNo" />
          <div v-if="item.isDisabled" class="input-group-append">
            <span class="input-group-text" style="color:red;" id="basic-addon2">!</span>
          </div>
        </template>

        <template slot="IsSelected" slot-scope="item">
          <input type="checkbox" class="form-control form-control-sm" v-model="item.row.IsSelected" />
        </template>
      </grid>
    </template>
  </portlet-area>
</page-area>
