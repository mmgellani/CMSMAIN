 <page-area>
    <template slot="breadcrumbs-area">
        <h3 class="kt-subheader__title"> {{$t('navigation.fee')}}</h3>
        <span class="kt-subheader__separator kt-hidden"></span>
        <div class="kt-subheader__breadcrumbs">
            <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
            <span class="kt-subheader__breadcrumbs-separator"></span>
            <a href="" class="kt-subheader__breadcrumbs-link">
                {{$t('navigation.feeConfirmation')}} (Admin Rights) </a>
        </div>
    </template>

    <portlet-area action="1" :title="$t('navigation.feeConfirmation')">
        <template slot="portlet-body">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label> {{$t('modal.feeConfirmation.enterChallanNo')}}</label>
                        <input type="text" class="form-control" v-model.trim="data.filterString"
                            placeholder="Enter Here" v-on:keydown.enter="SearchFeeConfirmation"
                            :class="{'is-invalid': $v.data.filterString.$error}">
                        <div class="invalid-feedback" v-show="$v.data.filterString.$error">
                            <span v-if="!$v.data.filterString.required">Required Field</span>
                            <span v-if="!$v.data.filterString.minLength">Invalid Challan</span>
                            <span v-if="!$v.data.filterString.maxLength">Invalid Challan</span>
                        </div>
                    </div>
                </div>
            </div>
            <div v-if="StudentFeedata != null & !nodata">
                <div class="row">
                    <div class="col-md-8">
                        <h6 class="mb-3">{{$t('modal.feeConfirmation.information')}}</h6>
                        <div class="row">
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.reference')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                    color: black; font-size: 1rem;">
                                    {{RefrenceNo ? RefrenceNo : ''}}</span>
                            </div>
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.rollno')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                        color: black; font-size: 1rem;">
                                    {{accountNo ? accountNo : ''}}</span>
                            </div>
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.studentName')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                        color: black; font-size: 1rem;">
                                    {{Name ? Name : ''}}</span>
                            </div>
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.fatherName')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                    color: black; font-size: 1rem;">
                                    {{fatherName ? fatherName : ''}}</span>
                            </div>
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.program')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                    color: black; font-size: 1rem;">
                                    {{description ? description : ''}}-{{className ? className : ''}}
                                    ({{sectionName ? sectionName : ''}})</span>
                            </div>
                            <div class="col-md-4">
                                <label>{{$t('modal.feeConfirmation.campusName')}}</label>
                            </div>
                            <div class="col-md-8">
                                <span class="kt-badge kt-badge--inline kt-badge--pill" style="background: rgba(93, 120, 254, 0.29); 
                                    color: black; font-size: 1rem;">
                                    {{campusName ? campusName : ''}}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row mt-5">
                    <div class="col-md-4">
                        <h6 class="mb-3">{{$t('modal.feeConfirmation.feeStatus')}}</h6>
                    </div>
                </div>
                <div class="row" v-if="!isAlreadyPaid">
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="zone-id">{{$t('modal.feeConfirmation.changePaidDate')}}</label>
                            <!-- <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="paidDate"
                                :not-after="dueDate" format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker> -->
                            <date-picker v-model="paidDate" format="DD/MM/YYYY" lang="en" >
                            </date-picker>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="zone-id">Bank</label>
                            <select-ex :options="campusBankList" keyValue="campusBankLinkId" displayValue="bankName"
                                v-model="campusBankLinkId">
                            </select-ex>

                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <label for="zone-id">{{$t('modal.feeConfirmation.collector')}}</label>
                            <select-ex :options="CollectorList" keyValue="collectorId" displayValue="description"
                                v-model="collectorId">
                            </select-ex>

                        </div>
                    </div>
                    <div class="col-md-3" v-if="StudentFeedata">
                        <template v-if="canAdd">
                            <template v-if="collectorId">
                                <template v-if="paidDate">
                                    <template v-if="campusBankLinkId">
                                        <button class="btn btn-light btn-hover btn-sm btn-primary mt-4"
                                            @click="InsertPaidDate">Confirm</button>
                                    </template>
                                </template>
                            </template>
                        </template>
                    </div>
                    <template>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.installment')}}</label>
                            <span>{{installmentNO ? installmentNO : ''}}</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.totalAmount')}}</label>
                            <span>{{TotalAmount ? TotalAmount : ''}}</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.collectorName')}}</label>
                            <span>-</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.paidStatus')}}</label>
                            <span
                                class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill">{{$t('modal.feeConfirmation.unpaid')}}</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.dueDate')}}</label>
                            <span>{{dueDate ? dueDate : '' | formatDMY}}</span>
                        </div>
                        <div class="col-md-2 text-center">
                            <label class="d-block">{{$t('modal.feeConfirmation.paidDate ')}}</label>
                            <span>{{recievedDate ? recievedDate : '' | formatDMY}}</span>
                        </div>
                    </template>
                </div>
                <div class="row" v-else>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.installment')}}</label>
                        <span>{{installmentNO ? installmentNO : ''}}</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.totalAmount')}}</label>
                        <span>{{TotalAmount ? TotalAmount : ''}}</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.collectorName')}}</label>
                        <span>{{collectorName ? collectorName : ''}}</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.paidStatus')}}</label>
                        <span
                            class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill">{{$t('modal.feeConfirmation.challanPaid')}}</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.dueDate')}}</label>
                        <span>{{dueDate ? dueDate : '' | formatDMY}}</span>
                    </div>
                    <div class="col-md-2 text-center">
                        <label class="d-block">{{$t('modal.feeConfirmation.paidDate ')}}</label>
                        <span>{{recievedDate ? recievedDate : '' | formatDMY}}</span>
                    </div>
                </div>
                <div class="row mt-5">
                    <div class="col-md-4">
                        <h6 class="mb-3">{{$t('modal.feeConfirmation.feeParticulars')}}</h6>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <table class="table">
                            <thead class="thead-light">
                                <tr role="row">
                                    <th>{{$t('modal.feeConfirmation.particulars')}}</th>
                                    <th>{{$t('modal.feeConfirmation.feeAmount')}}</th>
                                    <th>{{$t('modal.feeConfirmation.Concession')}}</th>
                                    <th>{{$t('modal.feeConfirmation.payable')}}</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="items in StudentFeedata">
                                    <td class="align-middle"> {{items.feeHead}} </td>
                                    <td class="align-middle"> {{items.stfeeamount}} </td>
                                    <td class="align-middle">{{items.concessionName}} </td>
                                    <td class="align-middle">{{items.payableAmount}} </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div v-else-if="nodata">
                <h2>No data Found!</h2>
            </div>
        </template>
    </portlet-area>
</page-area>
