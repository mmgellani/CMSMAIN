<div>
  <div class="row">

    <div class="col-md-3">

      <div class="form-group validated">
        <label class="form-control-label">{{$t('modal.reports.feeReports.session')}}<span style="color:red">
            *</span></label>
        <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
        </select-ex>
      </div>
    </div>
    <div class="col-md-3 form-group">
      <label class="form-control-label">{{$t('modal.setupCampus.city')}}
      </label>
      <select-ex :options="cityList" keyValue="cityId" displayValue="fullName" v-model="cityId">
      </select-ex>
    </div>

    <div class="col-md-3">
      <div class="form-group">
        <label>{{$t('modal.notification.class')}}</label>
        <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"></select-ex>
      </div>
    </div>

    <div class="col-md-3">
      <div class="form-group">
        <label>League Name</label>
        <select-ex :options="leagueList" keyValue="fullName" displayValue="fullName"
          v-model.trim="fullName"></select-ex>
      </div>
    </div>


  </div>
  <div v-if="showLoader">
    <div class="col-md-12  control" style="text-align:right">
      <section class="loaders loaders-bg-1"><span class="loader loader-double"> </span> Loading...</section>
    </div>
  </div>
  <div class="row" v-if="getSessionBasedSummery.length>0 && getSessionBasedSummery[0].totalPush!=0">
    <div class="col-md-2"></div>
    <div class="col-md-8">
      <div class="row mt-4">
        <div class="col-md-12">
          <div class="card-box" style="background: #273b73eb;">
            <div class="inner">
              <p class="mb-4">Quiz Response Rate</p>
              <a href="javascript:void(0)" style="color: #fff; position: absolute; right: 10px; top: 10px;"
                @click="refreshData()"><i class="fa fa-refresh" aria-hidden="true"></i> </a>
              <div class="row" v-for="item in getSessionBasedSummery">
                <div class="col-md-3 text-center">
                  <h3 class="text-center">{{item.totalPush}}</h3>
                  <span>Pushed</span>
                </div>
                <div class="col-md-3 text-center">
                  <h3 class="text-center">{{item.totalSubmmited}}</h3>
                  <span>Attempted</span>
                </div>
                <div class="col-md-3 text-center">
                  <h3 class="text-center">{{item.responseRate}}%</h3>
                  <span>Response Rate</span>
                </div>
                <div class="col-md-3 text-center">
                  <h3 class="text-center">{{item.totalStudent}}</h3>
                  <span>No. of Students</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6" v-if="getSessionBasedSummery.length>0 && showGraph && getSessionBasedSummery[0].totalPush!=0">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            OverAll Response Rate %
          </template>
          <template slot="content" style="height: 450px;">
            <Highcharts :options="optionsTemp" />
          </template>
        </collapsible-widget>
      </div>
    </div>
    <div class="col-md-6"
      v-if="getSessionBasedSummeryCityWise.length>0 && showGraph && !showTable  && getSessionBasedSummeryCityWise[0].totalPush!=0">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            City-Wise Response Rate %
          </template>
          <template slot="content" style="height: 450px;">
            <Highcharts :options="optionsTempEx" />
          </template>
        </collapsible-widget>
      </div>
    </div>
    <div class="col-md-6"
      v-if="getSessionBasedSummerySubCityWise.length>0 &&  showTable && getSessionBasedSummerySubCityWise[0].totalPush!=0">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Sub-city wise Quiz Response
          </template>
          <template slot="content" style="height: 420px; color: white;">
            <table class="table table-striped table-hover" style="height: 390px; border: 1px solid black;">
              <thead style="background-color: #05bb7b; color: white;">
                <tr>
                  <th> Sub-City </th>
                  <th> Quizzes Pushed</th>
                  <th> Quizzes Attempted </th>
                  <th> Response Rate</th>
                  <th> No. of Students </th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in getSessionBasedSummerySubCityWise"
                  style="background-color: white; border: 1px solid black;">
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.cityName}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.totalPush}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.totalSubmmited}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.responseRate}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.totalStudent}}
                  </td>
                </tr>
              </tbody>
            </table>
          </template>
        </collapsible-widget>
      </div>
    </div>
  </div>
  <div class="row" v-if="getSessionBasedSummeryQuizWise.length>0">

    <div class="col-md-12">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Weekly Quiz Response % Trend
          </template>
          <template slot="content">
            <Highcharts :options="optionsQuizWiseGraph" />
          </template>
        </collapsible-widget>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center align-items-center vh-50" v-if="noRecordFound">
    <div>
      <h3 style="color: black; margin-top: 50px;">No Record Found</h3>
    </div>
  </div>
</div>
