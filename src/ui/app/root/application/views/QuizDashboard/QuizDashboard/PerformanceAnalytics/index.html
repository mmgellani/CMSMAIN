<div>
  <div class="row">

    <div class="col-md-3">

      <div class="form-group validated">
        <label class="form-control-label">{{$t('modal.reports.feeReports.session')}}<span style="color:red">
            *</span></label>
        <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
        </select-ex>
      </div>
    </div>
    <div class="col-md-3 form-group">
      <label class="form-control-label">{{$t('modal.setupCampus.city')}}
      </label>
      <select-ex :options="cityList" keyValue="cityId" displayValue="fullName" v-model="cityId">
      </select-ex>
    </div>

    <div class="col-md-3">
      <div class="form-group">
        <label>{{$t('modal.notification.class')}}</label>
        <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"></select-ex>
      </div>
    </div>

    <div class="col-md-3">
      <div class="form-group">
        <label>League Name</label>
        <select-ex :options="leagueList" keyValue="fullName" displayValue="fullName"
          v-model.trim="fullName"></select-ex>
      </div>
    </div>
    <div class="col-md-3">
      <div class="form-group">
        <label>Subject</label>
        <select-ex :options="subjectList" keyValue="subjectName" displayValue="subjectName"
          v-model.trim="subjectId"></select-ex>
      </div>
    </div>


  </div>

  <div v-if="showLoader">
    <div class="col-md-12  control" style="text-align:right">
      <section class="loaders loaders-bg-1"><span class="loader loader-double"> </span> Loading...</section>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6" v-if="getQuizTimeWiseOverAllPerformance.length>0 && getQuizTimeWiseOverAllPerformance[0].percentage!=0.00">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            OverAll Performance %
          </template>
          <template slot="content" style="height: 450px;">
            <Highcharts :options="optionsTempOverAlloptionsEx" />
          </template>
        </collapsible-widget>
      </div>
    </div>
    <div class="col-md-6" v-if="getCityPerformance.length>0 && showGraph">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            City Wise Average Marks %
          </template>
          <template slot="content" style="height: 450px;">
            <Highcharts :options="optionsTempCity" />
          </template>
        </collapsible-widget>
      </div>
    </div>
    <div class="row" style="margin-left: 40px;" v-if="getSubCityPerformance.length >0 && showTable">

      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Sub City-Wise Performance
          </template>
          <template slot="content" style="height: 600px; margin-left: 40px;">
            <table class="table table-striped table-hover" style="height: 390px; border: 1px solid black;">
              <thead style="background-color: #05bb7b; color: white;">
                <tr >
                  <th> Sub City </th>
                  <th> Total Marks</th>
                  <th> Obtained Marks</th>
                  <th> Percentage </th>


                </tr>
              </thead>
              <tbody>
                <tr v-for="item in getSubCityPerformance"  style="background-color: white; border: 1px solid black;">
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.subCity}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.totalMarks}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.obtainedMarks}}
                  </td>
                  <td style="background-color: white; border: 1px solid black;">
                    {{item.percentage}}
                  </td>

                </tr>
              </tbody>
            </table>
          </template>
        </collapsible-widget>

      </div>


    </div>
  </div>

  <div class="row" v-if="getSubjectBasedPerformance.length>0">
    <div class="col-md-12">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Subject-Wise Performance %
          </template>
          <template slot="content" style="height: 450px;">
            <Highcharts :options="optionsTempEx" />
          </template>
        </collapsible-widget>
      </div>
    </div>
  </div>

  <div class="row" v-if="getSessionBasedSummery.length>0">

    <div class="col-md-12">
      <div class="row mt-5">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Weekly Quiz Performance % Trend
          </template>
          <template slot="content">
            <Highcharts :options="optionsQuizWiseGraph" />
          </template>
        </collapsible-widget>
      </div>
    </div>
  </div>
 
  <div class="d-flex justify-content-center align-items-center vh-50" v-if="noRecordFound">
    <div>
      <h3 style="color: black; margin-top: 50px;">No Record Found</h3>
    </div>
  </div>  
  
</div>
