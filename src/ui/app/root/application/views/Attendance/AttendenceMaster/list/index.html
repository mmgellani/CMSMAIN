<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-title">
        Attendence Master
      </div>
      <div class="card-body">
        <div v-if="canRead">
          <grid :data="data" :columns="columns">
            <template slot="operation-actions">
              <div class="row">
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="loadCityCampus" class="form-control form-control-sm" v-model="sessionId" required>
                      <option v-for="(model,index) in sessionList" :value="model.sessionId">{{model.fullName}}</option>
                    </select>
                    <label>Session</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <drop-down v-model="campusId" :data="campusCityList" group-by="cityName" key-value="campusId"
                    display-value="campusName" placeholder="Campus" @change="loadProgramsOfCampus">
                  </drop-down>
                </div>
                <div class="col-md-3">
                  <drop-down v-model="programDetailId" :data="campusProgramLinkList" group-by="programName"
                    key-value="programDetailId" display-value="description" placeholder="Programs" @change="loadClass">
                  </drop-down>
                </div>

                <div class="col-md-3">
                  <div class="form-group">
                    <select class="form-control form-control-sm" v-model="classId" required>
                      <option v-for="(model,index) in classList" :value="model.classId">{{model.fullName}}</option>
                    </select>
                    <label>Class</label>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-3">
                  <div class="form-group">
                    <input class="form-control form-control-sm" @change="refreshData" v-model="datestring" type="date" required>
                    <label>Date</label>
                  </div>
                </div>
              </div>
            </template>
            <template slot="operation-links">
              <button v-if="canAdd" @click="insertModel" class="b-add">
                <feather icon="plus-circle"></feather>
              </button>
              <button @click="refreshData" class="b-refresh">
                <feather icon="refresh-ccw"></feather>
              </button>
            </template>

            <template slot="dated" slot-scope="item">
              {{item.row.dated && item.row.dated.toString().split('T')[0]}}
            </template>
            <template slot="statusId" slot-scope="item">
              {{item.row.statusId==1?'Active':'InActive'}}
            </template>
            <template slot="action" slot-scope="item">
              <a @click="editModel(item.row)" v-if="canEdit">
                <feather icon="edit" xclass="b-edit"></feather>
              </a>
              <a @click="deleteModel(item.row)" v-if="canDelete">
                <feather icon="trash" xclass="b-delete"></feather>
              </a>
            </template>

          </grid>

        </div>
      </div>
    </div>
  </div>

  <AttendenceMaster-add-edit-model v-on:submit="refreshData"></AttendenceMaster-add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
</div>
