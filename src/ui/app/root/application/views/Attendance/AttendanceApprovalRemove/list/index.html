              <i class="la la-save"></i> {{$t('button.save')}}
            </button>
            <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
              <i class="la la-refresh"></i> {{$t('button.reload')}}

          </template>

            <label class="kt-checkbox kt-checkbox--brand mb-0">

            </label>

          </template>

              <span></span>
            </label>

          </template>
        </grid>
      </div>

  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">

            <h3 class="modal-title">{{$t('navigation.attendanceApprovalRemove')}}</h3>

          </div>

          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to Reverse Attendance Approval ?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            :disabled="datas.length==0" @click="insertModel">
            {{$t('button.yes')}}</button>
        </div>
      </div>
    </div>
  </div>
