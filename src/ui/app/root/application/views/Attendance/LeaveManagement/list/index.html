<page-area>

    <span class="kt-subheader__separator kt-hidden"></span>

                <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
                  v-model="sessionId">
                </select-ex>
              </div>
            </div>

            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.reports.feeReports.campus')}}</label>
                <select-ex @input="loadProgramsOfCampus" :options="campusCityList" keyValue="campusId"
                  displayValue="campusName" v-model="campusId" groupBy="cityName">
                </select-ex>
              </div>
            </div>
            <div class="col-md-3">
              <label>{{$t('modal.reports.feeReports.program')}}</label>
              <select-ex @input="loadProgramSection" :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
                v-model="programDetailId" groupBy="programName">
              </select-ex>
            </div>

            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.reports.feeReports.class')}}</label>
                <select-ex @input="loadProgramSection" :options="classList" keyValue="classId" displayValue="fullName"
                  v-model="classId">
                </select-ex>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.reports.feeReports.section')}}</label>
                <select-ex @input="refreshData" :options="sectionCourseLinkList" keyValue="sectionId"
                  displayValue="fullName" v-model="sectionId">

              </div>
            </div>
