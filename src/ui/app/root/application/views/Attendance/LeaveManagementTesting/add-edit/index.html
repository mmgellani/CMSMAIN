<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true" :scrollable="true"
    :adaptive="false" transition="nice-modal-fade" width="40%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel">
                        <i class="fa fa-close"></i>
                    </a>
                </div>
                <div class="col-md-8 text-center">
                    <div class="modal-title">

                        Leave Mark&nbsp;&nbsp;
                        <span class="font12"></span>

                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">

            <div class="row ">
                <div class="col-md-6">
                    <div class="form-group">
                        <!-- From Date<date-picker v-model="model.fromDate" format="DD/MM/YYYY" lang="en"></date-picker> -->
                        <input type="date" class="form-control form-control-sm" :value="model.fromDate && model.fromDate.toString().split('T')[0]"
                        @input="model.fromDate= $event.target.value">
                    <label>From Date<span style="color:red"> *</span></label>

                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">

                        <!-- To Date<date-picker v-model="model.toDate" format="DD/MM/YYYY" lang="en"></date-picker> -->
                        <input type="date" class="form-control form-control-sm" :value="model.toDate && model.toDate.toString().split('T')[0]"
                        @input="model.toDate= $event.target.value">
                    <label>To Date<span style="color:red"> *</span></label>

                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    Is Partial<input  class="switch" type="checkbox" v-model="model.isPartial" @change="CheckAll(model.isPartial)"  >
                </div>

                <div class="col-md-6">
                        Is Approved<input  class="switch"     type="checkbox" v-model="model.isApproved"  >
                    </div>
                <div class="col-md-6">

                    <table class="table">
                        <thead>
                            <tr role="row">
                                <th>Coure Name</th>


                            </tr>
                            <tbody>
                                <tr v-for="item in ProgramCourseListSelected">
                                    <td>{{item.courseName}}</td>

                                    <td>
                                        <input type="checkbox" v-model="item.isSelected">
                                    </td>
                                </tr>

                            </tbody>


                        </thead>

                    </table>


                </div>

               
            </div>

            <div class="row">
                    <div class="col-md-6">
                    Remarks <input type="text"  class="form-control form-control-sm" v-model="remarks">

                    </div>
                </div>

        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" @click="saveModel" >Save</button>
                </div>
            </div>
        </div>
    </div>

</modal>
