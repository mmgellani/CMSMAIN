<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.attendance')}} </h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.markDayEnd')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.markDayEnd')">
    <template slot="portlet-body">
      <div v-if="canRead">
   
        <grid :data="listofTimeTableData" :columns="columns" pre="modal.markDayEnd.">
           
          <template slot="action-area">
            <button v-if="canAdd" data-toggle="modal" data-target="#myModal"
              class="btn btn-light btn-hover btn-sm btn-primary" :disabled ="!enablebutton">
              <i class="la la-save"></i> {{$t('button.save')}}
            </button>
            <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
              <i class="la la-refresh"></i> {{$t('button.reload')}}
            </button>
          </template>
          <template slot="isChecked-header" :disabled="item.row.isdisabled" slot-scope="item">
            <input type="checkbox" @change="selectAll()" v-model="checkAll" /> Select All
          </template>
          <template slot="isChecked" slot-scope="item">
            <input type="checkbox" :disabled="item.row.isdisabled" @change="updatechek()" v-model="item.row.isChecked">
          </template>
        </grid>
      </div>
    </template>
  </portlet-area>

  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.markdayendBulk')}}</h3>
            <p>Confirmation</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to Mark Day End ?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary btn-hover btn-sm" data-dismiss="modal"> <i
              class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button type="button" @click="insertModel" class="btn btn-hover btn-sm btn-primary"
            data-dismiss="modal">Yes</button>

        </div>
      </div>
    </div>
  </div>
