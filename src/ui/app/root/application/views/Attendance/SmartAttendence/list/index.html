<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.attendance')}} </h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('Smart Attendance')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('Smart Attendance')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSubCity')}}</label>
            <select-ex :options="subcitylist" keyValue="subCityId" @input="GetSmartAttendenceData" displayValue="name"
              v-model="subCityId">
            </select-ex>
          </div>
        </div>
      </div>
      
      <grid :data="SmartAttendencelist" :columns="columns" pre="modal.attendencesmart.">
        <template slot="action-area">
      <div class="row">
        <div class="col-md-12 text-right">

          <button @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="GetSmartAttendenceData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </div>

      </div>

    </grid>
  </template>







    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
