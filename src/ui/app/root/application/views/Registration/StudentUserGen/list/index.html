<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.role')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.createStudentUser')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.createStudentUser')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.createStudentUser.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId"
              @input="loadCityCampus">
            </select-ex>

          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.createStudentUser.campus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" groupBy="cityName" displayValue="campusName"
              v-model.trim="campusId" @input="loadProgramsOfCampus"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.createStudentUser.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="programDetailId" groupBy="programName"
              displayValue="description" v-model.trim="programDetailId" @input="loadClass">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.createStudentUser.class')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"
              @input="loadProgramSection">
            </select-ex>
          </div>
        </div>
      </div>
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.createStudentUser.section')}}</label>
            <select-ex :options="sectionCourseLinkList" @input="refreshData" keyValue="sectionCourseLinkId"
              displayValue="sectionName" v-model.trim="sectionCourseLinkId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-9 text-right" style="margin-top: 24px;">
          <button v-if="canAdd" data-toggle="modal" data-target="#myModal"
            class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i>{{$t('button.save')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </div>
      </div>
      <grid :data="StudentList" :columns="columns" pre="modal.createStudentUser.">
        <template slot="isSelected-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">
             <input type="checkbox" @change="checkAll" v-model="selectAll" class="mb-0">{{$t('modal.createStudentUser.grid.selectAll')}}
            <span></span>
          </label>
        </template>
        <template slot="isSelected" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand" style="margin-bottom: 14px !important;">
            <input type="checkbox" v-model="item.row.isSelected">
            <span></span>
          </label>
        </template>
      </grid>

  </portlet-area>
  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.createStudentUser')}}</h3>
            <p>{{ title }}</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to create User?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            :disabled="StudentList.length==0" @click="insertModel"><i class="la la-save"></i>
            {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
