<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.qserup')}}</h3>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.registration')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.enrollmentBulk')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.enrollmentBulk')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.session')}}</label>
            <select-ex @input = "loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.campus')}}</label>
            <select-ex @input = "loadProgramsOfCampus" :options="campusCityList" groupBy="cityName" keyValue="campusId" displayValue="campusName"
              v-model.trim="campusId"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.program')}}</label>
            <select-ex @input = "loadClass" :options="campusProgramLinkList" groupBy="programName" keyValue="campusProgramId"
              displayValue="description" v-model.trim="campusProgramId"></select-ex>

          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.class')}}</label>
            <select-ex @input = "refreshData" :options="classList" groupBy="cityName" keyValue="classId" displayValue="fullName"
              v-model.trim="classid"></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.gender')}}</label>
            <select-ex @input = "refreshData" :options="genderModel" keyValue="genderId" displayValue="description" v-model.trim="idGender">
            </select-ex>
            <!-- <select @change="refreshData()" v-model="idGender" class="form-control form-control-sm" required>
                <option :value="item.genderId" v-for="item in genderModel">{{item.description}}
                </option>
              </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.enrollmentBulk.admissionType')}}</label>
            <select-ex @input = "refreshData" :options="admissionTypeList" keyValue="admissionTypeId" displayValue="fullName"
              v-model.trim="admissionTypeId"></select-ex>
            <!-- <select @change="refreshData()" v-model="admissionTypeId" class="form-control form-control-sm" required>
                <option :value="model.admissionTypeId" v-for="(model,index) in admissionTypeList">
                  {{model.fullName}}
                </option>
              </select> -->
          </div>
        </div>
      </div>
      <grid :data="datas" :columns="columns" pre="modal.enrollmentBulk.">
        <template slot="isSelected-header" slot-scope="item">
          <span style="width: 20px;">
            Action
            <!-- <label class="kt-checkbox kt-checkbox--brand">
              <input type="checkbox">&nbsp;<span></span>

            </label> -->
            <!-- <label class="kt-checkbox kt-checkbox--single kt-checkbox--all kt-checkbox--solid" style="margin-top: 4px;">
              <input type="checkbox">&nbsp;<span></span>
            </label> -->
          </span>
        </template>

        <template slot="action-area">
          <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
          <button v-if="canAdd" @click="insertModel" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i>{{$t('button.save')}}
          </button>
        </template>

        <template slot="sectionId" slot-scope="item">
          <select-ex :options="sectionList" keyValue="sectionId" displayValue="sectionName"
            v-model.trim="item.row.sectionId" @input="showRange(item.row)">
          </select-ex>
        </template>
        <template slot="rollNo" slot-scope="item">
          <input @blur="enableCheckBox(item.row)" class="form-control form-control-sm" style="width: 120px;"
            v-model.trim="item.row.rollNo" type="text" placeholder="RollNo" />
          <div v-if="item.isDisabled" class="input-group-append">
            <span class="input-group-text" style="color:red;" id="basic-addon2">!</span>
          </div>
        </template>
        <template slot="isSelected" slot-scope="item">
          <span style="width: 20px;">
            <label class="kt-checkbox kt-checkbox--brand">
              <input type="checkbox"
                :disabled="item.row.isDisabled || item.row.rollNo.length==0 || item.row.sectionId=='00000000-0000-0000-0000-000000000000'"
                v-model="item.row.isSelected" @change="check(item.row)">&nbsp;<span></span>

            </label>
            <!-- <label class="kt-checkbox kt-checkbox--single kt-checkbox--all kt-checkbox--solid" style="margin-top: 4px;">
              <input type="checkbox" :disabled="item.row.isDisabled" v-model="item.row.isSelected"
                @change="check(item.row)">&nbsp;<span></span>
            </label> -->
          </span>
        </template>

      </grid>
    </template>
  </portlet-area>
</page-area>
