<modal name="cal-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="40%"
    @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">Academic Calendar Master</h3>
                <p>Add Record</p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>

        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">

                    <div class="form-group validated">
                        <label class="form-control-label">{{$t('Academic Calendar Master')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control form-control-sm"
                            v-model.trim="academicCalendarMasterModel.fullName"
                            :class="{'is-invalid': $v.academicCalendarMasterModel.fullName.$error}"
                            @input="$v.academicCalendarMasterModel.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.academicCalendarMasterModel.fullName.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>

                </div>

                <div class="col-md-6">

                    <div class="form-group validated">
                        <label class="form-control-label">{{$t('From Date')}}<span style="color:red">
                                *</span></label>
                        <date-picker class="input-28 mt-2" id="change-width" ref="changeWidth" v-model="fromdatestring"
                            format="DD/MM/YYYY" lang="en"></date-picker>
                    </div>

                </div>
                <div class="col-md-6">

                    <div class="form-group validated">
                        <label class="form-control-label">{{$t('To Date')}}<span style="color:red">
                                *</span></label>
                        <date-picker class="input-28 mt-2" id="change-width" :not-before="fromdatestring"
                            ref="changeWidth" v-model="todatestring" format="DD/MM/YYYY" lang="en"></date-picker>
                    </div>

                </div>
            </div>
        </div>




        <div class="modal-footer">
            <div class="row">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="save"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
