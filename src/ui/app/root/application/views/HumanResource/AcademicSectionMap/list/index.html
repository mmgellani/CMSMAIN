<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.academiccalendar')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"
        ><i class="flaticon2-shelter"></i
      ></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.academicSectionMap')}}
      </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.academicSectionMap')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.session')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="sessionList"
              keyValue="sessionId"
              displayValue="fullName"
              v-model.trim="sessionId"
              @change="refreshData"
            >
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.campus')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="campusCityList"
              groupBy="cityName"
              keyValue="campusId"
              displayValue="campusName"
              v-model.trim="campusId"
            ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label
              >{{$t('modal.registrationSectionCourseLink.programs')}}<span style="color:red">
                *</span></label
            >
            <select-ex
              :options="campusProgramLinkList"
              groupBy="programName"
              keyValue="campusProgramId"
              displayValue="description"
              v-model.trim="campusProgramId"
            ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.class')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="classList"
              groupBy="cityName"
              keyValue="classId"
              displayValue="fullName"
              v-model.trim="classid"
            ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group validated">
            <label
              >{{$t('navigation.boards')}}<span style="color:red">
                *</span
              ></label
            >
            <select-ex
              :options="boardList"
              keyValue="boardId"
              displayValue="fullName"
              v-model.trim="boardId"
            >
            </select-ex>
          </div>
        </div>
      </div>
      <grid
        :data="data"
        :columns="columns"
        pre="modal.academicSectionMap."
      >
        <template slot="action-area">
          <button
            v-if="canAdd"
            @click="insertModel"
            class="btn btn-light btn-hover btn-sm btn-outline-primary"
          >
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button
            @click="refreshData"
            class="btn btn-light btn-hover btn-sm btn-outline-primary"
          >
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button
            @click="editModel(item.row)"
            v-if="canEdit"
            title="Edit"
            type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle"
          >
            <i class="la la-edit"></i>
          </button>

          <button
            @click="deleteModel(item.row)"
            v-if="canDelete"
            title="Delete"
            type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle"
          >
            <i class="la la-trash"></i>
          </button>
        </template>
        <template slot="statusId" slot-scope="item">
          <span
            class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1"
            >Active</span
          >
          <span
            class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill"
            v-else
            >InActive</span
          >
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="refreshData"></add-edit-model>
  <!-- <add-edit-bulk-model v-on:submit="refreshData"></add-edit-bulk-model> -->
  <delete-model v-on:submit="refreshData"></delete-model>
</page-area>
