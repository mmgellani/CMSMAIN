<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.cityConfigurationQuiz')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.cityConfigurationQuiz')}} </a>
    </div>
    
  </template>

  <portlet-area action="1" :title="$t('navigation.cityConfigurationQuiz')">

    <template slot="portlet-body">
      <div class="row">

        <div class="col-md-3">
  
          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.reports.feeReports.session')}}<span style="color:red">
                *</span></label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3 form-group">
          <label class="form-control-label">{{$t('modal.setupCampus.city')}}<span style="color:red">
              *</span>
          </label>
          <select-ex :options="cityList" keyValue="cityId" displayValue="fullName" v-model="cityId">
          </select-ex>
        </div>
  
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.notification.class')}}</label><span style="color:red">
              *</span>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName"
              v-model.trim="classId"></select-ex>
          </div>
        </div>
         
  
      </div>
      <grid :data="data" :columns="columns" pre="navigation.cityConfigurationQuiz">
        
        <template slot="action-area">
          <button v-if="showListData" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template> 
        <template slot="statusId" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1">Active</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>InActive</span>
        </template>
        <template slot="isProcessed" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.isProcessed == 1">True</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>False</span>
        </template>
        <template slot="isActive" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.isActive == 1">True</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>False</span>
        </template>
      </grid>
    </template>
  </portlet-area>
  <Configration-add-edit-model v-on:submit="refreshData"></Configration-add-edit-model>
 </page-area>
