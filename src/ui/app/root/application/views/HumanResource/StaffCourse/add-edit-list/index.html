<div class="modal-content">
    <div class="modal-header">
        <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.staffCourse')}}</h3>
            <p> {{title}} </p>
        </div>
        <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                <i class="la la-close"></i>
            </button>
        </div>
    </div>
    <div class="modal-body">
        <div class="row" v-if="!IsNewRecord">
            <div class="col-md-6">
                <div class="form-group">
                    <label class="kt-option kt-option-custom">
                        <span class="kt-option__label">
                            <span class="kt-option__head">
                                <span class="kt-option__title mt-1">
                                    {{$t('modal.setupClass.recordStatus')}}
                                </span>
                            </span>
                        </span>
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                            <label class="m-0">
                                <input type="checkbox" checked="checked" v-model="isActive">
                                <span></span>
                            </label>
                        </span>
                    </label>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>{{$t('navigation.registrationCourse')}}</label><span style="color:red">
                        *</span></label>
                    <select-ex :options="courseList" keyValue="courseId" displayValue="fullName" v-model="data.courseId"
                       >
                    </select-ex>
                    <div class="invalid-feedback" v-show="$v.data.courseId.$error">
                        <span v-if="!$v.data.courseId.required">{{$t('validation.required')}}</span>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>{{$t('navigation.setupCampusBuildingLink')}}</label><span style="color:red">
                        *</span></label>
                    <select-ex :options="campusbuildingList" keyValue="campusBuildingId" displayValue="campusBuildingName"
                        v-model="data.campusBuildingId">
                    </select-ex>
                    <div class="invalid-feedback" v-show="$v.data.campusBuildingId.$error">
                        <span v-if="!$v.data.campusBuildingId.required">{{$t('validation.required')}}</span>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.staffCourse.isPrimary')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" :checked="data.isPrimary" v-model="data.isPrimary">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
           
        </div>
    </div>
