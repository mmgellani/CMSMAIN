<modal name="failCriteria-add-edit-model" :clickToClose="false" :width="921" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="true" transition="bounce" top="10"   height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">Evaluation</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> Survey Name
                            <!-- <span style="color:red">
                                *</span> -->
                        </label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.evalMaster.name.$error}" v-model.trim="evalMaster.name"
                            @input="$v.evalMaster.name.$touch()">
                        <div class="invalid-feedback" v-show="$v.evalMaster.name.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> Survey description
                            <!-- <span style="color:red">
                                *</span> -->
                        </label>
                        <input type="text" class="form-control  " v-model.trim="evalMaster.description"
                            :class="{'is-invalid': $v.evalMaster.description.$error}"
                            @input="$v.evalMaster.description.$touch()">
                        <div class="invalid-feedback" v-show="$v.evalMaster.description.$error">
                            <span v-if="!$v.evalMaster.description.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>

              
                

            </div>
     <div class="row">
            <div class="col-md-12">
                <div class="form-group validated">
                    <label class="form-control-label">PopUp description</label>
            
                    <!-- Use VueEditor for rich text input instead of input field -->
                    <vue-editor 
                        v-model="evalMaster.popupDescription" 
                        :class="{'is-invalid': $v.evalMaster.popupDescription.$error}" 
                        @input="$v.evalMaster.popupDescription.$touch()">
                    </vue-editor>
            
                    <!-- Validation feedback for the description field -->
                    <div class="invalid-feedback" v-show="$v.evalMaster.popupDescription.$error">
                        <span v-if="!$v.evalMaster.popupDescription.required">{{$t('validation.required')}}</span>
                    </div>
                </div>
            </div>
        </div>


            <!-- <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.examinationFailCriteria.absentConsiderFail')}}</label>
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                            <label class="m-0">
                                <input type="checkbox" v-model.trim="failMaster.absentConsiderFail">
                                <span></span>
                            </label>
                        </span>
                    </div>
                </div> -->

            <div class="row">
                <div class="col-md-12" v-for="(item,index) in evaluiondetaillist">
                    <div class="card">
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="form-control-label"> Survey Query<span style="color:red">
                                            *</span></label>
                                    <select-ex @input="showVal(item)" :options="querylist" keyValue="name"
                                        displayValue="name" v-model="item.query">
                                    </select-ex>
                                </div>
                                <!-- <div class="col-md-4">

                                    <label class="form-control-label"> Survey Control Type<span style="color:red">
                                            *</span></label>
                                    <input type="text" class="form-control form-control-sm" v-model.trim="item.controlType">
                                </div> -->
                                <div class="col-md-6">
                                    <div class="form-group validated">
                                        <label class="form-control-label">{{$t('Control Type')}}<span style="color:red">
                                                *</span></label>
                                        <select-ex :options="controltypelist" keyValue="controlType"
                                            displayValue="controlType" v-model="item.controlType">
                                        </select-ex>
                                    </div>
                                </div>
                                <div class="col-md-12" v-if="item.query=='Other'" style="padding: 10px;
                                    border: 1px solid #e2e5ec;
                                    margin-top: 8px;
                                    border-radius: 4px;
                                    margin-bottom: 8px;">
                                    <span v-for="model in item.queryTypeList">
                                        <input type="checkbox" name="model.fullName" v-model="model.isChecked">
                                        {{model.fullName}} &nbsp; &nbsp;
                                    </span>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4">
                                    <label class="form-control-label"> Survey Question<span style="color:red">
                                            *</span></label>
                                    <input type="text" class="form-control  "
                                        v-model.trim="item.question">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-control-label">Question Order<span style="color:red">
                                            *</span></label>
                                    <input type="number" class="form-control  " v-model.trim="item.order">


                                </div>
                                <div class="col-md-4 text-right" style="margin-bottom: 30px;">
                                    <button v-if="evaluiondetaillist.length>1" @click="removeDetail2(index,item)"
                                        class="btn btn-outline-danger btn-icon btn-sm btn-circle"
                                        style="margin-top:24px">
                                        <i class="la la-trash"></i>
                                    </button>
                                    <button @click="addDetail2(item)"
                                        class="btn btn-outline-primary btn-icon btn-sm btn-circle"
                                        style="margin-top:24px">
                                        <i class="la la-plus"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- <div class="row">
                                <div class="col-md-12">
                                    <h5 class="card-title">Options </h5>
                                </div>
                            </div> -->
                            <div class="row" v-if="ShowOptions(item.controlType)"
                                v-for="(item2,index3) in item.operation">
                                <div class="col-md-2">

                                    <label class="form-control-label">
                                        Option Order
                                    </label>
                                    <input type="number" class="form-control  "
                                        v-model.trim="item2.order">

                                    <!-- <input type="number" class="form-control" v-model="item.fail_In" required>
                                <label>Fail Count<span style="color:red"> *</span></label> -->

                                </div>
                                <div class="col-md-6">

                                    <label class="form-control-label">
                                        Option
                                    </label>
                                    <input type="text" class="form-control  " v-model.trim="item2.option">
                                </div>
                                <div class="col-md-4 text-right">
                                    <button class="btn btn-outline-danger btn-icon btn-sm btn-circle"
                                        style="margin-top:24px" @click="removeDetail(index3,item)"
                                        v-if="item.operation.length>1">
                                        <i class="la la-trash"></i>
                                    </button>
                                    <button @click="addDetail(item)"
                                        class="btn btn-outline-primary btn-icon btn-sm btn-circle"
                                        style="margin-top:24px">
                                        <i class="la la-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row text-right">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}</button>
                <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                        class="la la-floppy-o"></i> {{$t('button.save')}}</button>
            </div>
        </div>
    </div>
</modal>
