<modal name="preview" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" width="60%" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">Evaluation</h3>
                <p> Preview </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row pl-3 pr-3" v-for="(data,index) in evaluationdetaildata">

                <div class="form-group" v-if="data.controlType == 'text' || data.controlType == 'file'">
                    <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label> <br />
                    <input :type="data.controlType" class="form-control form-control-sm" />
                </div>

                <div v-if="data.controlType == 'Select'" class="mt-4">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label>
                        </div>
                    </div>
                    <div class="col-md-3 mt-3">
                        <select class="form-control form-control-sm">
                            <option v-for="op in parser(data.operation)" :value="op.option">
                                {{ op.option }}
                            </option>
                        </select>
                    </div>
                </div>
                <div v-if="data.controlType == 'checkbox' && data.query == 'General' || data.controlType == 'radio' && data.query == 'General'"
                    class="mt-4">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label>
                            <br />
                        </div>
                        <div class="mt-3" :class="data.controlType == 'checkbox' ? 'col-md-3' : 'col-md-2'"
                            v-for="op in parser(data.operation)">
                            <label :for="op.option">{{ op.option }}</label> &nbsp;&nbsp;
                            <input :type="data.controlType" style="transform: translateY(2px);" :id="op.option"
                                :value="op.option" name="caption" />
                        </div>
                    </div>
                </div>
                <div v-if="data.controlType == 'TextArea'" class="mt-4">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label>
                            <br />
                        </div>
                        <div class="col-md-3 mt-3">
                            <textarea class="form-control form-control-sm" rows="5" v-model="messageText"></textarea>
                        </div>
                    </div>
                </div>
                <div v-if="data.controlType == 'radio' && data.query == 'courses' || data.controlType == 'radio' && data.query == 'Books'" class="w-100 mt-4">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label>
                            <br />
                        </div>
                    </div>
                    <div class="row" v-for="course in courses">
                        <div class="col-md-3">
                            <label>{{ course.subject}}</label>
                        </div>
                        <div class="col-md-1" v-for="(option,index) in course.options">
                            <label :for="option">{{ index+1 }}</label> &nbsp;&nbsp;
                            <input :type="option" style="transform: translateY(2px);" :id="option" :value="option"
                                :name="course.subject" />
                        </div>
                    </div>
                </div>
                <div v-if="data.controlType == 'checkbox' && data.query != 'courses' && data.query != 'General' && data.query != 'Books' || data.controlType == 'radio' && data.query != 'courses' && data.query != 'General' && data.query != 'Books'"
                    class="w-100 mt-4">
                    <div class="row mb-2">
                        <div class="col-md-12">
                            <label><strong>{{ index+1}}. {{ data.question}}</strong> {{ data.description}}</label>
                            <br />
                        </div>
                    </div>
                    <div class="row mb-2" v-for="course in  parser(data.query)">
                        <div class="col-md-3 d-flex align-items-center">
                            <label style="margin-top: 14px;">{{ course.CourseName }}</label>
                        </div>
                        <div class="col-md-1" v-for="x in  parser(data.operation)">
                            <label :for="option">{{ x.option }}</label> <br>
                            <input :type="data.controlType" style="transform: translateY(2px);" :id="option"
                                :name="course.CourseName" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row text-right">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}</button>
            </div>
        </div>
    </div>
</modal>
