<modal name="sendnotification-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="false" transition="bounce" top="10" width="60%" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">Evaluation</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> Survey Name
                            <!-- <span style="color:red">
                                *</span> -->
                        </label>
                        <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.evalMaster.name.$error}" v-model.trim="evalMaster.name"
                            @input="$v.evalMaster.name.$touch()">
                        <div class="invalid-feedback" v-show="$v.evalMaster.name.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> Survey description 1234
                            <!-- <span style="color:red">
                                *</span> -->
                        </label>
                        <input type="text" class="form-control form-control-sm" v-model.trim="evalMaster.description"
                            :class="{'is-invalid': $v.evalMaster.description.$error}"
                            @input="$v.evalMaster.description.$touch()">
                        <div class="invalid-feedback" v-show="$v.evalMaster.description.$error">
                            <span v-if="!$v.evalMaster.description.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>

            </div>


            <div class="row">
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="mb-3">{{$t('modal.customSms.session')}}</label>
                        <select-ex :options="sessionModel" keyValue="sessionId" displayValue="fullName"
                            v-model="notificationModel.sesseion" @input="loadCityCampus">
                        </select-ex>


                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="row">
                            <div class="col-md-8">
                                <label class="mb-3">{{$t('modal.customSms.campus')}}</label>
                            </div>
                            <div class="col-md-4 text-right">

                                <span class="kt-switch kt-switch--sm">
                                    <label class="m-0">
                                        <input class="switch" @change="changestate" v-model="iscampus" type="checkbox">
                                        <span></span>
                                    </label>
                                </span>

                            </div>
                        </div>





                        <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName"
                            groupBy="cityName" v-model="notificationModel.campus" :disabled="!iscampus"
                            @input="loadProgramsOfCampus">
                        </select-ex>

                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">

                        <div class="row">
                            <div class="col-md-8">
                                <label class="mb-3">{{$t('modal.customSms.program')}}</label>
                            </div>
                            <div class="col-md-4 text-right">

                                <span class="kt-switch kt-switch--sm">
                                    <label class="m-0">
                                        <input class="switch" @change="changestate" v-model="isprogram" type="checkbox">
                                        <span></span>
                                    </label>
                                </span>

                            </div>
                        </div>
                        <select-ex :options="campusProgramLinkList" keyValue="campusProgramId"
                            displayValue="description" v-model="notificationModel.program" groupBy="programName" :disabled="!isprogram"
                           >
                        </select-ex>



                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <div class="row">
                            <div class="col-md-8">
                                <label class="mb-3">{{$t('modal.customSms.class')}}</label>
                            </div>
                            <div class="col-md-4 text-right">

                                <span class="kt-switch kt-switch--sm">
                                    <label class="m-0">
                                        <input class="switch" @change="changestate" v-model="isclass" type="checkbox">
                                        <span></span>
                                    </label>
                                </span>

                            </div>
                        </div>

                        <select-ex :options="classList" keyValue="classId" displayValue="fullName"
                            v-model="notificationModel.classstudent" :disabled="!isclass">
                        </select-ex>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mt-2">
                    <div class="form-group">
                      <label>{{$t('modal.reports.feeReports.from')}}</label>
                      <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="fromDate" format="DD/MM/YYYY"
                        lang="en" v-mask="'##/##/####'"></date-picker>
                    </div>
                  </div>
                  <div class="col-md-3 mt-2">
                    <div class="form-group">
                      <label>{{$t('modal.reports.feeReports.to')}}</label>
                      <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="toDate" format="DD/MM/YYYY"
                        lang="en" v-mask="'##/##/####'"></date-picker>
                    </div>
                  </div>
            </div>






        </div>
    </div>
    <div class="modal-footer">
        <div class="row text-right">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}</button>
                <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                        class="la la-angle-right"></i> Send Notification</button>
            </div>
        </div>
    </div>
</modal>
