<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="80%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel"><i class="fa fa-close"></i></a>
                </div>
                <div class="col-md-8 text-center">
                    <div class="modal-title">

                        Questions&nbsp;-&nbsp;<span class="font12">{{title}}</span> 

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close" v-if="!IsNewRecord">
                        <input class="switch" type="checkbox" v-model="isActive">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.fullQuestion" required>
                            <label :class="!$v.model.fullQuestion.required">Full Question<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Full Question" v-model="data.fullQuestion" /> -->
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <select class="form-control form-control-sm" v-model="data.questionType" required>
                                <option>MCQ</option>
                                <option>Short Question</option>
                            </select>
                            <label :class="!$v.model.questionType.required">Question Type<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Question Type" v-model="data.questionType" /> -->
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <select class="form-control form-control-sm" v-model="data.difficultyLevel" required>
                                <option>Easy</option>
                                <option>Moderate</option>
                                <option>Hard</option>
                            </select>
                            <label :class="!$v.model.difficultyLevel.required">Difficulty Level<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Difficulty Level" v-model="data.difficultyLevel" /> -->
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.orderNumber" required>
                            <label :class="!$v.model.orderNumber.required">Order Number<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Order Number" v-model="data.orderNumber" /> -->
                    </div>
                </div>
                <div class="row mt-4 ModeColor">
                    <div class="col-md-6">
                        <h1>Answers</h1>
                    </div>
                    <div class="col-md-6 text-right">
                        <a href="#" @click="addAnswer" class="" data-toggle="refresh">
                            <feather icon="plus-circle"></feather>
                        </a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 mt-4" style="margin-top:5px;" v-for="model in answerList">
                        <div class="input-group">
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <input type="text" class="form-control form-control-sm" v-model="model.answer" required>
                                    <label :class="!$v.model.answers.required">Answer<span style="color:red"> *</span></label>
                                </div>
                                <!-- <vs-input class="mt-0" label-placeholder="Answer" type="text" v-model="model.answer" /> -->
                            </div>
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <input type="text" class="form-control form-control-sm" v-model="model.reason" required>
                                    <label>Reason</label>
                                </div>
                                <!-- <vs-input class="mt-0" label-placeholder="Reason" type="text" v-model="model.reason" /> -->
                            </div>
                            <div class="col-sm-2">
                                <div class="form-group">
                                    <select class="form-control form-control-sm" v-model="model.type" required>
                                        <option value="1">Correct</option>
                                        <option value="0">InCorrect</option>
                                    </select>
                                    <label>Type<span style="color:red"> *</span></label>
                                </div>
                            </div>
                            <div class="col-sm-1">
                                <input class="switch mt-1" type="checkbox" v-model="model.status" required>
                                <!-- <vs-switch class="mt-2" v-model="model.status" /> -->
                            </div>
                            <div class="col-sm-1">
                                <div class="btn btn-danger" @click="delAnswer(model)">
                                    <i class="fa fa-close"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
