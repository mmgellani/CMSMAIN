<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="40%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel"><i class="fa fa-close"></i></a>
                </div>
                <div class="col-md-8 text-center">
                    <div class="modal-title">

                        Topics&nbsp;-&nbsp;<span class="font12">{{title}}</span> 

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close" v-if="!IsNewRecord">
                        <input class="switch" type="checkbox" v-model="isActive">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.fullName" required>
                            <label :class="!$v.model.fullName.required">Full Name<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Full Name" v-model="data.fullName" /> -->
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.tCode" required>
                            <label :class="!$v.model.tCode.required">T Code<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="T Code" v-model="data.tCode" /> -->
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.description" required>
                            <label :class="!$v.model.description.required">Description<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Description" v-model="data.description" /> -->
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.videoLink" required>
                            <label>Video Link</label>
                        </div>
                        <!-- <vs-input label-placeholder="Video Link" v-model="data.videoLink" /> -->
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.orderNumber" required>
                            <label :class="!$v.model.orderNumber.required">Order Number<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Order Number" v-model="data.orderNumber" /> -->
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
