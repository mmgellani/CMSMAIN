<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="60%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel"><i class="fa fa-close"></i></a>
                </div>
                <div class="col-md-8 text-center">
                    <div class="modal-title">

                        ModelPapersQuestions&nbsp;-&nbsp;<span class="font12">{{title}}</span> 

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close" v-if="!IsNewRecord">
                        <input class="switch" type="checkbox" v-model="isActive">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="text" class="form-control form-control-sm" v-model="data.fullQuestion" required>
                            <label>Full Question<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Full Question" v-model="data.fullQuestion" /> -->
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="number" class="form-control form-control-sm" v-model="data.orderNumber" required>
                            <label>Order Number<span style="color:red"> *</span></label>
                        </div>
                        <!-- <vs-input label-placeholder="Order Number" v-model="data.orderNumber" /> -->
                    </div>
                </div>
                <!-- <br> -->
                <!-- <div class="row">
                    <div class="col-md-6">
                        <input type="text" class="form-control form-control-sm" v-model="data.orderNumber">
                        <label>Order Number</label>
                        <vs-input label-placeholder="Order Number" v-model="data.orderNumber" />
                    </div>
                </div> -->
                <div class="row mt-4 ModeColor">
                        <div class="col-md-6">
                            <h1>Answers</h1>
                        </div>

                    <div class="col-md-6 text-right">
                        <a href="#" @click="addAnswer" class="" data-toggle="refresh">
                            <feather icon="plus-circle"></feather>
                        </a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 mt-4" style="margin-top:5px;" v-for="model in answerList">
                        <div class="input-group">
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <input type="text" class="form-control form-control-sm" v-model="model.answer" required>
                                    <label>Answer<span style="color:red"> *</span></label>
                                </div>
                                <!-- <vs-input class="mt-0" label-placeholder="Answer" type="text" v-model="model.answer" /> -->
                            </div>
                            <div class="col-sm-4">
                                <div class="form-group">
                                    <input type="text" class="form-control form-control-sm" v-model="model.reason">
                                    <label>Reason</label>
                                </div>
                                <!-- <vs-input class="mt-0" label-placeholder="Reason" type="text" v-model="model.reason" /> -->
                            </div>
                            <div class="col-sm-2">
                                <div class="form-group">
                                    <select class="form-control form-control-sm" placeholder="Type" v-model="model.type">
                                        <option value="1">Correct</option>
                                        <option value="0">InCorrect</option>
                                    </select>
                                    <label>Type</label>
                                </div>
                                <!-- <vs-select autocomplete class="selectExample" placeholder="Type" v-model="model.type">
                                    <vs-select-item vs-value="1" vs-text="Correct" />
                                    <vs-select-item vs-value="0" vs-text="InCorrect" />
                                </vs-select> -->
                            </div>
                            <div class="col-sm-1">
                                <input class="switch mt-1" type="checkbox" v-model="model.status">
                                <!-- <vs-switch class="mt-2" v-model="model.status" /> -->
                            </div>
                            <div class="col-sm-1">
                                <div class="btn btn-danger" @click="delAnswer(model)">
                                    <i class="fa fa-close"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
