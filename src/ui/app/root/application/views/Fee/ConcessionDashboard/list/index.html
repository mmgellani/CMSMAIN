<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.dashboard')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.concessionDashboard')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.concessionDashboard')">
    <template slot="portlet-body">
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="form-group">
            <label class="mb-3">{{$t('modal.concessionDashboard.session')}}<span style="color:red">
                *</span></label>
            <select-ex @input="refreshEx" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model="sessionId">
            </select-ex>
          </div>
        </div>
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.cities')}}<span style="color:red">
                *</span></label>
            <select-ex @input="loadProgramsOfCampus" :options="cityList" keyValue="cityId" displayValue="fullName"
              v-model="cityId">
            </select-ex>
          </div>
        </div> -->
        <div class="col-md-3" style="position: relative;">
          <div class="form-group">
            <div class="row">
              <div class="col-md-8">
                <label>{{$t('modal.concessionDashboard.cities')}}</label>
              </div>
              <div class="col-md-4 text-right">
                <span class="kt-switch kt-switch--sm kt-switch--icon"
                  ><label class="m-0"
                    ><input
                      type="checkbox"
                      checked="checked"
                      v-model="viewCities"
                      @change="showAllRecord()"
                      />
                    <span></span></label
                ></span>
              </div>
            </div>
            <select-ex
              :options="cityList"
              keyValue="cityId"
              displayValue="fullName"
              v-model="cityId"
              multiple
              :disabled="viewCities"
              @input="loadProgramsOfCampus"
            >
            </select-ex>
            <label class="show-checkBox">All Cities</label>
          </div>
        </div>
        <div class="col-md-3 position-relative">
          <div class="form-group">
            <div class="row">
              <div class="col-md-8">
                <label>{{$t('modal.concessionDashboard.level')}}</label>
              </div>
              <div class="col-md-4 text-right">
                <span class="kt-switch kt-switch--sm kt-switch--icon"
                  ><label class="m-0"
                    ><input
                      type="checkbox"
                      @input="toggleLevel()"
                      />
                    <span></span></label
                ></span>
              </div>
            </div>
            <select-ex
              :options="LevelList"
              keyValue="levelName"
              displayValue="levelName"
              v-model="levelName"
              @input="refreshEx()"
              :disabled="viewLevel"
            >
            </select-ex>
            <label class="show-checkBox">All level</label>
          </div>
        </div>
        <div class="col-md-3" style="position: relative;">
          <div class="form-group">
            <div class="row">
              <div class="col-md-8">
                <label>{{$t('Class')}}</label>
              </div>
              <div class="col-md-4 text-right">
                <span class="kt-switch kt-switch--sm kt-switch--icon"
                  ><label class="m-0"
                    ><input
                      type="checkbox"
                      checked="checked"
                      v-model="viewClass"
                      @change="toggleClass()"
                      />
                    <span></span></label
                ></span>
              </div>
            </div>
            <select-ex
              :options="classList"
              keyValue="classId"
              displayValue="fullName"
              v-model="classId"
              multiple
              :disabled="viewClass"
              @input="refreshEx()"
            >
            </select-ex>
            <label class="show-checkBox">All Class</label>
          </div>
          
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.program')}}<span style="color:red">
                *</span></label>

            <select-ex @input="refreshData" :options="campusProgramLinkList" keyValue="programDetailId"
              displayValue="description" v-model="programDetailId" groupBy="programName"></select-ex>
          </div>
        </div>
       
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('Instalment No')}}<span style="color:red">
                *</span></label>
              <!-- <select @change="loadInstallmentWise" v-model="instllmentNo">
                <option v-for="item in installmentList" :value="instllmentNo">{{item.instllmentNo}}</option>
              </select> -->
              <select-ex  @input="refreshEx" :options="maxInstallments" keyValue="item" displayValue="item" v-model="instllmentNo">
              </select-ex>
            <!-- <select-ex @input="loadInstallmentWise" :options="installmentList" keyValue="programDetailId"
              displayValue="instllmentNo" v-model="instllmentNo" ></select-ex> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.preference')}}</label>
            <select-ex :options="preferenceArr" keyValue="item" displayValue="item" v-model="tabRef"
              @input='changedEvent'></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3 text-right">
          <!-- <div class="form-group">
            <label>{{$t('modal.concessionDashboard.preference')}}</label>
            <select-ex :options="preferenceArr" keyValue="item" displayValue="item" v-model="tabRef"
              @input='changedEvent'></select-ex>
            </select>
          </div> -->
          <button
            class="btn btn-primary btn-sm"
            title="Clear selection"
            style="width:40px;margin-top: 24px;"
            @click="clearSelection()"
          >
            <i class="fa fa-times"></i>
          </button>
          <button
            class="btn btn-info btn-sm"
            title="Reload selection"
            style="width:40px;margin-top: 24px;"
            @click="refreshEx()"
          >
            <i class="fa fa-refresh"></i>
          </button>
        </div>
      </div>
      <div class="row mb-5">
        <div class="col-md-3">
          <div class="card-box"
            style="background: #273b73eb; padding-top: 10px !important;  padding-bottom:38px !important;">
            <div class="inner">
              <p> Student Count </p>
              <h3>  {{barData.students}} </h3>
            </div>
            <div class="icon">
              <i class="la la-file-text" aria-hidden="true"></i>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card-box"
            style="background: #6689f2; padding-top: 10px !important; padding-bottom:38px !important;">
            <div class="inner">
              <p> Gross Fee Due </p>
              <h3> {{formatPrice(barData.actualAmount)}} </h3>
            </div>
            <div class="icon">
              <i class="la la-money" aria-hidden="true"></i>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card-box"
            style="background: #fd4853a6; padding-top: 10px !important;  padding-bottom:38px !important;">
            <div class="inner">
              <p> Recieved Fee </p>
              <h3>{{formatPrice(barData.paidAmount)}}</h3>
            </div>
            <div class="icon">
              <!-- <i class="la la-dollar" aria-hidden="true"></i> -->
              <p>PKR</p>
            </div>
          </div>
        </div>
       
        <div class="col-md-4" style="margin-top: 12px;">
          <div class="card-box"
            style="background: #ea545de0; padding-top: 10px !important; padding-bottom: 0 !important;">
            <div class="inner">
              <p style="margin: 0;"> Total Concession Amount </p>
              <h3 style="margin: 0;"> {{ formatPrice(barData.discountAmount)}} </h3>
              <p style="font-size: 12px; margin: 0;"> Concession Amount : {{formatPrice(barData.discountAmount+barData.exemption)}} </p>
              <p  style="font-size: 12px; margin: 0;"> Exemption Amount : {{formatPrice(barData.exemption*(-1))}} </p>
              <div class="row">
                <div class="col-md-8 p-0">
                  <p style="padding-left: 13px;">Concession %</p>
                </div>
                <div class="col-md-4 p-0">
                  <h4 class="m-0" style="line-height: 24px; padding-left: 13px;">{{percentage}}</h4>
                </div>
              </div>
            </div>
            <div class="icon">
              <i class="la la-server" aria-hidden="true"></i>
            </div>
          </div>
        </div>
        <!-- <div class="col-md-3" style="margin-top: 12px;">
          <div class="card-box"
            style="background: #6689f2; padding-top: 10px !important; padding-bottom:38px !important;">
            <div class="inner">
              <p> Concession Amount </p>
              <h3> {{formatPrice(barData.discountAmount+barData.exemption)}} </h3>
            </div>
            <div class="icon">
              <i class="la la-money" aria-hidden="true"></i>
            </div>
          </div>
        </div> -->
        <!-- <div class="col-md-3" style="margin-top: 12px;">
          <div class="card-box"
            style="background: #6689f2; padding-top: 10px !important; padding-bottom:38px !important;">
            <div class="inner">
              <p> Exemption Amount </p>
              <h3> {{formatPrice(barData.exemption*(-1))}} </h3>
            </div>
            <div class="icon">
              <i class="la la-money" aria-hidden="true"></i>
            </div>
          </div>
        </div> -->
        <div class="col-md-3" style="margin-top: 12px;">
          <div class="card-box"
            style="background: #273b73eb; padding-top: 10px !important;  padding-bottom:50px !important;">
            <div class="inner">
              <p> Average Fee per Anum </p>
              <h3> {{formatPrice(this.avg)}} </h3>
            </div>
            <div class="icon">
              <i class="la la-file-text" aria-hidden="true"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <table-graph :graphVar="tabTwo" :tableVar="tabOne">
            <template slot="title">
              Concession
            </template>
            <template slot="tableContent">
              <table class="table table-striped table-hover">
                <thead>
                  <tr>
                    <th>
                      Challan Recieved
                    </th>
                    <th>
                      Student Count
                    </th>
                    <th>
                      Recieved Amount
                    </th>
                    <th>
                      Actual Amount
                    </th>
                    <th>
                      Concession Amount
                    </th>
                    <th>
                      Concession Percentage
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>
                      {{barData.challan}}
                    </td>
                    <td>
                      {{barData.students}}
                    </td>
                    <td>
                      {{formatPrice(barData.paidAmount)}}
                    </td>
                    <td>
                      {{formatPrice(barData.actualAmount)}}
                    </td>
                    <td>
                      {{formatPrice(barData.discountAmount)}}
                    </td>
                    <td>
                      {{percentage}}%
                    </td>
                  </tr>
                </tbody>
              </table>
            </template>
            <template slot="graphContent">
              <Highcharts :options="options" />
            </template>
          </table-graph>
        </div>

      </div>
    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
