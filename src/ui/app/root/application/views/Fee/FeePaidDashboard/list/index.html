<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.dashboard')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.feePaidDashboard')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.feePaidDashboard')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.attendanceAttendenceDashboard.date')}}<span style="color:red"> *</span></label>
            <!-- <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="dated" format="DD/MM/YYYY"
                lang="en" @input="refreshData"></date-picker> -->

            <date-picker @input="refreshData" class="input-28" id="change-width" ref="changeWidth" v-model="dated"
              format="DD/MM/YYYY" lang="en"></date-picker>
          </div>
        </div>



      </div>

      <grid :data="data" :columns="columns" pre="modal.feePaidDashboard.">

        <template slot="dueDate" slot-scope="item">
          <!-- {{item.row.dueDate && item.row.dueDate.toString().split('T')[0]}} -->
          {{formatDate(item.row.dueDate)}}
        </template>
        <template slot="paidDate" slot-scope="item">
          <!-- {{item.row.paidDate && item.row.paidDate.toString().split('T')[0]}} -->
          {{formatDate(item.row.paidDate)}}
        </template>




      </grid>


    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
