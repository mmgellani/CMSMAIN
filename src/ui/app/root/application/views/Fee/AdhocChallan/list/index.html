
<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.bsetup')}} </h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.adhocChallanLink')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.adhocChallanLink')">
    <template slot="portlet-body">
      <div class="row">
       
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupCampus')}}</label>
                        <span style="color:red">*</span></label>

            <select-ex :options="campusCityList" keyValue="campusId" groupBy="cityName" displayValue="campusName"
              v-model="campusId" @input="loadStaff(campusId)" >
            </select-ex>
          </div>
        </div>
        <!-- :disabled="hideSpner" -->
          <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.humanResourceStaff')}} <span style="color:red">*</span></label>
            <select-ex :options="staffList" keyValue="staffId" displayValue="fullName"  @input="refreshData" v-model="staffId"
            
               >
            </select-ex>
                  <!-- <div v-if="isLoadingStaff" class="spinner"></div> -->

          </div>
        </div>
         <div class="col-md-3">
          <div class="form-group">
            <label>Fee Head</label>
            <select-ex :options="feeHeadList" keyValue="feeHeadId" displayValue="fullName" v-model="feeHeadId"
           @input="refreshData" >
            </select-ex>
          </div>
        </div>
      </div>
      <!-- v-if="canAdd" -->
      <grid :data="data" :columns="columns" pre="modal.adhocChallanLink.">
        <template slot="action-area">
          <button  @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
         

        <template slot="action" slot-scope="item" v-if="item.row.status=='Unpaid'">
          <button @click="editModel(item.row)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>
          <button title="Print" class="btn btn-outline-success btn-icon btn-sm btn-circle"
            @click="PrintAdhocChallan(item.row.challanNo, item.row.challanTypeId)">
            <i class="fa fa-print"></i>
          </button>
          <button @click="deleteModel(item.row)" v-if="canDelete" title="Delete" type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle">
            <i class="la la-trash"></i>
          </button>
        </template>

        <!-- filters -->
        
      <template slot="dueDate" slot-scope="item">
        {{ new Date(item.row.dueDate).toISOString().slice(0, 10) }}
      </template>
        <!-- <template slot="status" slot-scope="item">
          {{item.row.status=='paid'?'Active':'InActive'}}
        </template> -->
        <template slot="status" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.status =='Paid'">Paid</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>Unpaid</span>
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="refreshData"></add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
</page-area>
