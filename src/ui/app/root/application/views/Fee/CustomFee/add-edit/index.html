<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="40%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-4">
                    <a href="#" @click="cancel" class="cancel">
                        <i class="fa fa-close"></i>
                    </a>
                </div>
                <div class="col-md-4">
                    <div class="modal-title">
                        Insert Custom Fee
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <select placeholder="Fee Head" class="form-control form-control-sm" v-model="feeHead" required>
                                <option :value="item.feeHeadId" v-for="item in feeheadModel">{{item.fullName}}</option>
                            </select>
                            <label>Fee Head<span style="color:red"> *</span></label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <select placeholder="Class" class="form-control form-control-sm" v-model="classid" required>
                                <option :value="item.classId" v-for="item in classModel">{{item.fullName}}</option>
                            </select>
                            <label>Class<span style="color:red"> *</span></label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <input type="number" v-restrict.number class="form-control form-control-sm" v-model="amount" required>
                            <label>Amount</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <select placeholder="Installment #" class="form-control form-control-sm" v-model="installment" required>
                                <option :value="1">1</option>
                                <option :value="2">2</option>
                                <option :value="3">3</option>
                                <option :value="4">4</option>
                                <option :value="5">5</option>
                                <option :value="6">6</option>
                                <option :value="7">7</option>
                                <option :value="8">8</option>
                                <option :value="9">9</option>
                                <option :value="10">10</option>
                            </select>
                            <label>Installment Number<span style="color:red"> *</span></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>
                    <button class="btn  btn-primary" @click="save">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
