<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.bsetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.concessionRenew')}} </a>
    </div>
  </template>

  <portlet-area action="0" :title="$t('navigation.concessionRenew')">
    <template slot="portlet-body">

      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSession')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId"
              @input="loadCityCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <label>{{$t('navigation.setupCampus')}}</label>
          <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" groupBy="cityName"
            v-model="campusId" @input="loadProgramsOfCampus"></select-ex>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
              groupBy="programName" v-model="programDetailId" @input="loadClass"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.class')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"></select-ex>
            </select>
          </div>
        </div>

      </div>
      <div class="row">
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.fromDate')}}</label>
            <date-picker class="input-28" id="change-width" ref="changeWidth" v-model.trim="fromdatestring"
              format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'">
            </date-picker>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.toDate')}}</label>
            <date-picker class="input-28" id="change-width" ref="changeWidth" v-model.trim="todatestring"
              format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'">
            </date-picker>
          </div>
        </div> -->

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.section')}}</label>
            <select-ex :options="courseList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId"></select-ex>
            </select>
          </div>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionRenew.installno')}}</label>
            <select-ex :options="maxInstallments" keyValue="item" displayValue="item" v-model.trim="installmentNo">
            </select-ex>

          </div>
        </div>

      </div>
      <div id="myModal" class="modal fade" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.feeApplyConcession')}}</h3>
                <p>{{$t('modal.attendanceBulkDetail.Confirmation')}}</p>
              </div>
              <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal">
                </button>
              </div>
            </div>
            <div class="modal-body">
              <p>Are you sure to Apply Concession?</p>
            </div>
            <div class="modal-footer">
              <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
                <i class="la la-close"></i>
                {{$t('button.close')}}</button>
              <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
                @click="insertModel">
                <i class="la la-save"></i> {{$t('button.save')}}</button>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12 text-right" style="margin-top: 26px;">
          <!-- <button type="button"  class="btn btn-primary btn-sm btn-hover"
              data-toggle="modal"  data-target="#myModal">{{$t('button.save')}}</button> -->
          <button title="Add With out" class="btn  btn-hover btn-sm btn-outline-primary"  @click="insertModel" :disabled="data.length==0">
            <i class="la la-save"></i> Save
          </button>
          <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> Reload
          </button>
        </div>
      </div>
      <div class="row mt-3" v-if="data.length>0">
        <div class="col-md-12">
          <div class="fixed-header-table">
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th>{{$t('modal.concessionRenew.rollNo')}}</th>
                  <th>{{$t('modal.concessionRenew.fullName')}}</th>
                  <th>{{$t('modal.concessionRenew.admissionType')}}</th>
                  <th>{{$t('modal.concessionRenew.concession')}}</th>
                  <th> <label class="kt-checkbox kt-checkbox--brand">
                      <input type="checkbox" @change="checkAll" v-model="isCheckedAll">
                      <span></span>
                    </label></th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="item.isEligible" v-for="item in data">
                  <td class="v-align-middle"> {{item.rollNo}} </td>
                  <td class="v-align-middle"> {{item.fullName}} </td>
                  <td class="v-align-middle"> {{item.admissionType}} </td>
                  <td class="v-align-middle">
                    <select class="form form-control" v-model="item.scholarshipCriteriaId">
                      <option :value="model.scholarshipCriteriaId" v-for="model in scholarshipList">
                        {{model.concessioName}}</option>
                    </select>
                  </td>
                  <td class="v-align-middle">
                    <label class="kt-checkbox kt-checkbox--brand">
                      <input v-model="item.isSelected" type="checkbox" class="custom-control-input">
                      <span></span>
                    </label>

                </div> -->

                </tr>

              </tbody>
            </table>
          </div>

        </div>

      </div>
      

      </grid>
    </template>
  </portlet-area>
</page-area>
