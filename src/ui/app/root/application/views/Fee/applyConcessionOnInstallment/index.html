<page-area>
  <template slot="breadcrumbs-area">
     <h3 class="kt-subheader__title">{{$t('navigation.fee')}}</h3>
     <span class="kt-subheader__separator kt-hidden"></span>
     <div class="kt-subheader__breadcrumbs">
        <a href="#" class="kt-subheader__breadcrumbs-home">
           <i class="flaticon2-shelter"></i>
        </a>
        <span class="kt-subheader__breadcrumbs-separator"></span>
        <a href="" class="kt-subheader__breadcrumbs-link">
           {{$t('navigation.applyConcessionOnInstallment')}}
        </a>
     </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.applyConcessionOnInstallment')">
   <template slot="portlet-body">
      <div class="row">
         <div class="col-md-3">
            <div class="form-group">
              <label for="session-id">Session</label>
              <select-ex id="session-id" :options="termModel" keyValue="sessionId" displayValue="fullName"
                v-model="sessionId"  @input="loadCityCampus" ></select-ex>
            </div>
          </div>
          <div class="col-md-3">
           <label for="campus-id">Campus</label>
           <select-ex id="campus-id" :options="campusSubCityModel" keyValue="campusId" displayValue="campusName"
             groupBy="cityName" v-model="campusId" @input="loadProgramsOfCampus"></select-ex>
         </div>
         <div class="col-md-3">
           <div class="form-group">
             <label>{{$t('modal.concessionRenew.program')}}</label>
             <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
               groupBy="programName" v-model.trim="programDetailId" @input="loadClass"></select-ex>
             </select>
           </div>
         </div>
          <div class="col-md-3">
            <div class="form-group">
               <label class="form-control-label">{{$t('modal.reports.feeReports.class')}}</label>
               <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"
               @input="loadSections" >
               </select-ex>
            </div>
          </div>
         </div>
          <div class="row">
           <div class="col-md-3">
             <div class="form-group">
                <label class="form-control-label">Section</label>
                <select-ex :options="sectionslist" keyValue="sectionId" displayValue="fullName" v-model.trim="sectionId"
                @input="loadInstallmentNo" >
                </select-ex>
             </div>
           </div>
          <div class="col-md-3">
           <div class="form-group">
              <label class="form-control-label">Installment</label>
              <select-ex :options="installmentnos" keyValue="installmentNo" displayValue="installmentNo" v-model.trim="InstallmentNo"
              @input="Getdata" >
              </select-ex>
           </div>
         </div>
         <div class="col-md-2">
         </div>
         <div class="col-md-4" style="margin-top: 30px;">
           <button @click="Getdata()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
             <i class="la la-refresh"></i> {{$t('button.reload')}}
             </button>
             <button class="btn btn-primary btn-light btn-hover btn-sm" :disabled="!isDisabled" @click="Savedata()" >Save</button>
         </div>
         </div>
          <div class="row mt-3" v-if="data.length>0">
           <div class="col-md-12">
             <div class="fixed-header-table">
               <table class="table table-striped table-hover">
                 <thead>
                   <tr>
                     <th>{{$t('modal.concessionRenew.rollNo')}}</th>
                     <th>{{$t('modal.concessionRenew.fullName')}}</th>
                     <th>{{$t('modal.concessionRenew.admissionType')}}</th>
                     <th>{{$t('modal.concessionRenew.concession')}}</th>
                     <th>Remarks</th>
                     <th> <label class="kt-checkbox kt-checkbox--brand">
                         <input type="checkbox"  @change="updall" v-model="chkall">
                         <span></span>
                       </label></th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr  v-for="item in data">
                     <td class="v-align-middle"> {{item.rollNo}} </td>
                     <td class="v-align-middle"> {{item.studentName}} </td>
                     <td class="v-align-middle"> {{item.admissionType}} </td>
                     <td class="v-align-middle">
                      
                       <select class="form form-control" v-model="item.scholarshipCriteriaId" v-if="item.admissionType=='Regular'">
                        <option :value="model.scholarshipCriteriaId" v-for="model in scholarshipList" required v-if="data">
                          {{model.concessioName}}</option>
                      </select>
                      <select class="form form-control" v-model="item.scholarshipCriteriaId" v-else>
                        <option :value="model.scholarshipCriteriaId" v-for="model in scholarshipListEX" required v-if="data">
                          {{model.concessioName}}</option>
                      </select>
                     </td>
                     <td class="v-align-middle">
                       <select class="form form-control" v-model="item.remarks">
                         <option :value="model.remarks" v-for="model in concessionremarksmarkslist" required v-if="data">
                           {{model.remarks}}</option>
                       </select>
                     </td>
                     <td class="v-align-middle">
                       <label class="kt-checkbox kt-checkbox--brand">
                         <input type="checkbox" :disabled="item.scholarshipCriteriaId=='00000000-0000-0000-0000-000000000000'   || item.remarks==null "  v-model="item.isChecked" @change="updatechek()">
                         <span></span>
                       </label>
                       <!-- <div class="custom-control custom-checkbox">
                     <input v-model="item.isSelected" type="checkbox" class="custom-control-input" :id="item.rollNo">
                     <label class="custom-control-label" :for="item.rollNo"></label>
                   </div> -->
                     </td>
                   </tr>
                 </tbody>
               </table>
             </div>
           </div>
         </div>
   </template>
</portlet-area>
</page-area>
