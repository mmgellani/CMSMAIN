<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.fee')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.feeSubInstallment')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.feeSubInstallment')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeSubInstallment.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeSubInstallment.campus')}}</label>
            <select-ex :options="campusCityList" v-model.trim="campusId" keyValue="campusId" displayValue="campusName"
              groupBy="cityName"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeSubInstallment.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="campusProgramId" displayValue="description"
              groupBy="programName" v-model.trim="campusProgramId"></select-ex>
            </select>
          </div>
        </div>
        <!-- <div class="col-md-3 text-right">
          <button @click="GetAllFilterData" class="b-refresh mt-4">
            <feather icon="refresh-ccw"></feather>
          </button>
        </div> -->
      </div>
      <grid :data="data" :columns="columns" pre="modal.feeSubInstallment.">
        <template slot="action-area">
          <!-- <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button> -->
          <button @click="GetAllFilterData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row.refferenceNo)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>
        </template>
      </grid>
    </template>
  </portlet-area>
  <student-sub-installment-add-edit-model v-on:submit="GetAllFilterData"></student-sub-installment-add-edit-model>
  <delete-model v-on:submit="GetAllFilterData"></delete-model>
</page-area>
