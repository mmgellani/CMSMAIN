<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.fee')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('modal.previousFee.previousFee')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('modal.previousFee.previousFee')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.previousFee.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId"
              @input="loadCityCampus">
            </select-ex>
            <!-- <select @change="loadCityCampus" v-model="sessionId" class="form-control form-control-sm" required>
                <option :value="model.sessionId" v-for="(model,index) in sessionList">{{model.fullName}} </option>
              </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.previousFee.campus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" v-model.trim="campusId"
              @input="refreshData" groupBy="cityName"></select-ex>
            </select>
            <!-- <drop-down v-model="campusId" :data="campusCityList" @change="refreshData" group-by="cityName"
            key-value="campusId" display-value="campusName" placeholder="Campus" :id="indexId">
          </drop-down> -->
          </div>
        </div>
      </div>
      <grid :data="data" :columns="columns" pre="modal.previousFee.">
        <template slot="action-area">
          <!-- <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button> -->
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>
        </template>
        <template slot="statusId" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1">Active</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>InActive</span>
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
