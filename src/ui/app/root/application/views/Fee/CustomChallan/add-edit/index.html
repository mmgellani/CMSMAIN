<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="60%"
    @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.customChallan')}}</h3>
                <p> {{title}}</p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>{{$t('modal.customChallan.challanType')}}<span style="color:red"> *</span></label>
                        <select-ex :options="challanTypeList" keyValue="challanTypeId" displayValue="fullName"
                            v-model="challanTypeId" @input="loadFeeHeads()">
                        </select-ex>

                        <!-- <select class="form-control" @change="loadFeeHeads()" v-model="challanTypeId">
                            <option :value="model.challanTypeId" v-for="(model,index) in challanTypeList">
                                {{model.fullName}}
                            </option>
                        </select> 
                    <label>Challan Due Date</label>
                    -->

                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>{{$t('modal.customChallan.feeHead')}}<span style="color:red"> *</span></label>
                        <select-ex :options="feeHeadList" keyValue="feeHeadId" displayValue="fullName"
                            v-model="feeHeadId" @input="loadFeeHeadName">
                        </select-ex>

                        <!-- <select class="form-control" v-model="feeHeadId" @change="loadFeeHeadName">
                            <option :value="model.feeHeadId" v-for="(model,index) in feeHeadList">{{model.fullName}}
                            </option>
                        </select>
                        <label style="margin-left:15px;">FeeHead</label> -->

                    </div>
                </div>
            </div>
            <div class="row">

                <div class="col-md-6">
                    <div class="form-group">
                        <div class="row">
                            <div class="col-md-8">
                                <label>{{$t('modal.customChallan.class')}}<span style="color:red"> *</span></label>
                            </div>
                            <div class="col-md-4 text-right">
                                <span class="kt-switch kt-switch--sm kt-switch--icon">
                                    <label class="m-0">
                                        <input @change="resetMessage()" class="switch" v-model="hasClass"
                                            type="checkbox">
                                        <span></span>
                                    </label>
                                </span>
                            </div>
                        </div>
                        <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"
                            @input="loadFeeHeads()" :disabled="!hasClass">
                        </select-ex>
                    </div>
                </div>
                <!-- <div class="col-md-6">
                    <div class="row">
                        <div class="col-md-10">
                            <div class="form-group">
                                <label>{{$t('modal.customChallan.class')}}<span style="color:red"> *</span></label>
                                <select-ex :options="classList" keyValue="classId" displayValue="fullName"
                                    v-model="classId" @input="loadFeeHeads()" :disabled="!hasClass">
                                </select-ex>

                            </div>
                        </div>
                        <div class="col-md-2" style="margin-top: 2rem ;">
                            <span class="kt-switch kt-switch--sm">
                                <label class="m-0">
                                    <input @change="resetMessage()" class="switch" v-model="hasClass" type="checkbox">
                                    <span></span>
                                </label>
                            </span>
                    
                        </div>
                    </div>
                </div> -->
                <div class="col-md-6 mt-2">
                    <div class="form-group">
                        <label>{{$t('modal.customChallan.remarks')}}</label>
                        <input type="text" v-model="remarks" class="form-control form-control-sm">
                    </div>
                </div>
            </div>
            <div class="row" v-if="feeHeadName.length>0">
                <div class="col-md-6">
                    <form-group>
                        <label>{{feeHeadName}}</label>
                        <input type="number" class="form-control form-control-sm" v-model="amount" />
                    </form-group>

                </div>
                <div class="col-md-6">
                    <!-- <input type="date" min="" class="form-control" :value="dueDate && dueDate.toString().split('T')[0]"
                        @input="dueDate = $event.target.value"> -->
                    <div class="form-group">
                        <label>{{$t('modal.customChallan.challanDueDate')}}</label>
                        <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="dueDate"
                            format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker>
                    </div>

                </div>
            </div>

        </div>
        <div class="modal-footer">
            <div class="row">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-light btn-hover btn-sm btn-primary" :disabled='isDisable' @click="save()"> <i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
