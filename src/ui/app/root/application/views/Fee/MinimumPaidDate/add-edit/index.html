<modal name="add-edit-model" :clickToClose="false" :width="614" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="true" transition="bounce" top="10"   height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-10 modal_heading">
                <h3 class="modal-title">{{$t('navigation.minimumPaidDate')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-2 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label"> {{$t('modal.setupMinimumPaidDate.city')}}</label>
                        <select-ex :options="citylist" keyValue="cityId" displayValue="fullName" v-model.trim="cityId">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.setupMinimumPaidDate.subCity')}}<span
                                style="color:red">
                                *</span></label>
                        <select-ex :options="subCityList" keyValue="subCityId" displayValue="name"
                            v-model.trim="data.subCityId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.subCityId.$error">
                            <span v-if="!$v.data.subCityId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupMinimumPaidDate.minDays')}}<span style="color:red">
                                *</span></label>
                        <input type="number" class="form-control  " v-model.trim="data.minDays"
                            :class="{'is-invalid' : $v.data.minDays.$error}" @input="$v.data.minDays.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.minDays.$error">
                            <span v-if="!$v.data.minDays.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
