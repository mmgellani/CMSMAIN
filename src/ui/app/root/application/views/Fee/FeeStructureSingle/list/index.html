<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-title">
        Fee Structure
      </div>
      <div class="card-body">
        <div v-if="canRead">
          <grid :data="data" :columns="columns">
            <template slot="operation-links">
              <div class="row">
                <div class="col-md-3">
                  <div class="form-group">
                    <select v-model="zoneId" @change="loadSession" class="form-control form-control-sm" required>
                      <option :key="index" :value="model.zoneId" v-for="(model,index) in zoneList">{{model.fullName}}
                      </option>
                    </select>
                    <label>Zone</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="loadPrograms" v-model="sessionId" class="form-control form-control-sm" required>
                      <option :key="index" :value="model.sessionId" v-for="(model,index) in sessionList">{{model.fullName}}
                      </option>
                    </select>
                    <label>Session</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="refreshData" v-model="programId" class="form-control form-control-sm" required>
                      <option :key="index" :value="model.programId" v-for="(model,index) in programList">{{model.fullName}}
                      </option>
                    </select>
                    <label>Program</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <button v-if="canAdd" @click="insertModel" class="b-add">
                    <feather icon="plus-circle"></feather>
                  </button>
                  <button @click="refreshData" class="b-refresh">
                    <feather icon="refresh-ccw" ></feather>
                  </button>
                </div>
              </div>
            </template>
            <template slot="statusId" slot-scope="item">
              {{item.row.statusId==1?'Active':'InActive'}}
            </template>
            <template slot="action" slot-scope="item">
                <a  @click="editModel(item.row)" v-if="canEdit && item.row.isApproved == false">
                  
                    <feather icon="edit" xclass="b-edit"></feather>
                  </a>
               <!-- <a @click="deleteModel(item.row)" v-if="canDelete">
               <feather icon="trash" xclass="b-delete"></feather>
              </a> -->
            </template>

          </grid>



        </div>
      </div>
    </div>
  </div>

  <add-edit-model v-on:submit="refreshData"></add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
  <feeStructure-edit  v-on:submit="refreshData"></feeStructure-edit>
</div>
