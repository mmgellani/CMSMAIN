<main>
    <div class="row">
        <div class="col-md-3">
        </div>
        <div class="col-md-9 text-center">
            <b>{{program.fullName}}</b>
            <div class="row">
                <div :class="shiftSpacing" v-for="shifts in shiftList">
                    <b> {{shifts.fullName}}</b>
                    <div class="row">
                        <div :class="classSpacing" v-for="classes in classList">
                            <b>{{classes.fullName}}</b>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="col-md-12" v-for="fhead in feeHeadList"><b>{{fhead.fullName}}</b></div>
        </div>

        <div class="col-md-9">
            <div class="row" style="margin-top:5px;">
                <div :class="classShiftSpacing" v-for="(item, index) in values">
                    <input type="number" v-model="item.value" class="form-control form-control-sm" placeholder="Enter Amount" @change="repopulateInstllment" />
                </div>
            </div>
        </div>
    </div>
    <!-- for displaying total -->
    <div class="row" style="margin-top:5px;">
        <div class="col-md-3">
            <div class="col-md-12"> <b>Total</b> </div>
        </div>
        <div class="col-md-9">
            <div class="row">
                <div :class="classShiftSpacing" v-for="(item, index) in total">
                    <input type="text" v-model="item.value" class="form-control form-control-sm" placeholder="Enter Amount" readonly />
                </div>
            </div>
        </div>
    </div>

    <!---for displaying installments dynamically-->
    <div class="row" style="margin-top:20px;">
        <div v-for="(item, index) in val" class="col-md-12 vs-border">
            <h6>
                Installment #{{index+1}}
            </h6>
            <div class="row" style="margin-top:5px;">
                <div class="col-md-3">
                    <div class="row">
                        <div class="col-md-12" style="margin-top:15px" v-for="fhead in feeHeadList"> <b>{{fhead.fullName}}</b>
                        </div>
                    </div>
                </div>
                <div class="col-md-9">
                    <div class="row">
                        <div :class="classShiftSpacing" v-for="(itemss, ind) in values">
                            <input @change="calculateInstallmentTotal" type="text" v-model="item.feestr[ind].value"
                                class="form-control form-control-sm" placeholder="Enter Amount" readonly />
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">
                    <div class="row">
                        <div class="col-md-9" style="margin-top:5px;"> <b>Total</b></div>
                    </div>
                </div>
                <div class="col-md-9">
                    <div class="row">
                        <div :class="classShiftSpacing" v-for="(itemz, ind) in tempFeestrIter">
                            <input type="text" v-model="totalInstallments[index].feestr[ind].value" class="form-control form-control-sm"
                                placeholder="Enter Amount" readonly />
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>
