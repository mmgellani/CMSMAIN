<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true" :scrollable="true"
    :adaptive="false" transition="nice-modal-fade" width="40%" height="auto" @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header clearfix text-left">
            <h5>Model
                <span class="semi-bold">{{title}}</span>
            </h5>
            <div v-if="!IsNewRecord" class="col-md-12">
                <div class="form-group">
                    <input class="switch" type="checkbox" v-model="isActive">
                </div>
            </div>
        </div>
        <div class="modal-body">
            <form role="form">
                <div class="form-group-attached">
                    <div class="row">
                            <div class="col-md-6">
                                    <div class="form-group">
                                            <input class="form-control form-control-sm" v-model="data.referrenceNo" />
                                            <label>Ref #</label>
                                    </div>
                            </div>
                        <div class="form-group col-md-6">
                                <div class="col-md-6">
                                        <div class="form-group">
                                                <input class="form-control form-control-sm" v-model="data.fullName" />
                                                <label>Name</label>
                                        </div>
                                </div>
                                </div>
                                </div>
                                <br>
                                <div class="row">
                                        <div class="col-md-6">
                                                <div class="form-group">
                                                        <input class="form-control form-control-sm" v-model="data.fatherName" />
                                                        <label>Father Name</label>
                                                </div>
                                        </div>
                                        <div class="col-md-6">
                                                <div class="form-group">
                                                        <input class="form-control form-control-sm" v-model="data.percentage" />
                                                        <label>Percentage</label>
                                                </div>
                                        </div>
                            
                        </div>

                    </div>
                    
                </div>
            </form>
            <div class="row">
                <div class="col-md-8"> </div>
                <div class="col-md-4">
                    <div class="row">
                        <div class="col-md-6">
                            <a href="#" class="btn btn-danger btn-block m-t-5" @click="cancel">
                                <i class="card-icon card-icon-close"></i> Close</a>
                        </div>
                        <div class="col-md-6">
                            <a href="#" class="btn btn-primary btn-block m-t-5" @click="saveModel">
                                <i class="fa fa-save"></i> Save</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</modal>
