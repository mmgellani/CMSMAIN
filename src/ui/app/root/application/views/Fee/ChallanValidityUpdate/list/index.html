<page-area>

  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.bsetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.feeChallanValidityUpdate')}} </a>
    </div>
  </template>
  <tabs>
    <tab name='Enrolled Students' :selected="true">
      <portlet-area action="1" :title="$t('navigation.feeChallanValidityUpdate')">

        <template slot="portlet-body">


          <div class="row">
            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.feeChallanValidityUpdate.session')}}</label>
                <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
                  v-model.trim="sessionId">
                </select-ex>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.feeChallanValidityUpdate.campus')}}</label>
                <select-ex :options="campusCityList" v-model.trim="campusId" keyValue="campusId"
                  displayValue="campusName" groupBy="cityName" @input="loadProgramsOfCampus"></select-ex>
                </select>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.feeChallanValidityUpdate.program')}}</label>
                <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
                  groupBy="programName" v-model.trim="programDetailId" @input="loadClass"></select-ex>
                </select>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-group">
                <label>{{$t('modal.feeChallanValidityUpdate.class')}}</label>
                <select-ex @input="loadProgramSection" :options="classList" keyValue="classId" displayValue="fullName"
                  v-model.trim="classId"></select-ex>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-3">
              <div class="form-group">
                <div class="row">
                  <div class="col-md-8">
                    <label>{{$t('modal.feeChallanValidityUpdate.gender')}}</label>
                  </div>
                  <div class="col-md-4 text-right">
                    <span class="kt-switch kt-switch--sm kt-switch--icon">
                      <label class="m-0">
                        <input type="checkbox" checked="checked" v-model="checkgender"
                          @change="addParam(checkgender,'GenderId')">
                        <span></span>
                      </label>
                    </span>
                  </div>
                </div>
                <select-ex :disabled="!checkgender" @input="addParam(checkgender,'GenderId')" :options="genderlist"
                  keyValue="genderId"  displayValue="description" v-model.trim="genderId">
                </select-ex>
              </div>
  
            </div>
            
            <div class="col-md-3">
              <div class="form-group">
                <div class="row">
                  <div class="col-md-8">
                    <label>{{$t('modal.feeChallanValidityUpdate.section')}}</label>
                  </div>
                  <div class="col-md-4 text-right">
                    <span class="kt-switch kt-switch--sm kt-switch--icon">
                      <label class="m-0">
                        <input type="checkbox" checked="checked" v-model="checkSection"
                          @change="addParam(checkSection,'SectionCourseLinkId')" >
                        <span></span>
                      </label>
                    </span>
                  </div>
                </div>
                <select-ex  :disabled="!checkSection" @input="addParam(checkSection,'SectionCourseLinkId')" :options="sectionCourseLinkList" keyValue="sectionCourseLinkId"
                  displayValue="sectionName"  v-model.trim="sectionCourseLinkId"></select-ex>
              </div>
            </div>


            <div class="col-md-3">
              <div class="form-group mb-0 mt-2">
                <label>{{$t('modal.helper.Concession.installmentNo')}}</label>
                <select-ex @input="refreshData" :options="maxInstallments" keyValue="item" displayValue="item"
                  v-model="installmentNo">
                </select-ex>
              </div>
            </div>

          </div>
          <grid :data="StudentList" :columns="columns" pre="modal.feeChallanValidityUpdate.">
            <template slot="action-area">
              <button data-toggle="modal" data-target="#myModal" class="btn btn-hover btn-sm btn-primary"
                :disabled="!shouldSave || enablebutton===false">
                <i class="la la-floppy-o"></i>{{$t('button.save')}}</button>              
              <button type="button" class="btn btn-hover btn-sm btn-outline-primary" @click="generateChallanReport"
                :disabled="!shouldSave || enableprintbutton===false"> <i
                  class="la la-print"></i>{{$t('modal.feeChallanValidityUpdate.printChallan')}}</button>   

                <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
                  <i class="la la-refresh"></i> {{$t('button.reload')}}
                </button>
              
            </template>
            <template slot="isSelected-header"  slot-scope="item">
              <label class="kt-checkbox kt-checkbox--brand mb-0" >
                {{$t('modal.feeChallanValidityUpdate.checkAll')}}<input class="mb-0" type="checkbox" @change="checkAll"
                  v-model="selectAll">
                <span></span>
              </label>
            </template>
            <template slot="isSelected"  slot-scope="item" >
              <label class="kt-checkbox kt-checkbox--brand">

                <input type="checkbox" @change="updatedata(item.row.challanNo)" v-model="item.row.isSelected" :disabled="!item.row.expiredButton">
                <span></span>

              </label>
            </template>
            <template slot="dueDate" slot-scope="item">
              {{item.row.dueDate|formatDMY}}
            </template>
            <template slot="newDueDate" slot-scope="item">
              {{item.row.newDueDate|formatDMY}}
            </template>
          </grid>


        </template>
      </portlet-area>
    </tab>
    <!-- <report-engine :data="reportData" :path="report"></report-engine> -->
    <div id="myModal" class="modal fade" role="dialog">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <div class="col-md-6 modal_heading">
              <h3 class="modal-title">{{$t('navigation.feeChallanValidityUpdate')}}</h3>
              <p>{{$t('dict.update')}}</p>
            </div>
            <div class="col-md-6 text-right">
              <button type="button" class="close " data-dismiss="modal">
              </button>
            </div>
          </div>
          <div class="modal-body">
            <p>Are you sure that you want to Update Challan Validity of these students?</p>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
              <i class="la la-close"></i>
              {{$t('button.close')}}</button>
            <button class="btn btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
              :disabled="StudentList.length==0" @click="insertModel">
              <i class="la la-save"></i> {{$t('button.save')}}</button>
          </div>
        </div>
      </div>
    </div>


    <tab name='Candidates'>
      <div class="row">
        <div class="col-md-12">
          <disable-challan></disable-challan>
        </div>
      </div>

    </tab>

  </tabs>
</page-area>
