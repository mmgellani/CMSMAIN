<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.bsetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        Challan Validity Update (All) </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.feeChallanValidityUpdate')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeChallanValidityUpdate.session')}}</label>
            <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model.trim="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeChallanValidityUpdate.campus')}}</label>
            <select-ex :options="campusCityList" v-model.trim="campusId" keyValue="campusId" displayValue="campusName"
              groupBy="cityName" @input="loadProgramsOfCampus"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeChallanValidityUpdate.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
              groupBy="programName" v-model.trim="programDetailId" @input="loadClass"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeChallanValidityUpdate.class')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName"
              v-model.trim="classId"></select-ex>
          </div>
        </div>
      </div>
      <div class="row mb-3">
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeChallanValidityUpdate.section')}}</label>
            <select-ex @input="refreshData" :options="sectionCourseLinkList" keyValue="sectionCourseLinkId"
              displayValue="sectionName" v-model.trim="sectionCourseLinkId"></select-ex>
          </div>
        </div> -->

        <div class="col-md-3">
          <div class="form-group mb-0">
            <label>Gender</label>
            <select-ex :options="genderlist" keyValue="genderId" displayValue="description" v-model="genderide">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group mb-0">
            <label>{{$t('modal.helper.Concession.installmentNo')}}</label>
            <select-ex @input="refreshData" :options="maxInstallment" keyValue="item" displayValue="item"
              v-model="installmentNo">           
            </select-ex>
          </div>
        </div>

      </div>
      <grid :data="StudentList" :columns="columns" pre="modal.feeChallanValidityUpdate.">
        <template slot="action-area">
          <button data-toggle="modal" @click="insertModel" class="btn btn-hover btn-sm btn-primary"
            :disabled="!shouldSave">
            <i class="la la-floppy-o"></i>{{$t('button.save')}}</button>
          <button type="button" class="btn btn-hover btn-sm btn-outline-primary" @click="generateChallanReport"
            :disabled="StudentList.length==0 || enableprintbutton===false"> <i
              class="la la-print"></i>{{$t('modal.feeChallanValidityUpdate.printChallan')}}</button>


          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>

        </template>
        <template slot="isSelected-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">
            {{$t('modal.feeChallanValidityUpdate.checkAll')}}<input class="mb-0" type="checkbox"  @change="checkAll"
              v-model="selectAll">
            <span></span>
          </label>
        </template>
        <template slot="isSelected" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand">
            <input type="checkbox" @change="updatedata()" v-model="item.row.isSelected">
            <span></span>
          </label>
        </template>
        <template slot="dueDate" slot-scope="item">
          {{item.row.dueDate|formatDMY}}
        </template>
      </grid>
    </template>
  </portlet-area>
