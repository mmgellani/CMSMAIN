<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.ssetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.fsetup')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.feeConcession')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.feeConcession')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeConcession.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId" @input="loadZone"></select-ex>
            
            <!-- <select @change="loadZone" v-model="sessionId" class="form-control form-control-sm" required>
              <option :key="index" :value="model.sessionId" v-for="(model,index) in sessionList">
                {{model.fullName}}
              </option>
            </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeConcession.zone')}}</label>
            <select-ex :options="zoneList" keyValue="zoneId" displayValue="fullName" v-model="zoneId" @input="loadPrograms">
            </select-ex>
            <!-- <select @change="loadPrograms" v-model="zoneId" class="form-control form-control-sm" required>
                <option :key="index" :value="model.zoneId" v-for="(model,index) in zoneList">{{model.fullName}}
                </option>
              </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.feeConcession.program')}}</label>
            <select-ex :options="programList" keyValue="programId" displayValue="fullName" v-model="programId" @input="refreshData">
            </select-ex>
            <!-- <select @change="refreshData" v-model="programId" class="form-control form-control-sm" required>
                <option :key="index" :value="model.programId" v-for="(model,index) in programList">
                  {{model.fullName}}
                </option>
              </select> -->
          </div>
        </div>
      </div>
      <grid :data="data" :columns="columns" pre="modal.feeConcession.">
        <template slot="action-area">
          <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>
          <button @click="deleteModel(item.row)" v-if="canDelete" title="Delete" type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle">
            <i class="la la-trash"></i>
          </button>
        </template>
        <template slot="statusId" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1">Active</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>InActive</span>
        </template>
      </grid>
    </template>
  </portlet-area>
  <Concession-add-edit-model v-on:submit="refreshData"></Concession-add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
</page-area>
