<modal name="Bank-add-edit-model" :clickToClose="false" :width="614" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="true" transition="bounce" top="10"   height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.feeBank')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" >
                <div class="col-md-6" v-if="!IsNewRecord">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>

               
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        Show ACC # on Challan
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" @change="checkAll" v-model="isEnabled">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.setupBank.fullName')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.data.fullName.$error}" v-model.trim="data.fullName"
                            @input="$v.data.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fullName.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupBank.address')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  " v-model.trim="data.address"
                            :class="{'is-invalid' : $v.data.address.$error}" @input="$v.data.address.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.address.$error">
                            <span v-if="!$v.data.address.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.setupBank.accountTitle')}}<span
                                style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.data.accountTitle.$error}" v-model.trim="data.accountTitle"
                            @input="$v.data.accountTitle.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.accountTitle.$error">
                            <span v-if="!$v.data.accountTitle.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.setupBank.accountNo')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  " v-model.trim="data.accountNo"
                            :class="{'is-invalid': $v.data.accountNo.$error}" @input="$v.data.accountNo.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.accountNo.$error">
                            <span v-if="!$v.data.accountNo.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">

                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> Abbreviation
                                <input type="text" class="form-control  " v-model.trim="data.abbreviation">
                        </label>

                    
                </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> City<span
                                style="color:red">
                                *</span></label>
                                <select-ex :options="citylist" keyValue="cityId" displayValue="fullName"
                                v-model="data.cityId">
                            </select-ex>
                    </div>
                </div>


            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
