<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.dashboard')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.revenueDashboard')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.revenueDashboard')">
    <template slot="portlet-body">
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.session')}}<span style="color:red">
                *</span></label>
            <select-ex @input="refreshData()" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model="sessionId">
            </select-ex>
          </div>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.cities')}}<span style="color:red">
                *</span></label>
            <select-ex @input="loadProgramsOfCampus" :options="cityList" keyValue="cityId" displayValue="fullName"
              v-model="cityId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.concessionDashboard.program')}}<span style="color:red">
                *</span></label>
            <select-ex @input="loadData" :options="campusProgramLinkList" keyValue="programDetailId"
              displayValue="description" v-model="programDetailId" groupBy="programName" ></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <collapsible-widget class="col-md-12">
          <template slot="title">
            Revenue per city
          </template>
          <template slot="content">
            <Highcharts :options="options" />
          </template>
        </collapsible-widget>
      </div>
      <div class="row mt-4">
        <div class="col-md-12 text-right">
          <button @click="loadcsv" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            {{$t('button.exporttoexcel')}}<i class="la la-file-excel-o"></i>
          </button>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <div class="fixed-header-table ">
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th>
                    Cluster
                  </th>
                  <th>
                    City
                  </th>
                  <th>
                    Total Student
                  </th>
                  <th>
                    Total Revenue
                  </th>
                  <th>
                    Average/Student
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in data">
                  <td>{{item.zoneName}}</td>
                  <td>{{item.city}}</td>
                  <td>{{item.students}}</td>
                  <td>{{item.revenue}}</td>
                  <td>{{item.averagePrStd}}</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
