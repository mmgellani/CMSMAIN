<modal name="preview-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5"
  :reset="true" :scrollable="true" :adaptive="false" transition="bounce" width="70%" top="10" height="auto"
  @before-open="beforeModalOpen">

  <div class="modal-content">
    <!-- <div class="modal-header">
      <div class="col-md-6 modal_heading">
        <h3 class="modal-title">{{$t('Exam Schedule')}}</h3>

      </div>
      <div class="col-md-6 text-right">
        <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
          <i class="la la-close"></i>
        </button>
      </div>
    </div> -->
    <div class="modal-body">
     
      <div class="row" >
        <portlet-area action="1" :title="$t('navigation.examScheduleDetail')">

          <template slot="portlet-body" v-if="canRead">

            <div class="row">
             
              <div  class="col-md-10 text-center">
                <span v-if="examUpdateDataList.length>0" style="margin-right: 5px; font-size: larger;" class="badge badge-secondary">Update</span>
                <span v-else style="margin-right: 5px; font-size: larger;" class="badge badge-secondary">New Record</span>

              </div>
            </div>
            <br>
            <grid :data="datas" :columns="columns" pre="modal.examBulk.">
              <template slot="action-area">
                <button v-if="canAdd" @click="insertModel"  class="btn btn-light btn-hover btn-sm btn-primary">
                  <i class="la la-save"></i>{{$t('button.save')}}
                </button>
                <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-primary">
                  <i class="la la-refresh"></i> {{$t('button.reload')}}
                </button>
              </template>
              <template slot="attendanceStatusId" slot-scope="item">
                <!-- <select-ex :disabled="item.row.isApproved" @change="checks(item.row)" v-model="item.row.attendanceStatusId">
                  <option :key="index" :value="model.attendenceStatusId" v-for="(model,index) in attendanceStatusList">
                    {{model.fullName}}</option>
                </select-ex> -->
      
                <select-ex :disabled="item.row.isApproved|| item.row.shouldAbsent" @change="checks(item.row)" :options="attendanceStatusList"
                  keyValue="attendenceStatusId" displayValue="fullName" v-model.trim="item.row.attendanceStatusId">
                </select-ex>
              </template>
              <template slot="obtainMarks" slot-scope="item">
                <input type="number" :disabled="item.row.attendanceStatusId!=presentStatusId || item.row.isApproved"
                  v-model="item.row.obtainMarks" class="form-control form-control-sm"></input>
              </template>
              <template slot="statusId" slot-scope="item">
                {{item.row.statusId==1?'Active':'InActive'}}
              </template>
              <!-- <template slot="action" slot-scope="item">
                <a @click="editModel(item.row)" v-if="canEdit">
                  <feather icon="edit" xclass="b-edit"></feather>
                </a>
                <a @click="deleteModel(item.row)" v-if="canDelete">
                  <feather icon="trash" xclass="b-delete"></feather>
                </a>
              </template> -->
            </grid>
            <!-- </div> -->
          </template>
        </portlet-area>
      </div>

    

    


    </div>
    <div class="modal-footer">
      <div class="row text-right">
        <div class="col-md-12">
          <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <!-- <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i class="la la-floppy-o"></i>
            {{$t('button.save')}}</button> -->
          <!-- <button class="btn btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button> -->
        </div>
      </div>
    </div>
  </div>

</modal>
