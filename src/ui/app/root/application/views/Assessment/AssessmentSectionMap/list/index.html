<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.AssessmentSectionMap')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"
        ><i class="flaticon2-shelter"></i
      ></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.AssessmentSectionMap')}}
      </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.AssessmentSectionMap')">
    <template slot="portlet-body">
      <div class="row">
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.session')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="sessionList"
              keyValue="sessionId"
              displayValue="fullName"
              v-model.trim="sessionId"
              @change="refreshData"
            >
            </select-ex>
          </div>
        </div> -->

        <div class="col-md-3">
          <div class="form-group">
            <label for="session-id">Session <span style="color:red"> *</span></label>
            <select-ex id="session-id" :options="termModel" keyValue="sessionId" displayValue="fullName"
              v-model="sessionId"  @input="loadCity" ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label for="city-id">{{$t('navigation.setupCity')}} <span style="color:red"> *</span></label>
            <select-ex :options="cityList" keyValue="cityId" displayValue="fullName" v-model="cityId"
              @input="loadSubCity"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label class="form-control-label">{{$t('modal.reports.feeReports.subCity')}} <span style="color:red"> *</span></label>
            <select-ex :options="subCityList" keyValue="subCityId" displayValue="subCityName" v-model="subCityId"
            @input="loadSubCityCampus">
            </select-ex>
          </div>
        </div>
       
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.campus')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="campusSubCityListExx"
              groupBy="cityName"
              keyValue="campusId"
              displayValue="campusName"
              v-model="campusId"
              @input = "loadLevels"
            ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>Level<span style="color:red"> *</span></label>
            <select-ex :options="levelList" keyValue="levelId" displayValue="fullName"  v-model="levelId"
            @input = "loadProgramsOfLevelsAndCampus"
           ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <!-- <label>Programs<span style="color:red">*</span></label> -->
            <div class="row">
              <div class="col-md-8">
                <label>Programs</label>
              </div>
              <div class="col-md-4 text-right">
                <span class="kt-switch kt-switch--sm kt-switch--icon"
                  ><label class="m-0"
                    ><input
                      type="checkbox"
                      checked="checked"
                      v-model="viewPrograms"
                      
                      @change="showAllRecord()"/>
                    <span></span></label
                ></span>
              </div>
            </div>
            <select-ex
              :options="programList1"
              groupBy="programName"
              keyValue="programId"
              displayValue="programName"
              v-model="programId"
              multiple
              :disabled="!viewPrograms"
              @input = "loadProgramDetailofPrograms"
            ></select-ex>
          </div>
        </div>
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label
              >{{$t('modal.registrationSectionCourseLink.programs')}}<span style="color:red">
                *</span></label>
            <select-ex
              :options="campusProgramLinkList"
              groupBy="programName"
              keyValue="campusProgramId"
              displayValue="description"
              v-model.trim="campusProgramId"
            ></select-ex>
          </div>
        </div> -->
        <div class="col-md-3">
          <div class="form-group">
            <!-- <label>Programn Detail<span style="color:red">
                *</span></label> -->
                <div class="row">
                  <div class="col-md-8">
                    <label>Programs Detail</label>
                  </div>
                  <div class="col-md-4 text-right">
                    <span class="kt-switch kt-switch--sm kt-switch--icon"
                      ><label class="m-0"
                        ><input
                          type="checkbox"
                          checked="checked"
                          v-model="viewProDet"
                          :disabled="!viewPrograms"
                          @change="showAllRecordData()"/>
                        <span></span></label
                    ></span>
                  </div>
                </div>
                <select-ex
                :options="campusProgramLinkList"
                groupBy="programName"
                keyValue="campusProgramId"
                displayValue="description"
                multiple
                :disabled="!viewProDet || !viewPrograms"
                v-model="campusProgramId"
              ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.registrationSectionCourseLink.class')}}<span style="color:red">
              *</span></label>
            <select-ex
              :options="classList"
              groupBy="cityName"
              keyValue="classId"
              displayValue="fullName"
              v-model="classid"
              @input = "refreshData"
            ></select-ex>
          </div>
        </div>
        <!-- <div class="col-md-3">
          <div class="form-group validated">
            <label
              >{{$t('navigation.boards')}}<span style="color:red">
                *</span
              ></label
            >
            <select-ex
              :options="boardList"
              keyValue="boardId"
              displayValue="fullName"
              v-model.trim="boardId"
            >
            </select-ex>
          </div>
        </div> -->
      </div>
      <grid
        :data="data"
        :columns="columns"
        pre="modal.AssessmentSectionMap."
      >
        <template slot="action-area">
          <button
            v-if="canAdd"
            @click="insertModel"
            class="btn btn-light btn-hover btn-sm btn-outline-primary"
          >
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button
            @click="refreshData"
            class="btn btn-light btn-hover btn-sm btn-outline-primary"
          >
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button
            @click="editModel(item.row)"
            v-if="canEdit"
            title="Edit"
            type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle"
          >
            <i class="la la-edit"></i>
          </button>

          <button
            @click="deleteModel(item.row)"
            v-if="canDelete"
            title="Delete"
            type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle"
          >
            <i class="la la-trash"></i>
          </button>
        </template>
        <template slot="statusId" slot-scope="item">
          <span
            class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1"
            >Active</span
          >
          <span
            class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill"
            v-else
            >InActive</span
          >
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="refreshData"></add-edit-model>
  <!-- <add-edit-bulk-model v-on:submit="refreshData"></add-edit-bulk-model> -->
  <delete-model v-on:submit="refreshData"></delete-model>
</page-area>
