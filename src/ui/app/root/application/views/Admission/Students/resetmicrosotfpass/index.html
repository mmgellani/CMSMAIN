<modal name="microsof-password-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5"
  :reset="true" :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="40%"
  @before-open="beforeModalOpen">
  <div class="modal-content">
    <div class="modal-header">
      <div class="col-md-6 modal_heading">
        <h5 class="modal-title">Reset Microsoft Password</h5>
        <p> {{title}} </p>
      </div>
      <div class="col-md-6 text-right">
        <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
          <i class="la la-close"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">

      <div class="row">
        <div class="col-md-3">
          <h6>Email:</h6>
        </div>
        <div class="col-md-5">
          <label>{{data.rollNo}}</label>
        </div>
      </div>
      <div class="row mt-3">

        <div class="col-md-3">
          <h6>Password:</h6>
        </div>
        <div class="col-md-5">
          <label>
            <div class="form-group">
              <input type="text" class="form-control form-control-sm" v-model="data.password">
            </div>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="row">
        <div class="col-md-12 text-right">
          <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" @click="updMicrosoftPass"><i
              class="la la-envelope-o"></i>
            Reset Password</button>
            <button class="btn btn-light btn-hover btn-sm btn-primary" @click="CreateMicrosoftUser"><i
              class="la la-envelope-o"></i>
            Create New Microsoft User</button>
        </div>
      </div>
    </div>
  </div>
</modal>
