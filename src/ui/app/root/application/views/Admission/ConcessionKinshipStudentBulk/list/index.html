<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.bsetup')}}</h3>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        Bulk Scholarship </a>
    </div>
  </template>
  <portlet-area action="1" title="Bulk Scholarship">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.sectionChange.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId">
            </select-ex>
            <!-- <select @change="loadCityCampus" class="form-control form-control-sm" v-model="sessionId" required>
                <option v-for="(model,index) in sessionList" :value="model.sessionId">{{model.fullName}}</option>
              </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.sectionChange.campus')}}</label>
            <select-ex :options="campusCityList" @input="loadProgramsOfCampus" groupBy="cityName" keyValue="campusId"
              displayValue="campusName" v-model.trim="campusId"></select-ex>

            <!-- <drop-down v-model="campusId" :data="campusCityList" group-by="cityName" key-value="campusId"
              display-value="campusName" placeholder="Campus" @change="loadProgramsOfCampus">
            </drop-down> -->

          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.sectionChange.program')}}</label>
            <select-ex :options="campusProgramLinkList" groupBy="programName" keyValue="campusProgramId"
              displayValue="description" v-model.trim="campusProgramId" @input="loadConcessions"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.admissionAdmissionForm.gender')}}<span style="color:red"> *</span></label>
            <select-ex :options="genderList" keyValue="genderId" displayValue="description"
              v-model="genderId">
            </select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>From Percentage</label>
            <input type="number" class="form-control  " v-model="percentageFrom">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>To Percentage</label>
            <input type="number" class="form-control " v-model="percentageTo">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>Select Concession</label>
            <select-ex :options="list" keyValue="scholarshipCriteriaId" displayValue="concessionName"
              v-model="scholarshipid"></select-ex>
          </div>

        </div>
      </div>
      <grid :data="datas" :columns="columns" pre="modal.sectionChange.">
        <template slot="action-area">

          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
          <button type="button" class="btn btn-hover btn-sm btn-outline-primary" @click="getreport" v-if="datas.length > 0"> <i
              class="la la-print"></i>Print</button>
          </button>
          <button @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i> Save
          </button>
          <!-- <h5>Select All
          <input type="checkbox" @change="updall" v-model="chkall">
        </h5> -->
        </template>
        <template slot="isChecked-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">
            Select All <input type="checkbox" @change="updall" v-model="chkall" class="mb-0">
            <span></span>
          </label>

        </template>
        <template slot="isChecked" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand">
            <input type="checkbox" v-model="item.row.isChecked">
            <span></span>
          </label>
          <!-- <input type="checkbox" v-model="item.row.isChecked"> -->
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model></add-edit-model>
</page-area>
