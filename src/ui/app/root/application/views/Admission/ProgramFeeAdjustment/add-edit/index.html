<modal name="programFeeAdjustment-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200"
    :pivot-y="0.5" :reset="true" :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto"
    width="40%" @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.programFeeAdjustment')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body" style="padding: 4% !important;">
            <div class="row" v-if="!IsNewRecord">
                <!-- <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div> -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        Enabled Status
                                        <!-- {{$t('modal.setupClass.recordStatus')}} -->
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" v-model="data.isEnabled">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row" v-if="IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        Check All
                                        <!-- {{$t('modal.setupClass.recordStatus')}} -->
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input @change="markAllChecked()" type="checkbox" v-model="isCheckAll">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="row" v-if="!IsNewRecord">

                <div class="col-md-12">
                    <strong>Program Detail :</strong> {{data.description}}

                </div>


            </div>
            <div class="row" v-if="IsNewRecord">

                <div v-for="item in cbList" class="col-md-12">

                    <input type="checkbox" v-model="item.isChecked"> &nbsp; &nbsp;
                    {{item.programDetailName}}
                </div>

            </div>
        </div>
        <div class="modal-footer">
            <div class="row">
                <div class="col-md-12">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>
                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
