<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.rsetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.gsetup')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.programFeeAdjustment')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.programFeeAdjustment')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.attendanceBulk.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model.trim="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <label>{{$t('modal.attendanceBulk.campus')}}</label>
          <select-ex @input="loadProgramsOfCampus" :options="campusCityList" keyValue="campusId" groupBy="cityName" displayValue="campusName"
            v-model.trim="campusId">
          </select-ex>
          <!-- <drop-down v-model="campusId" :data="campusCityList" group-by="cityName" key-value="campusId"
            display-value="campusName" placeholder="Campus" @change="loadProgramsOfCampus">
          </drop-down> -->
        </div>
      </div>
      <grid :data="data" :columns="columns" pre="modal.programFeeAdjustment.">
        <template slot="action-area">
          <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row)" v-if="canEdit" title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>

          <button @click="deleteModel(item.row)" v-if="canDelete" title="Delete" type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle">
            <i class="la la-trash"></i>
          </button>
        </template>

        <template slot="isEnabled" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.isEnabled">Enabled</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>Disabled</span>
        </template>
      </grid>
    </template>
  </portlet-area>
 <programFeeAdjustment-add-edit-model v-on:submit="refreshData"></programFeeAdjustment-add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model> 
</page-area>
