<page-area>
    <template slot="breadcrumbs-area">
      <h3 class="kt-subheader__title">{{$t('navigation.dashboard')}}</h3>
      <span class="kt-subheader__separator kt-hidden"></span>
      <div class="kt-subheader__breadcrumbs">
        <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
        <span class="kt-subheader__breadcrumbs-separator"></span>
        <a href="" class="kt-subheader__breadcrumbs-link">
          Survey Dashboard</a>
      </div>
    </template>
    <div class="row">
      <div class="col-md-3 form-group">
        <label class="form-control-label">{{$t('modal.reports.feeReports.city')}} <span style="color:red"> *</span></label>
  
          <select-ex :options="cityList"   keyValue="cityId" displayValue="fullName" v-model="cityId">
          </select-ex>
      </div>
      <div class="col-md-3 form-group">
        <label class="form-control-label">{{$t('modal.reports.feeReports.subCity')}}</label>
  
        <select-ex :options="subCityList" keyValue="subCityId" displayValue="subCityName" v-model="subCityId">
        </select-ex>
      </div>
      <div class="col-md-3 form-group">
        <label>From Date <span style="color:red"> *</span> </label>
        <date-picker class="input-28" id="change-width"  ref="changeWidth" v-model="fromDate" format="DD/MM/YYYY"
          lang="en" :not-after="dueDate">
        </date-picker>
      </div>
    <div class="col-md-3 form-group">
        <label>To Date <span style="color:red"> *</span></label>
        <date-picker class="input-28" id="change-width" ref="changeWidth" v-model="toDate" format="DD/MM/YYYY"
          lang="en" :not-before="fromDate">
        </date-picker>
      </div>
    </div>
    <div class="row">
      
      
      <div class="col-md-11 form-group">
          <button class="btn btn-light btn-hover btn-sm btn-primary" @click="loadData()" data-dismiss="modal"
            type="submit">
            Generate</button>
          </div>
     
       
          <div class="col-md-1 form-group">
          <button class="btn btn-light btn-hover btn-sm btn-primary" @click="clearSelection()" data-dismiss="modal"
            type="submit">
            Reset</button>
        </div>
       
    </div>
  
    <div class="row">
      <div class="col-md-12 text-right mb-5">
        <button @click="loadcsv" class="btn btn-light btn-hover btn-sm btn-outline-primary">
          {{$t('button.exporttoexcel')}}<i class="la la-file-excel-o"></i>
        </button>
      </div>
    </div>
    <div class="position-relative">
      <div class="row">
        <div class="col-md-12">
          <nav class="survey-nav">
            <input type="text" placeholder="Tap to Search" v-on:keyup.enter="querySearch(search)" v-model="search">
            <div class="d-flex" v-for="(item,index) in searchArr">
              <div class="hightlight-div">
                {{item}} &nbsp;
                <i class="fa fa-times" @click.prevent="deleteSearch(index)"></i>
              </div>
            </div>
          </nav>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <grid :data="filterArr" :columns="columns" pre="modal.notificationDashboard.">
          <template slot="dated" slot-scope="item">
            {{item.row.dated | formatDMY}}
          </template>
          <!-- <template slot="campusCode" slot-scope="item">
            {{item.row.campusCode.substring(0,item.row.campusCode.length - 3)}}
          </template> -->
        </grid>
      </div>
    </div>
    <div class="row mt-5">
      <span v-if="filterArr.length==0">
        There is no record.
      </span>
    </div>
  </page-area>
