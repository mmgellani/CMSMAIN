<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="40%" top="10" height="auto" @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel"><i class="fa fa-close"></i></a>
                </div>
                <div class="col-md-8 text-centre">
                    <div class="modal-title">

                        StudentImage&nbsp;-&nbsp;<span class="font12">{{title}}</span> 

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close" v-if="!IsNewRecord">
                        <input class="switch" type="checkbox" v-model="isActive">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <select v-model="data.studentId" class="form-control form-control-sm" required>
                                <option :key="index" :value="model.studentId" v-for="(model,index) in StudentList">{{model.fullName}}
                                </option>
                            </select>
                            <label :class="!$v.model.studentId.required">Choose Student<span style="color:red"> *</span></label>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12">
                        <label class="m-0">Group Logo<span style="color:red"> *</span></label>
                        <div v-if="!data.image" style="margin-top:30px;">
                            <input type="file" @change="onFileChange($event)">
                        </div>
                        <div v-else>
                            <img :src="data.image" style="width:80px;height:100px; margin-top: 30px;" />
                            <button style="border-radius: 50%; width:30px; height:30px; padding:0; font-size:14px;"
                                vs-color="danger" vs-type="border" vs-icon="close" @click="removeImage"><i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
