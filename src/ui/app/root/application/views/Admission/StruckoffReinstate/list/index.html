<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.qserup')}}</h3>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.registration')}} </a>
    </div>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.struckoffReinstate')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.struckoffReinstate')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label class="form-control-label">{{$t('modal.reports.feeReports.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
            </select-ex>
          </div>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.reports.feeReports.campus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" v-model="campusId"
              groupBy="cityName">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <label>{{$t('modal.reports.feeReports.program')}}</label>
          <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
            v-model="programDetailId" groupBy="programName">
          </select-ex>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.reports.feeReports.class')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId">
            </select-ex>
          </div>
        </div>


      </div>

      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.reports.feeReports.section')}}</label>
            <select-ex :options="sectionCourseLinkList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <label>{{$t('modal.reports.feeReports.students')}}</label>
          <select-ex :options="data" keyValue="admissionFormId" displayValue="fullName" v-model="admissionformid">
          </select-ex>
        </div>
      </div>
      <div v-if="canRead">
        <grid :data="struckofList" :columns="columns" pre="modal.struckoffReinstate.">
          <template slot="action-area">
            <button v-if="canAdd" @click="AddModel(admissionformid)"
              class="btn btn-light btn-hover btn-sm btn-outline-primary">
              <i class="la la-plus"></i> {{$t('button.insert')}}
            </button>
            <button @click="refreshData2" class="btn btn-light btn-hover btn-sm btn-outline-primary">
              <i class="la la-refresh"></i> {{$t('button.reload')}}
            </button>
          </template>
          <template slot="struckoffDate" slot-scope="item">
            {{item.row.struckoffDate | formatDMY}}
          </template>
          <template slot="reinstateDate" slot-scope="item">
            {{item.row.reinstateDate | formatDMY}}
          </template>
          <template slot="action" slot-scope="item">
            <button @click="EditModel(item)" v-if="canEdit" title="Edit" type="button"
              class="btn btn-outline-primary btn-icon btn-sm btn-circle">
              <i class="la la-edit"></i>
            </button>
          </template>
        </grid>
      </div>
    </template>
  </portlet-area>
  <struckoff-reinstate></struckoff-reinstate>
</page-area>
