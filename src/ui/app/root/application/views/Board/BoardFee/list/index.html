<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-title">
        Board Fee
        <!-- <button @click="chck">check</button> -->
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-2">
            <div class="form-group">
              <select @change="loadCityCampus" class="form-control" v-model="sessionId" required>
                <option v-for="(model,index) in sessionList" :value="model.sessionId">{{model.fullName}}</option>
              </select>
              <label>Session</label>
            </div>
          </div>

          <div class="col-md-3">
            <drop-down v-model="campusId" :data="campusCityList" group-by="cityName" key-value="campusId"
              display-value="campusName" placeholder="Campus" @change="loadProgramsOfCampus">
            </drop-down>
          </div>

          <div class="col-md-3">
            <drop-down v-model="programDetailId" :data="campusProgramLinkList" group-by="programName"
              key-value="programDetailId" display-value="description" placeholder="Programs" @change="loadClass">
            </drop-down>
          </div>

          <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="classId" required>
                <option v-for="(model,index) in classList" :value="model.classId">{{model.fullName}}</option>
              </select>
              <label>Class</label>
            </div>
          </div>
          <!-- <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="installmentNo" required>
                <option v-for="n in 4" :value="n">{{n}}</option>
              </select>
              <label>Installment No</label>
            </div>
          </div> -->

        </div>
        <br>

        <div class="row">
          <div class="col-md-2">
            <div class="form-group">
              <v-select label="sectionName" v-model="sectionCourseLinkId" :options="courseList"
                :reduce="option => option.sectionCourseLinkId">
                <template slot="option" slot-scope="option">
                  <span>{{option.sectionName}}</span>
                </template>
              </v-select>
              <label class="caption-title">Section</label>
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="programCampusId" required>
                <option v-for="(model,index) in programCampusList" :value="model.programCampusId">{{model.title}}
                </option>
              </select>
              <label>Program Campus</label>
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="boardId" required>
                <option v-for="(model,index) in boardList" :value="model.boardId">{{model.fullName}}</option>
              </select>
              <label>Board</label>
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="examTypeId" required>
                <option v-for="(model,index) in boardExamTypeList" :value="model.examTypeId">{{model.fullName}}</option>
              </select>
              <label>Board Exam Type</label>
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-group ">
              <select class="form-control" @change="loadFeeHeads()" v-model="challanTypeId">
                <option :value="model.challanTypeId" v-for="(model,index) in challanTypeList">
                  {{model.fullName}}
                </option>
              </select>
              <label>Challan Type</label>
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-group ">
              <select class="form-control" v-model="feeHeadId">
                <option :value="model.feeHeadId" v-for="(model,index) in feeHeadList">{{model.fullName}}
                </option>
              </select>
              <label>FeeHead</label>

            </div>
          </div>
          <!-- <div class="col-md-2">
            <div class="form-group">
              <select class="form-control" v-model="feeHeadId" required>
                <option v-for="(model,index) in feeHeadList" :value="model.feeHeadId">{{model.fullName}}</option>
              </select>
              <label>Fee Head</label>
            </div>
          </div> -->
          <div style="background-color: lightgray; height: 9%; border: 1px solid darkgrey; border-radius: 15px" class="col-md-2">
            <div class="form-group">
              <label style="color: black;">{{amount}}</label>
              <!-- <input disabled type="text" class="form-control" v-model="amount"> -->
             
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-group">
              <input type="text" class="form-control" v-model="year">
              <label>Year</label>
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-group">
              <input type="date" class="form-control" v-model="dueDate">
              <label>Due Date</label>
            </div>
          </div>




          <div class="col-md-2 text-right">
            <button data-toggle="modal" data-target="#myModal" class="b-add">
              <feather icon="save"></feather>
            </button>
            <button @click="refreshData" class="b-refresh">
              <feather icon="refresh-ccw"></feather>
            </button>
          </div>

        </div>
        <div class="table-responsive">
          <div class="dataTables_wrapper no-footer">
            <table class="table">
              <thead>
                <tr role="row">
                  <th>Roll No</th>
                  <th>Name</th>
                  <th>Action <input v-model="isCheckedAll" @change="checkAll()" type="checkbox"></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in data">
                  <td class="align-middle">{{item.rollNo}}</td>
                  <td class="align-middle">{{item.fullName}}</td>
                  <td class="align-middle"><input type="checkbox" v-model="item.isSelected"></td>
                  <!-- <td class="v-align-middle">
                    <select class="form form-control" v-model="item.scholarshipCriteriaId">
                      <option :value="model.scholarshipCriteriaId" v-for="model in scholarshipList">
                        {{model.concessioName}}</option>
                    </select>
                  </td> -->
                  <!-- <td class="v-align-middle">
                    <div class="custom-control custom-checkbox">
                      <input v-model="item.isSelected" type="checkbox" class="custom-control-input" :id="item.rollNo">
                      <label class="custom-control-label" :for="item.rollNo"></label>
                    </div>
                    
                  </td> -->
                  <!-- <input type="checkbox" v-model="item.isSelected"> -->
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="myModal" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="myModal" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Confirmation</h4>
        </div>
        <div class="modal-body">
          <p>Are you sure you want Insert Record?</p>
        </div>
        <div class="modal-footer">
          <button type="button" @click="insertModel" class="btn btn-primary" data-dismiss="modal">Yes</button>

          <button type="button" class="btn btn-primary" data-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>

</div>
