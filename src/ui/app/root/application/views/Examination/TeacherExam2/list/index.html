<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.teachermng')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.teacherExam2')}} </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('navigation.teacherExam2')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSession')}}<span style="color:red"> *</span></label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupClass')}}<span style="color:red"> *</span></label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSection')}}<span style="color:red"> *</span></label>
            <select-ex :options="sectionCourseLinkList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId"  ></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.registrationCourse')}}<span style="color:red"> *</span></label>
            <select-ex :options="courseLists" keyValue="programCourseLinkId" displayValue="courseName"
              v-model="programCourseLinkId"  ></select-ex>
          </div>
        </div>
        
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>Testing Module<span style="color:red"> *</span></label>
            <select-ex :options="AssExType"  keyValue="idd" @input="loadExamSchedule" displayValue="text" v-model.trim="idd">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>Test Name<span style="color:red"> *</span></label>
            <select-ex :options="examScheduleList"  keyValue="examScheduleId" displayValue="fullName" v-model.trim="examScheduleId" @input="refreshData">
            </select-ex>
          </div>
        </div>

        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.examinationExamType')}}</label>
            <select-ex :options="examTypeList" keyValue="examTypeId" displayValue="fullName" v-model="examTypeId">
            </select-ex>
          </div>
        </div> -->
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.examinationTeacherExam.totalMarks')}}</label>
            <input disabled class="form-control " v-model="totalMarks"
              type="text">
          </div>
        </div>
        <!-- <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupMonth')}}</label>
            <date-picker v-model="datestring" lang="en" type="month" format="YYYY-MM" :not-after="currentdate">
            </date-picker>
          </div>
        </div> -->
        <div v-if="examUpdateDataList.length>0" class="col-md-12">
          <span style="margin-right: 5px;" class="badge badge-primary">Update</span>
        </div>
      </div>
      <grid :data="datas" :columns="columns" pre="modal.examinationTeacherExam.">
        <template slot="action-area">
          <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="refreshData" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="rollNo" slot-scope="item">
          <label :style="item.row.shouldAbsent?'color:red':'color:black'">{{item.row.rollNo}}</label>
        </template>
        <template slot="fullName" slot-scope="item">
          <label :style="item.row.shouldAbsent?'color:red':'color:black'">{{item.row.fullName}}</label>
        </template>
        <template slot="attendanceStatusId" slot-scope="item">
          <select :disabled="item.row.isApproved || item.row.shouldAbsent" @change="checks(item.row)"
            v-model="item.row.attendanceStatusId">
            <option :key="index" :value="model.attendenceStatusId" v-for="(model,index) in attendanceStatusList">
              {{model.fullName}}</option>
          </select>
        </template>
        <template slot="obtainMarks" slot-scope="item">
          <input type="number" :disabled="item.row.attendanceStatusId!=presentStatusId || item.row.isApproved"
            v-model="item.row.obtainMarks"></input>
        </template>
        <template slot="statusId" slot-scope="item">
          {{item.row.statusId==1?'Active':'InActive'}}
        </template>
        <template slot="action" slot-scope="item">
          <a @click="editModel(item.row)" v-if="canEdit">
            <feather icon="edit" xclass="b-edit"></feather>
          </a>
          <a @click="deleteModel(item.row)" v-if="canDelete">
            <feather icon="trash" xclass="b-delete"></feather>
          </a>
        </template>
      </grid>
    </template>
  </portlet-area>
</page-area>
