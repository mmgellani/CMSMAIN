<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.examination')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        Individual Exam Result Update </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('Individual Exam Result Update')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>Enter Roll No</label>
            <input type="text" class="form-control mt-3" v-on:keydown.enter="getstudent"
              v-model="filterString" placeholder="Enter Here">
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label class="mb-4">{{$t('modal.examBulk.month')}}</label>
            <date-picker v-model="date" lang="en" type="month" format="YYYY-MM" @change="PopulateExamType">
            </date-picker>
          </div>
        </div>



        <div class="col-md-3">
          <div class="form-group">
            <label class="mb-4">{{$t('Exam Type')}}</label>
            <select-ex :options="examtypelist" keyValue="examTypeId" displayValue="fullName" v-model="examtyeid"
              @input="ReloadData">
            </select-ex>
          </div>
        </div>




        <div class="col-md-3">
          <div class="row mb-2">
            <div class="col-md-6">
              <label>Course</label>
            </div>
            <div class="col-md-6 text-right">
              <span class="kt-switch kt-switch--sm kt-switch--icon">
                <label class="m-0">
                  <input type="checkbox" checked="checked" v-model="Hide">
                  <span></span>
                </label>
              </span>
            </div>
          </div>
          <select-ex :options="courselist" :disabled="!Hide" keyValue="courseName" displayValue="courseName"
            v-model="cousreName" @input="ReloadData"></select-ex>
          </select>
        </div>

      </div>
      <grid :data="TempstudentRecord" :columns="columns" pre="modal.examinationupdlist.">
        <template slot="action-area">
          <button @click="ReloadData" title="Reload" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
          <button :disabled="checklength()==0" data-toggle="modal" @click.prevent="datapassing"data-target="#myModal" title="Save"
            class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i> {{$t('button.save')}}
          </button>
          <!-- <button title="Edit Student Concession" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle" @click="saveModal(item.row)" data-toggle="modal"
            data-target="#myModal">
            <i class="la la-edit"></i>
          </button> -->
          <!-- @click = "saveModal(item.row)" -->
        </template>
        <template slot="total" slot-scope="item">
          <input type="number" class="form-control" disabled="true" v-model="item.row.total">
        </template>
        <template slot="obtained" slot-scope="item">
          <input type="number" class="form-control" v-model="item.row.obtained">
        </template>
        <template slot="checked" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand">
            <input type="checkbox" @change="checklength" v-model="item.row.checked">
            <span></span>
          </label>
        </template>
      </grid>
    </template>
  </portlet-area>
  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">Update Exam Result</h3>
            <p>Confirmation</p>
          </div>

          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body"  style="max-height: 400px; overflow-y: scroll;">
          <div class="row">
            <div class="col-md-12">
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <th class="text-center">Exam Type</th>
                    <th class="text-center">Month</th>
                    <th class="text-center">Course</th>
                    <th class="text-center">Total Marks</th>
                    <th class="text-center"> Obtained</th>
                  </thead>
                  <tbody>
                    <tr v-for="item in Tempstudent2Record">
                      <td>{{item.examType}}</td>
                      <td>{{item.month}}</td>
                      <td>{{item.fullName}}</td>
                      <td>{{item.total}}</td>
                      <td>{{item.obtained}}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" @click="save()" data-dismiss="modal" type="submit">
            <i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
</page-area>
