<div class="row">
  <div class="col-md-12">
    <div class="card">
      <div class="card-title">
        Exam Master
      </div>
      <div class="card-body">

        <div v-if="canRead">

          <grid :data="data" :columns="columns">
            <template slot="operation-links">
              <div class="row">
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="loadCityCampus" class="form-control form-control-sm" v-model="sessionId" required>
                      <option v-for="(model,index) in sessionList" :value="model.sessionId">{{model.fullName}}</option>
                    </select>
                    <label>Session</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="loadProgramsOfCampus" Placeholder="Campus" v-model="campusId" class="form-control form-control-sm"
                      required>
                      <template v-for="(item,index) in cityDDL">
                        <template v-if="item.group">
                          <option value="item.id" class="bold-option" disabled>
                            <strong>{{item.title}}</strong>
                          </option>
                          <option :value="chItem.id" v-for="(chItem,chIndex) in item.group">
                            <span v-html="'&#8680; ' + chItem.text"></span>
                          </option>
                        </template>
                      </template>
                    </select>
                    <label>Campus</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="loadClass" Placeholder="Program" v-model="programDetailId" class="form-control form-control-sm"
                      required>
                      <template v-for="(item,index) in programDDL">
                        <template v-if="item.group">
                          <option value="item.id" class="bold-option" disabled>
                            <strong>{{item.title}}</strong>
                          </option>
                          <option :value="chItem.id" v-for="(chItem,chIndex) in item.group">
                            <span v-html="'&#8680; ' + chItem.text"></span>
                          </option>
                        </template>
                      </template>
                    </select>
                    <label>Program</label>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group">
                    <select @change="refreshData" class="form-control form-control-sm" v-model="classId" required>
                      <option v-for="(model,index) in classList" :value="model.classId">{{model.fullName}}</option>
                    </select>
                    <label>Class</label>
                  </div>
                </div>
              </div>
              <button v-if="canAdd" @click="insertModel" class="b-add">
                <feather icon="plus-circle"></feather>
              </button>
              <button @click="refreshData" class="b-refresh">
                <feather icon="refresh-ccw"></feather>
              </button>
            </template>
            <template slot="dated" slot-scope="item">
              {{item.row.dated && item.row.dated.toString().split('T')[0]}}
            </template>
            <template slot="statusId" slot-scope="item">
              {{item.row.statusId==1?'Active':'InActive'}}
            </template>
            <template slot="action" slot-scope="item">
              <a @click="editModel(item.row)" v-if="canEdit">
                <feather icon="edit" xclass="b-edit"></feather>
              </a>
              <a @click="deleteModel(item.row)" v-if="canDelete">
                <feather icon="trash" xclass="b-delete"></feather>
              </a>
            </template>

          </grid>
        </div>
      </div>
    </div>
  </div>

  <ExamMaster-add-edit-model v-on:submit="refreshData"></ExamMaster-add-edit-model>
  <delete-model v-on:submit="refreshData"></delete-model>
</div>
