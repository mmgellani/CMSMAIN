<modal name="failCriteria-add-edit-model" :clickToClose="false" :width="921" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="true" transition="bounce" top="10"   height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.failCriteria')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.examinationFailCriteria.fullName')}}<span
                                style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.failMaster.fullName.$error}" v-model.trim="failMaster.fullName"
                            @input="$v.failMaster.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.failMaster.fullName.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.examinationFailCriteria.failPercentage')}}<span
                                style="color:red">
                                *</span></label>
                        <input type="number" class="form-control  " v-model.trim="failMaster.failMarks"
                            :class="{'is-invalid': $v.failMaster.failMarks.$error}" @input="$v.failMaster.failMarks.$touch()">
                        <div class="invalid-feedback" v-show="$v.failMaster.failMarks.$error">
                            <span v-if="!$v.failMaster.failMarks.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>


                <div class="col-md-4 mt-4">
                    <div class="form-group validated">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.examinationFailCriteria.absentConsiderFail')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" v-model.trim="failMaster.absentConsiderFail">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
                <!-- <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.examinationFailCriteria.absentConsiderFail')}}</label>
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                            <label class="m-0">
                                <input type="checkbox" v-model.trim="failMaster.absentConsiderFail">
                                <span></span>
                            </label>
                        </span>
                    </div>
                </div> -->
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.examinationFailCriteria.failCount')}}<span
                                style="color:red">
                                *</span></label>
                        <input type="number" class="form-control " v-model.trim="failMaster.fail_In"
                            :class="{'is-invalid': $v.failMaster.fail_In.$error}" @input="$v.failMaster.fail_In.$touch()">
                        <div class="invalid-feedback" v-show="$v.failMaster.fail_In.$error">
                            <span v-if="!$v.failMaster.fail_In.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <div class="row" style="margin-bottom: 30px;">
                        <div class="col-md-12">
                            <h5 class="card-title">Criteria Detail </h5>
                        </div>
                    </div>
                    <div class="row" v-for="(item,index) in failDetailList">
                        <div class="col-md-2">
                            <div class="form-group">
                                <label class="form-control-label">
                                    {{$t('modal.examinationFailCriteria.fullName')}}
                                </label>
                                <input type="number" class="form-control  " v-model.trim="item.fail_In">

                                <!-- <input type="number" class="form-control" v-model="item.fail_In" required>
                                <label>Fail Count<span style="color:red"> *</span></label> -->
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="form-group">
                                <label class="form-control-label">
                                    {{$t('modal.examinationFailCriteria.description')}}
                                </label>
                                <input type="text" class="form-control  " v-model.trim="item.description">
                            </div>
                        </div>
                        <div class="col-md-1" v-if="failDetailList.length>1">

                            <button class="btn btn-outline-danger btn-icon btn-sm btn-circle" style="margin-top:24px"
                                @click="removeDetail(index,item)">
                                <i class="la la-trash"></i>
                            </button>

                        </div>
                        <div class="col-md-1" v-if="index==failDetailList.length-1">

                            <button @click="addDetail()" class="btn btn-outline-primary btn-icon btn-sm btn-circle"
                                style="margin-top:24px">
                                <i class="la la-plus"></i>
                            </button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
