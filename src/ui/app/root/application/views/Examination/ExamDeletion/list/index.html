<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.examination')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        Exam Deletion </a>
    </div>
  </template>

  <portlet-area action="1" :title="$t('Exam Deletion')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSession')}}<span style="color:red"> *</span></label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionId"
              @input="loadCityCampus">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupCampus')}}<span style="color:red"> *</span></label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" groupBy="cityName"
              v-model="campusId" @input="loadProgramsOfCampus"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupProgram')}}<span style="color:red"> *</span></label>
            <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
              groupBy="programName" v-model="programDetailId" @input="loadClass"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupClass')}}<span style="color:red"> *</span></label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"
              @input="loadSection"></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupSection')}}<span style="color:red"> *</span></label>
            <select-ex :options="sectionList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId" @input="loadExamType"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.examinationExamType')}}<span style="color:red"> *</span></label>
            <select-ex :options="examTypeList" keyValue="examTypeId" displayValue="fullName" v-model="examTypeId">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.setupMonth')}}<span style="color:red"> *</span></label>
            <date-picker @input="refreshData" v-model="dateMonth" lang="en" type="month" format="YYYY-MM">
            </date-picker>
          </div>
        </div>
       
      </div>
      <grid :data="data" :columns="columns" pre="modal.examinationExamApproval.">
        <template slot="action-area">
         
          <!-- <button :disabled="!canSave" v-if="canAdd" data-toggle="modal" data-target="#myModal" title="Save"
            class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-save"></i> {{$t('button.save')}}
          </button> -->
          <button @click="refreshData" title="Reload" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="dated" slot-scope="item">
          {{item.row.examDate && item.row.examDate.toString().split('T')[0]}}
        </template>
        <template slot="action" slot-scope="item">
          <button v-if="canEdit" title="Save" type="button"
            class="btn btn-outline-success btn-icon btn-sm btn-circle" @click="saveModal(item.row.examMasterId)" data-toggle="modal" data-target="#myModal">
            <i class="la la-save"></i>
            <!-- @click="insertModel(item.row)" -->
          </button>
        </template>
      </grid>
    </template>
  </portlet-area>
  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">Exam Deletion</h3>
          
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to Delete Exams?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="button" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            @click="insertModel"><i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
</page-area>
