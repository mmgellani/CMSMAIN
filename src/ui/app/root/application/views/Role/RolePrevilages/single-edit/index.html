<modal name="edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="40%" top="10" height="auto" @before-open="beforeModalOpen"
    @before-close="beforeModalClose">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-4">
                    <a href="#" @click="cancel" class="cancel">
                        <i class="fa fa-close"></i>
                    </a>
                </div>
                <div class="col-md-4">
                    <div class="modal-title">

                        {{title}}

                    </div>
                </div>

            </div>
        </div>
        <div class="modal-body">
            <div class="form-group m-form__group m--margin-top-10">
                <div class="row">
                    <table class="table" style="margin-top: 20px">
                        <tbody>
                            <tr v-for="item in UserRoleList">
                                <td>{{item.name}}</td>
                                <td>
                                    <input class="switch" type="checkbox" v-model="item.status" />
                                </td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row">
                <div class="col-md-6">
                    <button class="btn btn-block btn-danger ripple" @click="cancel">Close</button>
                </div>
                <div class="col-md-6">
                    <button class="btn btn-block btn-primary" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
</modal>
