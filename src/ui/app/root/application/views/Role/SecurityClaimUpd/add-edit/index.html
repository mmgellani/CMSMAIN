<modal name="add-edit-model" :clickToClose="false" :width="614"   :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="true" transition="bounce" top="10" height="auto"  
    @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.SecurityClaims')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Full Name
                            <span style="color:red"> *</span>
                        </label>
                        <input class="form-control " v-model.trim="data.securityClaimId"
                            :disabled="editSecurityClaim" :class="{'is-invalid': $v.data.securityClaimId.$error}"
                            @input="$v.data.securityClaimId.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.securityClaimId.$error">
                            <span v-if="!$v.data.securityClaimId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Description
                            <span style="color:red"> *</span>
                        </label>
                        <input class="form-control" v-model="data.description"
                            :class="{'is-invalid': $v.data.description.$error}" @input="$v.data.description.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.description.$error">
                            <span v-if="!$v.data.description.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}</button>
                <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                        class="la la-floppy-o"></i> {{$t('button.save')}}</button>

            </div>
        </div>
    </div>
    </div>
</modal>
