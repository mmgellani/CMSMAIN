<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="60%"
    @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.MaskRightLink')}}</h3>
                <p>{{$t('modal.MaskRightLink.title')}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row">
              
                <div class="col-md-12 text-right" style="margin-top: 24px;">
                    <button class="btn btn-hover btn-sm btn-outline-primary" @click.prevent="checkAll">Check
                        All</button>
                    <!-- v-if="canAdd" -->
                </div>
            </div>
            <div class="row mt-2">
                <div class="col-md-6" v-for="item in maskList"
                    style="border:1px solid #ebedf2; padding:6px 0 !important;">
                    <table class="table mb-0">
                        <tbody>
                            <tr>
                                <td class="align-middle role-firstTD">
                                    {{item.text}}
                                </td>
                                <td class="align-middle role-secondTD">
                                    <label class="kt-checkbox kt-checkbox--brand"
                                        style="margin-bottom: 14px !important;">
                                        <input type="checkbox" v-model="item.isChecked">
                                        <span></span>
                                    </label>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}
                </button>
                <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                        class="la la-floppy-o"></i> {{$t('button.save')}}
                </button>
            </div>
        </div>
    </div>

</modal>
