<modal name="add-edit-model" :clickToClose="false" :width="500" :min-height="200" :pivot-y="0.5" :reset="true" :scrollable="true"
    :adaptive="true" transition="nice-modal-fade"  height="auto" @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header clearfix text-left text-left m-portlet m-portlet--brand m-portlet--head-solid-bg m-portlet--bordered ">
            <h5>Model
                <span class="semi-bold"> BuildingAddressLink({{title}})</span>
            </h5>
        </div>
        <div class="modal-body">
            <form role="form">
                <div class="form-group-attached">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <select class="form-control m-input m-input-air" v-model="data.addressId">
                                    <option value="" disabled>Choose One Option</option>
                                    <option v-for="option in addressList " :value="option.addressId">
                                        {{option.address}}
                                    </option>

                                </select>
                                <label>Address</label>
                            </div>




                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                    <select class="form-control m-input m-input-air" v-model="data.buildingId">
                                            <option value="" disabled>choose one option</option>
                                            <option v-for="option in buidingList" :value="option.buildingId">
                                                {{option.fullName}}
                                            </option>
            
                                        </select>
                                        <label>Building</label>
                            </div>
                     

                            <!-- <div class="form-group con-select-example">
                                <vs-select style="width: 97%; margin-top:16px" autocomplete class="selectExample" label="Building" v-model="data.buildingId">
                                    <vs-select-item :key="index" :value="model.buildingId" :text="model.fullName" v-for="(model,index) in buidingList"
                                    />
                                </vs-select>
                            </div> -->
                        </div>
                        <div class="col-md-6">

                            <div class="form-group">
                                <input type="text" class="form-control  " v-model="data.preferenceNo" /> </div>
                            <label>preferenceNo</label>
                        </div>

                        <div v-if="!IsNewRecord" class="col-md-6">
                            <div class="form-group">
                                <input class="switch" type="checkbox" v-model="isActive">
                            </div>
                        </div>
                    </div>
                </div>
            </form>
            <!-- <div class="row"> -->
            <!-- <div class="col-md-8"> </div> -->
            <div class="m-portlet__foot">
                <div class="row align-items-center">

                    <div class="col-lg-12">
                        <br>
                        <button class="btn btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                        <button class="btn btn-danger" @click="cancel">Close</button>

                    </div>
                </div>

            </div>
            <!-- <div class="col-md-4">
                    <div class="row">
                        <div class="col-md-6">
                            <a href="#" class="btn btn-danger btn-block m-t-5" @click="cancel">
                                <i class="card-icon card-icon-close"></i> Close</a>
                        </div>
                        <div class="col-md-6">
                            <a href="#" class="btn btn-primary btn-block m-t-5" @click="saveModel">
                                <i class="fa fa-save"></i> Save</a>
                        </div>
                    </div>
                </div> -->
            <!-- </div> -->
        </div>
    </div>
</modal>
