        </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">{{$t('navigation.setupProgram')}}</label>
                        <select-ex :options="programDetailList" keyValue="programDetailId" displayValue="description"
                            groupBy="fullName" v-model.trim="data.programDetailId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.programDetailId.$error">
                            <span v-if="!$v.data.programDetailId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
