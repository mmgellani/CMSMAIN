<modal name="Address-add-edit-model" :clickToClose="false" :width="614" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="true" transition="bounce" top="10"  height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.setupAddress')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupClass.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="from-group validated">
                        <div class="row">
                            <div class="col-md-8">
                                <label>{{$t('modal.concessionDashboard.subcities')}}<span style="color:red">
                                        *</span></label>
                            </div>
                            <!-- <div class="col-md-4 text-right">
                                <a href="#" @click="addNewCity" title="Add City" v-if="canAdd">
                                    <i class="fa fa-plus"></i>
                                </a>
                                &nbsp;
                                <a href="#" @click="loadCities" title="Refresh City">
                                    <i class="fa fa-refresh"></i>
                                </a>
                            </div> -->
                        </div>
                        <select-ex :options="cityList" keyValue="subCityId" groupBy="cityName"
                            displayValue="subCityName" v-model="data.subCityId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.subCityId.$error">
                            <span v-if="!$v.data.subCityId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.setupAddress.grid.postalCode')}}</label>
                        <input type="number" v-restrict.number class="form-control  "
                            v-model.trim="data.postalCode">
                        <div class="invalid-feedback" v-show="$v.data.postalCode.$error">
                            <span v-if="!$v.data.postalCode.maxLength">{{$t('validation.maxLength')}} <br>Field Length:
                                {{$v.data.postalCode.$params.maxLength.max}}</span>
                            <span v-if="!$v.data.postalCode.minLength">{{$t('validation.minLength')}} <br>Field Length:
                                {{$v.data.postalCode.$params.minLength.min}}</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupAddress.grid.address')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control " v-model.trim="data.address"
                            :class="{'is-invalid' : $v.data.address.$error}" @input="$v.data.address.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.address.$error">
                            <span v-if="!$v.data.address.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">



                <!-- <div class="col-md-6 text-right">
                            <a href="#" class="" @click="addPhoneNo" title="Add contact">
                                <i class="fa fa-plus"></i> </a>
                        </div> -->

                <div class="col-md-6" v-for="model in phoneNoList">

                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupAddress.grid.phoneNo')}}<span style="color:red">
                                *</span></label>
                        <the-mask :mask="'(####) ### ####'" v-model="model.phoneNo" class="form-control "
                            id="model.phoneNo" required />
                        <!-- <div class="input-group-append" @click="delPhoneNo(model)">
                                    <span class="input-group-text danger">
                                        <i class="fa fa-close"></i>
                                    </span>
                                </div> -->
                    </div>
                </div>
            </div>

        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
    <City v-on:submit="loadCity"></City>
</modal>
