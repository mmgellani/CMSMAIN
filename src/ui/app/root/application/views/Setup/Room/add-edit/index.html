<modal name="Room-add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" width="40%" top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.setupRoom')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupRoom.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <!-- <div class="row">
                 <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupRoom.building')}}<span style="color:red">
                                *</span></label>
                        <select-ex :options="BuidingList" keyValue="buildingId" displayValue="fullName"
                            v-model.trim="data.buildingId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.buildingId.$error">
                            <span v-if="!$v.data.buildingId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>  -->
                <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupRoom.roomTypeName')}}<span style="color:red">
                                *</span></label>
                        <select-ex :options="RoomTypeList" keyValue="roomTypeId" displayValue="fullName"
                            v-model.trim="data.roomTypeId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.roomTypeId.$error">
                            <span v-if="!$v.data.roomTypeId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupRoom.fullName')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.fullName.$error}" v-model.trim="data.fullName"
                            @input="$v.data.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fullName.$error">
                            <span v-if="!$v.data.fullName.required">{{$t('validation.required')}}</span>
                            <span v-if="!$v.data.fullName.maxLength">{{$t('validation.maxLength')}}</span>
                        </div>
                    </div>
                </div>
                </div>
                <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupRoom.description')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.description.$error}" v-model.trim="data.description"
                            @input="$v.data.description.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.description.$error">
                            <span v-if="!$v.data.description.required">{{$t('validation.required')}}</span>
                            <span v-if="!$v.data.description.maxLength">{{$t('validation.maxLength')}}</span>
                        </div>
                    </div>

                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupRoom.capacity')}}
                            <!-- <span style="color:red">
                                *</span> --></label>
                        <input type="number" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.capacity.$error}" v-restrict.number
                            v-model.trim="data.capacity" @input="$v.data.capacity.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.capacity.$error">
                            <span v-if="!$v.data.capacity.required">{{$t('validation.required')}}</span>
                        </div>
                        <!-- <input type="number" class="form-control form-control-sm" v-restrict.number
                            v-model="data.capacity" required>
                        <label :class="!$v.model.capacity.required">Capacity<span style="color:red">
                                *</span></label> -->
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
    <RoomType v-on:submit="loadRoomType"></RoomType>
    <Building v-on:submit="loadBuilding"></Building>
</modal>
