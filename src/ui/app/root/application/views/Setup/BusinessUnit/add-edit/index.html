    @before-open="beforeModalOpen">

    <div class="modal-content">

        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h5 class="modal-title">{{$t('navigation.setupBusinessUnit')}}</h5>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupBusinessUnit.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <!-- <span class="kt-option__control">
                                                            <span class="kt-radio kt-radio--bold kt-radio--brand" checked="">
                                                                <input type="checkbox" v-model="isActive">
                                                                <span></span>
                                                            </span>
                                                        </span> -->
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupBusinessUnit.fullName')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.data.fullName.$error}" v-model.trim="data.fullName"
                            @input="$v.data.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fullName.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupBusinessUnit.description')}}
                        </label>
                       

                        <input type="text" class="form-control "
                                        :class="{'is-invalid': $v.data.description.$error}"
                                        v-model.trim="data.description" @input="$v.data.description.$touch()">
                                    <div class="invalid-feedback" v-show="$v.data.description.$error">
                                        {{$t('validation.required')}}
                                    </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">{{$t('modal.setupBusinessUnit.address')}}<span
                                style="color:red"> *</span></label>
                        <!-- <div class="row">
                                        <div class="col-md-6">
                                        </div>
                                        <div class="col-md-6 text-right">
                                            <a href="#" class="" @click="addNewAddress" title="Add Address"
                                                v-if="canAddAddress">
                                                <i class="fa fa-plus"></i>
                                            </a>
                                            &nbsp;
                                            <a href="#" class="" @click="loadAddress" title="Refresh Address">
                                                <i class="fa fa-refresh"></i>
                                            </a>
                                        </div>
                                    </div> -->
                        <select-ex :options="addressList" keyValue="addressId" displayValue="address"
                            v-model.trim="data.addressId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.addressId.$error">
                            <span v-if="!$v.data.addressId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label>{{$t('modal.setupBusinessUnit.businessGroup')}}<span style="color:red">
                                *</span></label>
                        <!-- <div class="row">
                                        <div class="col-md-6">
                                        </div>
                                        <div class="col-md-6 text-right">
                                            <a href="#" class="" @click="addNewBusinessGrp" title="Add Business Group"
                                                v-if="canAddBusinessGroup">
                                                <i class="fa fa-plus"></i>
                                            </a>
                                            &nbsp;
                                            <a href="#" class="" @click="loadBusinessGroup"
                                                title="Refresh Business Group">
                                                <i class="fa fa-refresh"></i>
                                            </a>
                                        </div>
                                    </div> -->
                        <select-ex :options="businessGroupList" keyValue="businessGroupId" groupBy="fullName"
                            displayValue="fullName" v-model.trim="data.businessGroupId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.businessGroupId.$error">
                            <span v-if="!$v.data.businessGroupId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label class="form-control-label">
                            {{$t('modal.setupBusinessUnit.grid.digitCode')}}<span style="color:red">
                                *</span></label>

                                <the-mask :class="{'is-invalid': $v.data.digitCode.$error}" :mask="'#'"
                                v-model="data.digitCode" class="form-control "
                                @input="$v.data.digitCode.$touch()" />

                        <!-- <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.digitCode.$error}" v-model.trim="data.digitCode"
                            @input="$v.data.digitCode.$touch()"> -->
                        <div class="invalid-feedback" v-show="$v.data.digitCode.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-control-label mb-3">
                        {{$t('modal.setupBusinessUnit.groupLogo')}}
                    </label>
                    <div v-if="!data.logo" class="dropzone-panel">
                        <div class="img-wrapper">
                            <div class="img-icon">
                                <label for="AttachFile" class="btn btn-primary">Attach File</label>
                                <input type="file" class="dropzone-select" style="display: none;" id="AttachFile"
                                    @input="onFileChange($event)">
                            </div>
                        </div>
                        <span class="form-text text-muted">Max file size is 1MB.</span>
                    </div>
                    <div class="col-md-4" v-else>
                        <div class="group-logo-img">
                            <img :src="data.logo" />
                            <span text="Delete image">
                                <button class="group-logo-del" vs-type="border" vs-icon="close" @click="removeImage">
                                    <i class="la la-trash"></i>
                                </button>
                            </span>
                        </div>
                    </div>
                    <!-- <div v-if="!data.logo" style="margin-top:30px">
                                <input type="file" @change="onFileChange($event)">
                            </div>
                            <div v-else>
                                <img :src="data.logo" style="width:80px;height:100px; margin-top:30px;" />
                                <tooltip style="padding-left: 80px; margin-bottom: 10px" text="Click to Remove">

                                        <feather icon="trash" xclass="b-delete"></feather>
                                    </button>
                                </tooltip>
                            </div> -->
                </div>
            </div>


        </div>

        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
    <Address v-on:submit="loadAddress"></Address>
    <BusinessGrp v-on:submit="loadBusinessGroup"></BusinessGrp>
