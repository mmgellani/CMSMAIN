<modal name="subCity-add-edit-model" :clickToClose="false" :width="614" :min-height="200" :pivot-y="0.5"
    :reset="true" :scrollable="true" :adaptive="true" transition="bounce" top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.setupSubCity')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">

            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.setupSubCity.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group validated">
                        <label>{{$t('modal.setupSubCity.city')}}<span style="color:red">
                                *</span></label>
                        <!-- <div class="row">
                                <div class="col-md-6">
                                </div>
                                <div class="col-md-6 text-right">
                                    <a href="#" class="" @click="addNewCity" title="Add City" v-if="canAddCity">
                                        <i class="fa fa-plus"></i>
                                    </a>
                                    &nbsp;
                                    <a href="#" class="" @click="loadCity" title="Refresh City">
                                        <i class="fa fa-refresh"></i>
                                    </a>
                                </div>
                            </div> -->
                        <select-ex :options="citylist" keyValue="cityId" groupBy="fullName" displayValue="fullName"
                            v-model.trim="data.cityId">
                        </select-ex>
                        <div class="invalid-feedback" v-show="$v.data.cityId.$error">
                            <span v-if="!$v.data.cityId.required">{{$t('validation.required')}}</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupSubCity.subCity')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.data.name.$error}" v-model.trim="data.name"
                            @input="$v.data.name.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.name.$error">
                            <span v-if="!$v.data.name.required">{{$t('validation.required')}}</span>
                            <span v-if="!$v.data.name.maxLength">{{$t('validation.maxLength')}}</span>
                        </div>
                    </div>
                </div>

            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.setupSubCity.code')}}</label>
                        <input type="text" class="form-control  " v-model.trim="data.code">
                    </div>
                </div>
            </div>

        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
    <City v-on:submit="loadCity"></City>
</modal>
