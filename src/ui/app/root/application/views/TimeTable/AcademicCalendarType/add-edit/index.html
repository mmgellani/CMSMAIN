<modal name="add-edit-model" :clickToClose="false" :width="614" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="true" transition="bounce"  top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-8 modal_heading">
                <h3 class="modal-title">{{$t('navigation.academicCalendarType')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-4 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row" v-if="!IsNewRecord">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="kt-option kt-option-custom">
                            <span class="kt-option__label">
                                <span class="kt-option__head">
                                    <span class="kt-option__title mt-1">
                                        {{$t('modal.academicCalendarType.recordStatus')}}
                                    </span>
                                </span>
                            </span>
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" checked="checked" v-model="isActive">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.academicCalendarType.fullName')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control "
                            :class="{'is-invalid': $v.data.fullName.$error}" v-model.trim="data.fullName"
                            @input="$v.data.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fullName.$error">
                            <span v-if="!$v.data.fullName.required">{{$t('validation.required')}}</span>
                            <span v-if="!$v.data.fullName.maxLength">{{$t('validation.maxLength')}}</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-control-label">
                            {{$t('modal.academicCalendarType.code')}}<span style="color:red">
                                *</span></label>
                        <input type="text" class="form-control  "
                            :class="{'is-invalid': $v.data.code.$error}" v-model.trim="data.code"
                            @input="$v.data.code.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.code.$error">
                            <span v-if="!$v.data.code.required">{{$t('validation.required')}}</span>
                            <span v-if="!$v.data.code.maxLength">{{$t('validation.maxLength')}}</span>
                        </div>
                    </div>
                </div>

            </div>
            <div class="row">
                <!-- <div class="col-md-6">
                    <div class="custom-control custom-checkbox mr-sm-2" style="margin-top: 2.2rem !important;">
                        <input type="checkbox" v-model="data.isHoliday" class="custom-control-input"
                            id="customControlAutosizing">
                        <label class="custom-control-label"
                            for="customControlAutosizing">{{$t('modal.academicCalendarType.isHoliday')}}</label>
                    </div>
                </div> -->
                <div class="col-md-6">
                    <label for="customControlAutosizing">{{$t('modal.academicCalendarType.isHoliday')}}<span
                            style="color:red">
                            *</span></label>
                    <div class="form-group">
                        <label class="kt-option kt-option-custom" style="border: none !important;">
                            <span class="kt-switch kt-switch--sm kt-switch--icon">
                                <label class="m-0">
                                    <input type="checkbox" v-model="data.isHoliday">
                                    <span></span>
                                </label>
                            </span>
                        </label>
                    </div>
                </div>
            </div>

        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel"><i
                            class="la la-floppy-o"></i> {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
