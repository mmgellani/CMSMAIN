<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" width="40%" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('navigation.timeTableTimeTableMerge')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.timetableTimeTableMerge.fullName')}}<span
                                style="color:red">
                                *</span></label>
                        <input type="text" class="form-control form-control-sm"
                            :class="{'is-invalid': $v.data.fullName.$error}" v-model.trim="data.fullName"
                            @input="$v.data.fullName.$touch()">
                        <div class="invalid-feedback" v-show="$v.data.fullName.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.timetableTimeTableMerge.fromDate')}}<span
                                style="color:red">
                                *</span></label>
                        <date-picker v-model="data.fromDate" lang="en" type="date"></date-picker>
                        <div class="invalid-feedback" v-show="$v.data.fromDate.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group validated">
                        <label class="form-control-label"> {{$t('modal.timetableTimeTableMerge.toDate')}}<span
                                style="color:red">
                                *</span></label>
                        <!-- <input type="text" class="form-control form-control-sm" v-model.trim="data.toDate"
                            :class="{'is-invalid': $v.data.toDate.$error}" @input="$v.data.toDate.$touch()"> -->
                        <!-- 
                            <input type="date" class="form-control form-control-sm"
                            :value="data.fromDate && data.fromDate.toString().split('T')[0]"
                            @input="data.fromDate= $event.target.value"> -->
                        <date-picker v-model="data.toDate" type="date" lang="en"></date-picker>
                        <div class="invalid-feedback" v-show="$v.data.toDate.$error">
                            {{$t('validation.required')}}
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <label class="form-control-label"> {{$t('modal.timetableTimeTableMerge.mergeSection')}}<span
                        style="color:red">
                        *</span></label>
                </div>
            </div>
            <div class="row" v-for="(timeTableId, ind) in data.timeTableId">
                <div class="col-md-8">
                    <div class="form-group validated">
                        <select-ex :options="TimeTabledata" keyValue="timeTableId" displayValue="sectionName"
                            v-model.trim="data.timeTableId[ind]">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-4 text-center">
                    <button class="btn btn-outline-primary btn-icon btn-sm btn-circle" @click="insertClassId"
                        v-if="ind == (data.timeTableId.length - 1)">
                        <i class="la la-plus"></i>
                    </button>
                </div>

            </div>
        </div>
        <div class="modal-footer">
            <div class="row text-right">

                <div class="col-md-12 text-right">
                    <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i
                            class="la la-close"></i>
                        {{$t('button.close')}}</button>

                    <button class="btn btn-hover btn-sm btn-primary" @click="saveModel"><i class="la la-floppy-o"></i>
                        {{$t('button.save')}}</button>
                </div>
            </div>
        </div>
    </div>
</modal>
