<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.timetable')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.dayOff')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.dayOff')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.timetable.session')}}</label>
            <select-ex :options="sessionList" keyValue="sessionId" displayValue="fullName" v-model="sessionid"
              @input="loadCityCampus">
            </select-ex>
            <!-- <select v-model="sessionid" class="form-control" required>
              <option :key="index" :value="model.sessionId" v-for="(model,index) in sessionList">
                {{model.fullName}}
              </option>
            </select> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.timetable.campus')}}</label>
            <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" v-model="campusid"
              groupBy="cityName" @input="loadProgramsOfCampus"></select-ex>
            </select>
          </div>
          <!-- <drop-down v-model="campusid" :data="campusCityList" group-by="cityName" key-value="campusId"
            display-value="campusName" placeholder="Campus" @change="loadProgramsOfCampus">
          </drop-down> -->
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.timetable.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="campusProgramId" displayValue="description"
              groupBy="programName" v-model="campusProgramId" @input="loadClass"></select-ex>
            <!-- <drop-down v-model="campusProgramId" :data="campusProgramLinkList" group-by="programName"
            key-value="campusProgramId" display-value="description" placeholder="Programs" @change="loadClass">
          </drop-down> -->
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.timetable.class')}}</label>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classid"
              @input="loadSections"></select-ex>
            <!-- <select @change="loadSections" v-model="classid" class="form-control" required>
              <option :key="index" :value="model.classId" v-for="(model,index) in classList">{{model.fullName}}
              </option>
            </select> -->
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.timetable.section')}}</label>
            <select-ex :options="courseList" keyValue="sectionCourseLinkId" displayValue="sectionName"
              v-model="sectionCourseLinkId"></select-ex>

            <!-- <select-ex label="sectionName" v-model="sectionCourseLinkId" :options="courseList"
              :reduce="option => option.sectionCourseLinkId">
              <template slot="option" slot-scope="option">
                <span>{{option.sectionName}}</span>
              </template>
            </select-ex> -->
          </div>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('navigation.timetable')}}</label>
            <select-ex :options="slotTimingList" keyValue="slotTimingId" displayValue="startTime" v-model="slotTimingId"
              @input="GetTimeTableViaSession"></select-ex>
            <!-- <select @change="GetTimeTableViaSession" v-model="slotTimingId" class="form-control" required>
              <option :key="index" :value="model.slotTimingId" v-for="(model,index) in slotTimingList">
                {{model.startTime}}- {{model.endTime}}
              </option>
            </select>
            <label>Slot Timming</label> -->
          </div>
        </div>
        <div class="col-md-6 text-right" style="margin-top: 26px;">
          <button v-if="canAdd" @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="GetTimeTableViaSession" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </div>
        <div v-if="dayOffList.length=0">
          <div class="table-responsive" v-if="canRead">
            <table class="table table-striped table-hover">
              <thead>
                <tr role="row">
                  <th>TimeTable</th>
                  <th>From Date</th>
                  <th>To Date</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in dayOffList">
                  <td class="align-middle">{{item.fullName}}</td>
                  <td class="align-middle">{{item.fromDate|formatDMY}}</td>
                  <td class="align-middle">{{item.toDate|formatDMY}}</td>
                  <td class="align-middle">{{item.statusId==1?'Active':'InActive'}}</td>
                  <!-- <button @click="editModel(item)" class="b-edit">
                  <feather icon="edit"></feather>
                </button> -->
                  <button @click="editModel(item.row)" title="Edit" type="button"
                    class="btn btn-outline-primary btn-icon btn-sm btn-circle">
                    <i class="la la-edit"></i>
                  </button>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div else>
          There is no record
        </div>

      </div>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="GetTimeTableViaSession"></add-edit-model>
  <delete-model v-on:submit="GetTimeTableViaSession"></delete-model>
  <!-- <report-engine :data="reportData" :path="report"></report-engine> -->
  <bulk-timetable v-on:submit="GetTimeTableViaSession"></bulk-timetable>
</page-area>
