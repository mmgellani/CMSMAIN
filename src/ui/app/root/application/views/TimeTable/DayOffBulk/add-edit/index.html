<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="nice-modal-fade" width="60%" top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="row">
                <div class="col-md-2">
                    <a href="#" @click="cancel" class="cancel"><i class="fa fa-close"></i></a>
                </div>
                <div class="col-md-8 text-centre">
                    <div class="modal-title">

                        TimeTable&nbsp;-&nbsp;<span class="font12">{{title}}</span>

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close"
                        v-if="!IsNewRecord">
                        <input class="switch" type="checkbox" v-model="isActive">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-body">

            <div class="row">

                <div class="col-md-12">
                    <div class="form-group" v-if="staffList">
                        <v-select label="fullName" v-model="data.staffId" :options="staffList"
                            :reduce="option => option.staffId">
                            <template slot="option" slot-scope="option">
                                <span v-html="staffMember(option)"></span>
                            </template>
                        </v-select>
                        <label class="caption-title">Staff Name<span style="color:red">*</span></label>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <select class="form-control" v-model="data.programCourseLinkId" required>
                            <option :value="model.programCourseLinkId" v-for="(model,index) in CourseList">
                                {{ model.courseName }} </option>
                        </select>
                        <label>Course<span style="color:red">*</span></label>
                    </div>
                </div>
                <!-- <div class="col-md-4"> -->
                <!-- <div class="row">
                        <div class="form-group col-md-10">
                            <select class="form-control" v-model="data.staffId" required>
                                <option :value="model.staffId" v-for="(model,index) in staffList"> {{model.fullName}}
                                </option>
                            </select>
                            <label :class="!$v.model.staffId.required" style="margin-left:15px;">Staff<span
                                    style="color:red">
                                    *</span></label>
                        </div>
                        <div class="col-md-2">
                            <div class="row" style="margin-bottom:-6px; margin-top:-5px">
                                <a href="#" @click="addNewStaff">
                                    <i class="fa fa-plus m--hide success"></i>

                                </a>
                            </div>
                            <div class="row">
                                <a href="#" @click="loadStaff">
                                    <i class="fa fa-refresh m--hide"></i>

                                </a>
                            </div>
                        </div>

                    </div> -->

                <!-- </div> -->
                <div class="col-md-6">
                    <div class="row">
                        <div class="form-group col-md-12" v-if="datas">

                            <v-select label="fullName" v-model="data.roomId" :options="datas"
                                :reduce="option => option.roomId">
                                <template slot="option" slot-scope="option">
                                    <span v-html="roomCampus(option)"></span>
                                </template>
                            </v-select>
                            <label class="caption-title">Room<span style="color:red">*</span></label>

                        </div>
                        <!-- <div class="col-md-2">
                            <div class="row" style="margin-bottom:-6px; margin-top:-5px">
                                <a href="#" @click="addNewRoom">
                                    <i class="fa fa-plus m--hide success"></i>

                                </a>
                            </div>
                            <div class="row">
                                <a href="#" @click="loadRoom">
                                    <i class="fa fa-refresh m--hide"></i>

                                </a>
                            </div>
                        </div> -->

                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <select class="form-control" v-model="data.dayName" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                        <label :class="!$v.model.dayName.required">Day<span style="color:red"> *</span></label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="row">
                        <div class="form-group col-md-12">
                            <select class="form-control" v-model="data.slotTimingId" required>
                                <option :value="model.slotTimingId" v-for="(model,index) in SlotTimingList">
                                    {{model.startTime + `-` + model.endTime}} </option>
                            </select>
                            <label :class="!$v.model.slotTimingId.required" style="margin-left:15px;">Slot<span
                                    style="color:red">
                                    *</span></label>
                        </div>
                        <!-- <div class="col-md-2">
                            <div class="row" style="margin-bottom:-6px; margin-top:-5px">
                                <a href="#" @click="addNewSlots">
                                    <i class="fa fa-plus m--hide success"></i>

                                </a>
                            </div>
                            <div class="row">
                                <a href="#" @click="loadSlots">
                                    <i class="fa fa-refresh m--hide"></i>

                                </a>
                            </div>
                        </div> -->

                    </div>
                </div>
                <div class="col-md-2">
                    <div role="group" aria-label="..." class="m-btn-group m-btn-group--pill btn-group close">
                        <input class="switch" type="checkbox" v-model="data.isBreak">
                    </div>
                    <label class="caption-title">Break</label>

                </div>
            </div>
        </div>

        <div class="modal-footer">
            <div class="row text-right">
                <div class="col-md-12">
                    <button class="btn  btn-danger ripple" @click="cancel">Close</button>

                    <button class="btn  btn-primary" :disabled="!allowSubmit" @click="saveModel">Save</button>
                </div>
            </div>
        </div>
    </div>
    <!-- <Course v-on:submit="loadCourse"></Course> -->
    <Staff v-on:submit="loadStaff"></Staff>
    <Room v-on:submit="loadRoom"></Room>
    <Slots v-on:submit="loadSlots"></Slots>
</modal>
