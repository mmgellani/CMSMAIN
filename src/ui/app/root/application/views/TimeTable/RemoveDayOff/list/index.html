<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.timetable')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.RemoveDayOffBulkList')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.RemoveDayOffBulkList')">
    <template slot="portlet-body">
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.session')}}</label>
            <select-ex @input="loadCityCampus" :options="sessionList" keyValue="sessionId" displayValue="fullName"
              v-model.trim="sessionid">
            </select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.campus')}}</label>
            <select-ex :options="campusCityList" v-model.trim="campusid" keyValue="campusId" displayValue="campusName"
              groupBy="cityName" @input="loadProgramsOfCampus"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.program')}}</label>
            <select-ex :options="campusProgramLinkList" keyValue="campusProgramId" displayValue="description"
              groupBy="programName" v-model.trim="campusProgramId" @input="loadClass"></select-ex>
            </select>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.class')}}</label>
            <select-ex @input="loadProgramSection" :options="classList" keyValue="classId" displayValue="fullName"
              v-model.trim="classid"></select-ex>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.section')}}</label>
            <select-ex :options="sectionCourseLinkList" keyValue="sectionId" displayValue="sectionName"
              v-model.trim="sectionid"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.fromDate')}}</label>
            <date-picker class="input-28" id="change-width" ref="changeWidth" v-model.trim="fromDate"
              format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.RemoveDayOffBulkList.toDate')}}</label>
            <date-picker class="input-28" id="change-width" @change="GetTimeTableViaSession" ref="changeWidth"
              v-model.trim="ToDate" format="DD/MM/YYYY" lang="en" v-mask="'##/##/####'"></date-picker>
          </div>
        </div>
      </div>
      <grid :data="Dayofflist" :columns="columns" pre="modal.RemoveDayOffBulkList.">
        <template slot="action-area">
          <!-- <button data-toggle="modal" data-target="#myModal" class=" btn btn-hover btn-sm btn-outline-primary"
            :disabled="Dayofflist.length==0"> <i class="la la-floppy-o"></i>
            {{$t('button.save')}}</button> -->
            <button data-toggle="modal" data-target="#myModal2" class=" btn btn-hover btn-sm btn-outline-primary"
            :disabled="Dayofflist.length==0"> <i class="la la-floppy-o"></i>
           Remove</button>
          <!-- <button @click="refreshData" class="btn btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button> -->
        </template>
        <template slot="ischeck-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">
            {{$t('modal.RemoveDayOffBulkList.grid.ischeck')}}<input class="mb-0" type="checkbox"
              @change="CheckAllrecords" v-model="CheckAllRec">
            <span></span>
          </label>
        </template>
        <template slot="ischeck" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand" style="margin-bottom: 14px !important;">
            <input type="checkbox" v-model="item.row.ischeck">
            <span></span>
          </label>
        </template>
      </grid>
    </template>
  </portlet-area>
  <add-edit-model v-on:submit="GetTimeTableViaSession"></add-edit-model>
  <delete-model v-on:submit="GetTimeTableViaSession"></delete-model>
  <!-- <report-engine :data="reportData" :path="report"></report-engine> -->
  <bulk-timetable v-on:submit="GetTimeTableViaSession"></bulk-timetable>


  <div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.RemoveDayOffBulkList')}}</h3>
            <p>Confirmation</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure that you want to Save?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            :disabled="Dayofflist.length==0" @click="saveModel">
            <i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
  <div id="myModal2" class="modal fade" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <div class="col-md-6 modal_heading">
            <h3 class="modal-title">{{$t('navigation.RemoveDayOffBulkList')}}</h3>
            <p>Confirmation</p>
          </div>
          <div class="col-md-6 text-right">
            <button type="button" class="close " data-dismiss="modal">
            </button>
          </div>
        </div>
        <div class="modal-body">
          <p>Are you sure that you want to Remove?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit" data-dismiss="modal">
            <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" data-dismiss="modal" type="submit"
            :disabled="Dayofflist.length==0" @click="saveModel2">
            <i class="la la-save"></i> {{$t('button.save')}}</button>
        </div>
      </div>
    </div>
  </div>
</page-area>
