<modal name="add-edit-model" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="60%"
    @before-open="beforeModalOpen">
    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-10 modal_heading">
                <h3 class="modal-title">{{$t('navigation.viewTimeTable')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-2 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>
        <div class="modal-body staffModel">
            <div class="row">
                <div class="col-md-3" v-if="staffList">
                    <div class="form-group">
                        <label class="form-control-label">{{$t('modal.viewTimeTable.staffName')}}</label> <span
                            style="color:red"> *</span>
                        <select-ex :options="staffList" keyValue="staffId" displayValue="fullName"
                            v-model="data.staffId">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="form-control-label">{{$t('modal.viewTimeTable.course')}}</label> <span
                            style="color:red"> *</span>
                        <select-ex :options="CourseList" keyValue="programCourseLinkId" displayValue="courseName"
                            v-model="data.programCourseLinkId">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-3" v-if="datas">
                    <div class="form-group">
                        <label class="form-control-label">{{$t('modal.viewTimeTable.room')}}</label> <span
                            style="color:red"> *</span>
                        <select-ex :options="datas" keyValue="roomId" displayValue="fullName" v-model="data.roomId">
                        </select-ex>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-group">
                        <label class="form-control-label">{{$t('modal.viewTimeTable.day')}}</label> <span
                            style="color:red"> *</span>
                        <select-ex :options="week" keyValue="dayname" displayValue="dayname" v-model="data.dayName">
                        </select-ex>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-3">
                    <label class="form-control-label">{{$t('modal.viewTimeTable.slot')}}</label> <span
                        style="color:red"></span>
                    *</span>
                    <select-ex :options="SlotTimingList" keyValue="slotTimingId" displayValue="startTime"
                        v-model="data.slotTimingId">
                    </select-ex>
                </div>

                <!-- <select class="form-control form-control-sm" v-model="data.slotTimingId" required>
                        <option :value="model.slotTimingId" v-for="(model,index) in SlotTimingList">
                            {{model.startTime + `-` + model.endTime}} </option>
                    </select> -->
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <div class="row">
            <div class="col-md-12 text-right">
                <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
                    {{$t('button.close')}}</button>
                <button class="btn btn-light btn-hover btn-sm btn-primary" :disabled="!allowsubmit()" @click="saveModel"><i
                        class="la la-floppy-o"></i> {{$t('button.save')}}</button>

            </div>
        </div>
    </div>
</modal>
