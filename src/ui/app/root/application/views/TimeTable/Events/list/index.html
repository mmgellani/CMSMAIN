<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title">{{$t('navigation.academiccalendar')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        {{$t('navigation.events')}} </a>
    </div>
  </template>
  <portlet-area action="1" :title="$t('navigation.events')">
    <template slot="portlet-body">
      <div class="row">

        <div class="col-md-3">

          <div class="form-group validated">
            <label class="form-control-label">{{$t('modal.reports.feeReports.session')}}<span style="color:red">
                *</span></label>
            <select-ex @input="loadAcademicCalendarMaster" :options="sessionList" keyValue="sessionId"
              displayValue="fullName" v-model="sessionId">
            </select-ex>
          </div>
        </div>

        <div class="col-md-3 form-group">
          <label class="form-control-label">{{$t('modal.setupCampus.subCity')}}<span style="color:red">
              *</span>
          </label>
          <select-ex @input="loadAcademicCalendarMaster" :options="citySubCityList" keyValue="subCityId"
            displayValue="subCityName" v-model="subCityId" groupBy="cityName">
          </select-ex>
        </div>

        <div class="col-md-3">
          <div class="form-group">
            <label>{{$t('modal.notification.class')}}</label><span style="color:red">
              *</span>
            <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model.trim="classId"
              @input="loadAcademicCalendarMaster"></select-ex>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>Academic Calendar Master<span style="color:red">
                *</span>

            </label>
            <select-ex @input="loadEvents" :options="academicCalendarMasterList" keyValue="academicCalendarMasterId" displayValue="fullName"
              v-model="academicCalendarMasterId">
            </select-ex>
          </div>
        </div>
      </div>
      <!-- <div class="row">
        <div class="col-md-3">
            <div class="form-group validated">
                <label class="form-control-label">Holiday Type<span style="color:red"> *</span></label>
                <select-ex @input="loadHolidays" :options="holidaytypelist" keyValue="holidayTypeId" displayValue="name"
                    v-model.trim="holidayTypeId">
                </select-ex>

            </div>

        </div>
    </div> -->
      <grid :data="data" :columns="columns" pre="modal.events.">
        <template slot="action-area">
          <button  @click="insertModel" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-plus"></i> {{$t('button.insert')}}
          </button>
          <button @click="loadHolidays()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button>
        </template>
        <template slot="fromDate" slot-scope="item">
          {{item.row.fromDate | formatDMY}}
        </template>
        <template slot="toDate" slot-scope="item">
          {{item.row.toDate | formatDMY}}
        </template>
        <template slot="action" slot-scope="item">
          <button @click="editModel(item.row)"  title="Edit" type="button"
            class="btn btn-outline-primary btn-icon btn-sm btn-circle">
            <i class="la la-edit"></i>
          </button>

          <button @click="deleteModel(item.row)"  title="Delete" type="button"
            class="btn btn-outline-danger btn-icon btn-sm btn-circle">
            <i class="la la-trash"></i>
          </button>
        </template>

        <template slot="statusId" slot-scope="item">
          <span class="kt-badge  kt-badge--success kt-badge--inline kt-badge--pill"
            v-if="item.row.statusId == 1">Active</span>
          <span class="kt-badge  kt-badge--danger kt-badge--inline kt-badge--pill" v-else>InActive</span>
        </template>
      </grid>
    </template>
  </portlet-area>


<add-edit v-on:submit="loadEvents"></add-edit>
<delete v-on:submit="loadEvents"></delete>
  
  
</page-area>
