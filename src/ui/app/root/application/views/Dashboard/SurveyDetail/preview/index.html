<modal name="preview" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
    :scrollable="true" :adaptive="false" transition="bounce" width="40%" top="10" height="auto"
    @before-open="beforeModalOpen">

    <div class="modal-content">
        <div class="modal-header">
            <div class="col-md-6 modal_heading">
                <h3 class="modal-title">{{$t('Survey Detail')}}</h3>
                <p> {{title}} </p>
            </div>
            <div class="col-md-6 text-right">
                <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
                    <i class="la la-close"></i>
                </button>
            </div>
        </div>

        <div class="modal-body">
            <div class="row mt-3 ml-4" v-if="data">
              
                <div class="form-group" v-if="data.controlType == 'text' || data.controlType == 'file'">
                    <label><strong>{{ data.question}}</strong> {{ data.description}}</label> <br />
                    <input :type="data.controlType" class="form-control form-control-sm" />
                </div>


                <div v-if="data.controlType == 'Select'">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ data.question}}</strong> {{ data.description}}</label>
                        </div>
                    </div>
                    <div class="col-md-3 mt-3">
                        <select class="form-control form-control-sm">
                            <option v-for="op in data.operation" :value="op.option">
                                {{ op.option }}
                            </option>
                        </select>
                    </div>
                </div>

                <div v-if="data.controlType == 'checkbox' || data.controlType == 'radio'">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ data.question}}</strong> {{ data.description}}</label> <br />
                        </div>
                        <div class="col-md-3 mt-3" v-for="op in data.operation">
                            <label :for="op.option">{{ op.option }}</label> &nbsp;&nbsp;&nbsp;
                            <input :type="data.controlType" style="transform: translateY(2px);" :id="op.option"
                                :value="op.option" name="caption" />
                        </div>
                    </div>
                </div>
                <div v-if="data.controlType == 'TextArea'">
                    <div class="row">
                        <div class="col-md-12">
                            <label><strong>{{ data.question}}</strong> {{ data.description}}</label> <br />
                        </div>
                        <div class="col-md-3 mt-3">
                            <textarea class="form-control form-control-sm" rows="5" v-model="messageText"></textarea>
                        </div>
                    </div>
                </div>
            </div>
