<page-area>
   <template slot="breadcrumbs-area">
      <h3 class="kt-subheader__title">{{$t('navigation.dashboard')}}</h3>
      <span class="kt-subheader__separator kt-hidden"></span>
      <div class="kt-subheader__breadcrumbs">
         <a href="#" class="kt-subheader__breadcrumbs-home">
            <i class="flaticon2-shelter"></i>
         </a>
         <span class="kt-subheader__breadcrumbs-separator"></span>
         <a href="" class="kt-subheader__breadcrumbs-link">
            {{$t('navigation.yearoverYearComparison')}}
         </a>
      </div>
   </template>


   <portlet-area action="1" :title="$t('navigation.yearoverYearComparison')">
      <template slot="portlet-body">

         <div class="row">

            <div class="col-md-3">
               <div class="form-group">
                  <div class="row">
                     <label class="col-md-6">
                        {{$t('navigation.setupPossessionType')}}
                     </label>
                     <div class="col-md-6 text-right">
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                           <label class="m-0">
                              <input type="checkbox" checked="checked" v-model="typeChk"> <span></span>
                           </label>
                        </span>
                     </div>
                  </div>
                  <select-ex @input="getData('city')" :options="campusTypeList" keyValue="fullName"
                     displayValue="fullName" v-model="typeId" :disabled="!typeChk">
                  </select-ex>
               </div>
            </div>

            <div class="col-md-3">
               <div class="form-group">
                  <div class="row">
                     <label class="col-md-6">
                        {{$t('modal.concessionDashboard.cities')}}
                     </label>
                     <div class="col-md-6 text-right">
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                           <label class="m-0">
                              <input type="checkbox" checked="checked" v-model="cityChk"> <span></span>
                           </label>
                        </span>
                     </div>
                  </div>
                  <select-ex @input="getData('subcity', cityId)" :options="cityList" keyValue="fullName"
                     displayValue="fullName" v-model="cityId" :disabled="!cityChk">
                  </select-ex>
               </div>
            </div>

            <div class="col-md-3">
               <div class="form-group">
                  <div class="row">
                     <label class="col-md-6">
                        {{$t('navigation.setupSubCity')}}
                     </label>
                     <div class="col-md-6 text-right">
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                           <label class="m-0">
                              <input type="checkbox" checked="checked" v-model="subcityChk"> <span></span>
                           </label>
                        </span>
                     </div>
                  </div>
                  <select-ex :options="subCityList" keyValue="fullName" displayValue="fullName" v-model="subcityId"
                     :disabled="!subcityChk">
                  </select-ex>
               </div>
            </div>

            <div class="col-md-3">
               <div class="form-group">
                  <div class="row">
                     <label class="col-md-6">
                        {{$t('navigation.setupProgram')}}
                     </label>
                     <div class="col-md-6 text-right">
                        <span class="kt-switch kt-switch--sm kt-switch--icon">
                           <label class="m-0">
                              <input type="checkbox" checked="checked" v-model="programChk"> <span></span>
                           </label>
                        </span>
                     </div>
                  </div>
                  <select-ex :options="programList" keyValue="fullName" displayValue="fullName" v-model="programId"
                     :disabled="!programChk">
                  </select-ex>
               </div>
            </div>

            <div class="col-md-3">
               <button class="btn btn-block btn-primary" @click="refreshData">Generate </button>
            </div>

         </div>

         <div class="row mt-5">
            <collapsible-widget class="col-md-12">
               <template slot="title">
                  Annual Admission Comparison
               </template>
               <template slot="content">
                  <Highcharts :options="optionsTemp" :id="index" />
               </template>
            </collapsible-widget>
         </div>

         <div class="row mt-5">
            <table-graph :graphVar="tabTwo" :tableVar="tabOne" class="col-md-12">
               <template slot="title">
                  Average Admission Per city
               </template>
               <template slot="tableContent">
                  <table class="table table-striped table-hover">
                     <thead>
                        <tr>
                           <th> Session </th>
                           <th> Possession </th>
                           <th> No of Campuses </th>
                           <th> Total Admission </th>
                           <th> Average </th>
                        </tr>
                     </thead>
                     <tbody>
                        <tr v-for="item in averageEx">
                           <td>
                              {{item.session}}
                           </td>
                           <td>
                              {{item.possession}}
                           </td>
                           <td>
                              {{item.totalCampus}}
                           </td>
                           <td>
                              {{item.totalAdmission}}
                           </td>
                           <td>
                              {{item.average}}
                           </td>
                        </tr>
                     </tbody>
                  </table>
               </template>
               <template slot="graphContent">
                  <Highcharts :options="optionsTempEx" :id="index" />
               </template>
            </table-graph>
         </div>

         </div>

         <!-- <table>
            <tr> </tr>
            <tr v-for="item in totalavgdata">
               <td>{{item.session}}</td>
               <td>{{item.possession}}</td>
               <td>{{item.totalCampus}}</td>
               <td>{{item.average}}</td>
               <td>{{item.totaladmission}}</td>
            </tr>
         </table> -->
      </template>
   </portlet-area>
</page-area>
