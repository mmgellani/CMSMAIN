<page-area>
    <template>
        <div class="row">
            <div class="col-md-12">
                <h5>Create a Notification</h5>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md-3">
                <h5 class="noti-title-bar">Select Recepients</h5>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-3">Possession Type</label>
                    <select v-model="PossessionType" @change="loadSession"
                        class="form-control form-control-sm" required>
                        <option value="Franchise">Franchise</option>
                        <option value="Owned">Owned</option>
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <label >Entity</label>
                    <select v-model="checkEntity" @change="loadSession"
                        class="form-control form-control-sm" required>
                        <option value="CMS">CMS</option>
                        <option value="Hadaf">Hadaf</option>
                    </select>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-3">{{$t('modal.customSms.session')}}<span style="color:red">
                            *</span></label>
                    <select-ex :options="sessionModel" keyValue="sessionId" displayValue="fullName"
                        v-model="sessionId" @input="loadCityCampus">
                    </select-ex>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">

                    <div class="row">
                        <div class="col-md-8">
                            <label class="mb-3">{{$t('modal.customSms.campus')}}<span style="color:red">
                                    *</span></label>
                        </div>
                        <!-- <div class="col-md-4 text-right" style="position: relative;">
                            <span class="kt-switch kt-switch--sm">
                                <label class="m-0">
                                    <input type="checkbox" class="switch" v-model="showall"
                                        @change="getCustomize">
                                    <span></span>
                                </label>
                            </span>
                            <label class="show-checkBox">Show All</label>
                        </div> -->
                    </div>
                    <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName"
                        groupBy="cityName" v-model="campusIdEx" @input="loadProgramsOfCampusEx">
                    </select-ex>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-3">{{$t('modal.customSms.program')}}</label>
                    <!-- <select-ex :options="campusProgramLinkListEX" keyValue="programId"
                    displayValue="programName" v-model="programId"  
                    @input="loadSectionsEx">
                </select-ex> -->
                    <select-ex :options="campusProgramLinkListEX" keyValue="programId" displayValue="programName"
                     v-model="programId" @input="loadSectionsEx">
                </select-ex>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-8">
                            <label>Program Detail</label>
                        </div>
                        <div class="col-md-4 text-right">

                            <span class="kt-switch kt-switch--sm">
                                <label class="m-0">
                                    <input class="switch" @change="loadSectionsEx" v-model="issection"
                                        type="checkbox">
                                    <span></span>
                                </label>
                            </span>

                        </div>
                    </div>

                    <select-ex :disabled="checkCamp || !issection" :options="sectionList1"
                        keyValue="ProgramDetailId" displayValue="Description"
                        v-model="ProgramDetailId" >
                    </select-ex>
                </div>
            </div>

            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-3">Gender</label>
                    <select-ex :options="genderModel" keyValue="genderId" displayValue="description"
                        v-model="idGender">
                    </select-ex>
                </div>
            </div>
            <div class="col-md-3 text-center" style="margin-top: 28px;">
                <button class="btn btn-primary" @click="AddNotific">Add</button>
            </div>
        </div>
        <div class="row mt-2" v-if="list.length">
            <div class="col-md-3">
                <h5 class="noti-title-bar">Preview Recepients</h5>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="table-responsive mt-3" v-if="list.length">
                    <table class="table">
                        <thead>
                            <tr>
                                <th rowspan="2">
                                    Session
                                </th>
                                <th>
                                    Campus
                                </th>
                                <th>
                                    Program
                                </th>
                                <th>
                                    Class
                                </th>
                                <th>
                                    Section
                                </th>
                                <th>
                                    Gender
                                </th>
                                <th>
                                    Action
                                </th>
                                <!-- <th>
                                    Type
                                </th>
                                <th>
                                    Title
                                </th> -->
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="item in list" class="rowHover" style="cursor: pointer;">
                                <td>
                                    <span v-html="item.sessionName"></span>
                                </td>
                                <td>
                                    {{item.campusName!=null?item.campusName:'All'}}
                                </td>
                                <td>
                                    {{item.programName!=null?item.programName:'All'}}
                                </td>
                                <td>
                                    {{item.class!=null?item.class:'All'}}
                                </td>
                                <td>
                                    {{item.section!=null?item.section:'All'}}
                                </td>
                                <td>
                                    {{item.gender!=null?item.gender:'All'}}
                                </td>
                                <td>
                                    <button title="Delete" type="button" @click="removeItem(item)"
                                        class="btn btn-outline-danger btn-icon btn-sm btn-circle"><i
                                            class="la la-trash"></i></button>
                                </td>
                                <!-- <td>
                                    {{item.type}}
                                </td>
                                <td>
                                    {{item.title}}
                                </td> -->
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
        <br>
        <div class="row mt-2 mb-3" v-if="list.length">
            <div class="col-md-3">
                <h5 class="noti-title-bar">Enter Notification</h5>
            </div>
        </div>
        <div class="row" v-if="list.length>0">

            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-2">Notification Type<span style="color:red">
                            *</span></label>
                    <select-ex :options="datanoti" keyValue="typeid" displayValue="typeName"
                        v-model.trim="typeid">
                    </select-ex>
                </div>
            </div>
            <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-2">Notification Title<span style="color:red">
                            *</span></label>
                    <input type="text" v-model.trim="titletxt" class="form-control"
                        style="height: 29px;">
                </div>
            </div>

            <div class="col-md-3">
                <label class="form-control-label mb-3">
                </label>
                <div v-if="!imagetxt" class="dropzone-panel">
                    <div class="img-wrapper">
                        <div class="img-icon">
                            <label for="AttachFile" class="btn btn-primary btn-sm">Attach File</label>
                            <input type="file" class="dropzone-select" style="display: none;"
                                accept="application/pdf, image/*" id="AttachFile"
                                @input="convertToBase64()">
                        </div>
                    </div>
                    <span style="font-size: 10px;color:red; font-weight: 500;">(pdf,jpeg,png) max size:
                        1 mb</span>
                </div>
                <div class="col-md-4" v-else>
                    <div class="group-logo-img" v-if="!pdfFile">
                        <img :src="imagetxt" />
                        <label class="mt-2 text-primary">{{fileName}}</label>
                        <button class="group-logo-del" vs-type="border" vs-icon="close"
                            @click="removeImage">
                            <i class="la la-trash"></i>
                        </button>
                    </div>
                    <div class="group-logo-img" v-if="pdfFile">
                        <img src="../../../../../../assets/images/pdf .png" />
                        <label class="mt-2 text-primary">{{fileName}}</label>
                        <button class="group-logo-del" vs-type="border" vs-icon="close"
                            @click="removeImage">
                            <i class="la la-trash"></i>
                        </button>
                    </div>
                </div>
            </div>


            <!-- <div class="col-md-3">
                <button class="btn btn-primary mt-5" @click="AssignNot">Add</button>
            </div> -->

            <!-- {{dataNotificationTemp}} -->
            <!-- <div class="col-md-3">
                <div class="form-group">
                    <label class="mb-4">Attachment</label>
                    <input type="text" v-model.trim="imagetxt" class="form-control"
                        style="height: 29px;">
                </div>
            </div> -->
        </div>
        <div class="row" v-if="list.length>0">
            <div class="col-md-12">
                <div class="form-group">
                    <label>{{$t('navigation.notification')}}<span style="color:red">
                            *</span></label>
                    <textarea id="txtmessage" rows="5" class="form-control form-control-sm"
                        v-model.trim="Messaage">
        </textarea>
                </div>
            </div>
        </div>
        <div class="row" v-if="list.length>0">
            <div class="offset-md-8 col-md-2">
                <div class="form-group">
                    <!-- <button class="btn btn-light btn-hover btn-sm btn-primary" style="width: 100%"
                        @click="generate()" data-dismiss="modal" type="submit">
                        <i class="fa fa-file-o"></i> Notification History</button> -->
                </div>
            </div>
            <div class="col-md-2">
                <div class="form-group">
                    <button class="btn btn-light btn-hover btn-sm btn-primary" style="width: 100%"
                        @click="SaveBulkData()" data-dismiss="modal" type="submit">
                        <i class="fa fa-bell-o"></i> Send Notification</button>
                </div>

            </div>
        </div>
        <div id="myModal" class="modal fade" role="dialog">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="col-md-6 modal_heading">
                            <h3 class="modal-title">{{$t('navigation.notification')}}</h3>
                            <p>Confirmation</p>
                        </div>
                        <div class="col-md-6 text-right">
                            <button type="button" class="close " data-dismiss="modal">
                            </button>
                        </div>
                    </div>
                    <div class="modal-body">
                        <div class="row mt-2">
                            <div class="col-md-12">
                                <p>Are you sure to Send Notification to selected student?</p>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-outline-secondary btn-hover btn-sm" type="submit"
                            data-dismiss="modal">
                            <i class="la la-close"></i>
                            {{$t('button.close')}}</button>
                        <button class="btn btn-light btn-hover btn-sm btn-primary"
                            @click="insertModel(saveDatasList)" data-dismiss="modal" type="submit">
                            <i class="la la-save"></i> {{$t('button.save')}}</button>
                    </div>
                </div>
            </div>
        </div>
    </template>   
</page-area>
