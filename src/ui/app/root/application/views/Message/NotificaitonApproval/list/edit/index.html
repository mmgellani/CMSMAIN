<modal name="edit" :clickToClose="false" :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
  :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="40%"
  @before-open="beforeModalOpen">
  <div class="modal-content">
    <div class="modal-header">
      <div class="col-md-6 modal_heading">
        <h5 class="modal-title">Notification</h5>
        <p>Edit Record</p>
      </div>
      <div class="col-md-6 text-right">
        <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel">
          <i class="la la-close"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <div class="row">
        <div class="col-md-3">
          <h6>Date:</h6>
        </div>
        <div class="col-md-4">
          <label>{{datee|formatDMY}}</label>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-6" v-if="datanoti.length>0">
          <div class="form-group">
            <label class="mb-4">Notification Type<span style="color:red">
                *</span></label>
            <select-ex :options="datanoti" keyValue="typeName" displayValue="typeName" v-model.trim="operation.type">
            </select-ex>
          </div>
        </div>

        <div class="col-md-6">
          <div class="form-group">
            <label class="form-control-label">
              Notification Title
            </label>
            <input class="form-control m-input m-input--air" v-model="operation.title"></input>
            <!-- Message Count : {{msgtext.length}} -->
          </div>
        </div>

      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <div class="form-group">
            <label class="form-control-label">
              Notification Text
            </label>
            <textarea class="form-control m-input m-input--air" v-model="msgtext"></textarea>
            <!-- Message Count : {{msgtext.length}} -->
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="row">
        <div class="col-md-12 text-right">
          <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel"> <i class="la la-close"></i>
            {{$t('button.close')}}</button>
          <button class="btn btn-light btn-hover btn-sm btn-primary" @click="updMicrosoftPass">
            Update</button>
        </div>
      </div>
    </div>
  </div>
</modal>
