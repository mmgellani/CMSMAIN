<page-area>
  <template slot="breadcrumbs-area">
    <h3 class="kt-subheader__title"> {{$t('navigation.bsetup')}}</h3>
    <span class="kt-subheader__separator kt-hidden"></span>
    <div class="kt-subheader__breadcrumbs">
      <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
      <span class="kt-subheader__breadcrumbs-separator"></span>
      <a href="" class="kt-subheader__breadcrumbs-link">
        <!-- {{$t('navigation.notificationApproval')}} -->
      <!-- Notification Summary Report -->
      View/Recall Notifications
      </a>
    </div>
  </template>
  <portlet-area action="1" :title=
  "$t('navigation.notificationApproval')"
  
  >
    <template slot="portlet-body">
      <div class="row" v-if="!showmodel">

        <div class="col-md-3">
          <div class="form-group">
            <label>From Date</label>
            <!-- @input="Getdata"  -->
            <date-picker class="input-28 mt-2" id="change-width" ref="changeWidth" v-model="datestring"
              format="DD/MM/YYYY"  @change="changedate"   lang="en"></date-picker>
          </div>
        </div>
        <div class="col-md-3">
          <div class="form-group">
            <label>To Date</label>
            <date-picker class="input-28 mt-2" id="change-width" ref="changeWidth" v-model="datestring1"
              format="DD/MM/YYYY" :not-before="datestring" @change="Getdata()"   lang="en"></date-picker>
          </div>
        </div>
        <div class="col-md-9 text-right" style="float:right; margin-top: 29px;">
          <!-- <button  class="btn btn-primary btn-light btn-hover btn-sm"
          @click="generate()" >Summary Report</button> -->
          <!-- <button @click="Getdata()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
            <i class="la la-refresh"></i> {{$t('button.reload')}}
          </button></div> -->
        </div>
      </div>
      <div class="d-flex justify-content-end">
        <button class="btn btn-primary btn-light btn-hover btn-sm" @click="generate()">Summary Report</button>
        <button @click="Getdata()" class="btn btn-light btn-hover btn-sm btn-outline-primary">
          <i class="la la-refresh"></i> {{$t('button.reload')}}
        </button>
      </div>
      <div v-if="!showmodel">
      <grid :data="datas" :columns="columns" pre="modal.notificationApproval.">
        <template slot="qdate" slot-scope="item">
          {{item.row.qdate|formatDMY}}
        </template>
        <template slot="action-area">
          <!-- <button class="btn btn-primary btn-light btn-hover btn-sm" :disabled="!isDisabled" @click="toggle()">Approve</button> -->
         

        </template>
        <template slot="url" slot-scope="item">
          <span v-if="item.row.url.length>1">
            <a v-if="item.row.url.split('.').pop()=='pdf'" :href="item.row.url" target="_blank">Download pdf</a>
            <a v-else :href="item.row.url" target="_blank">
              <img :src="item.row.url" alt="" style="width: 40px; height: 40px;">
            </a>
          </span>
        
        </template>
        <template slot="action" slot-scope="item">
          <!-- <button @click="edit(item.row)" class="btn btn-outline-primary btn-icon btn-sm btn-circle"
            data-toggle="tooltip" data-placement="top" title="Edit Text">
            <i class="la la-edit"></i>
          </button> -->
         
          <button @click="passModel(item.row)" class="btn btn-outline-danger btn-icon btn-sm btn-circle"
          data-placement="top" title="Unapprove" data-toggle="modal" data-target="#myModal">
          <i class="la la-times"></i>
        </button>
         
        </template>
        <!-- <template slot="isChecked-header" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand mb-0">All <input type="checkbox"   @change="updall()" v-model="chkall" class="mb-0">
            <span></span>
          </label>
        </template> -->
        <!-- <template slot="isChecked" slot-scope="item">
          <label class="kt-checkbox kt-checkbox--brand">
            <input type="checkbox" v-model="item.row.isChecked"  @change="updatechek()">
            <span></span>
          </label>
         </template> -->
      </grid>
      </div>
      </template>

    </template>
  </portlet-area>
  <edit v-on:submit="Getdata()"></edit>
  <approve v-on:submit="Getdata()"></approve>
  <UnApproveNotification v-on:submit="Getdata()"></UnApproveNotification>
  <div v-if="showmodel" height="auto" class="w-50  "
  style="position: absolute;
  top: 30%;
  left: 35%;
  z-index: 111;"   >

    <div class="modal-content" b-alert
 :min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
 :scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="40%">
   <div class="modal-header">
     <div class="col-md-6 modal_heading">
       <h5 class="modal-title">Approve Notification</h5>
       <p>Confirmation</p>
     </div>
     <div class="col-md-6 text-right">
       <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel()">
         <i class="la la-close"></i>
       </button>
     </div>
   </div>
   <div class="modal-body">
     <div class="row mt-3">
       <div class="col-md-12">
         <p>Are you sure you want to approve Notification?</p>
       </div>
     </div>
   </div>
   <div class="modal-footer">
     <div class="row">
       <div class="col-md-12 text-right">
         <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel()"> <i class="la la-close"></i>
           {{$t('button.close')}}</button>
         <button class="btn btn-light btn-hover btn-sm btn-primary" @click="updatedata()">
           Save</button>
       </div>
     </div>
   </div>
 </div>
</div>
<div v-if="showmodelunapprove" height="auto" class="w-50  "
style="position: absolute;
top: 30%;
left: 35%;
z-index: 111;"   >

  <div class="modal-content" b-alert
:min-width="200" :min-height="200" :pivot-y="0.5" :reset="true"
:scrollable="true" :adaptive="false" transition="bounce" top="10" height="auto" width="40%">
 <div class="modal-header">
   <div class="col-md-6 modal_heading">
     <h5 class="modal-title">Recall Notification</h5>
     <p>Confirmation</p>
   </div>
   <div class="col-md-6 text-right">
     <button type="button" class="close " data-dismiss="modal" aria-label="Close" @click="cancel()">
       <i class="la la-close"></i>
     </button>
   </div>
 </div>
 <div class="modal-body">
   <div class="row mt-3">
     <div class="col-md-12">
       <p>Are you sure you want to Recall Notification?</p>
     </div>
   </div>
 </div>
 <div class="modal-footer">
   <div class="row">
     <div class="col-md-12 text-right">
       <button class="btn btn-outline-secondary btn-hover btn-sm" @click="cancel()"> <i class="la la-close"></i>
         {{$t('button.close')}}</button>
       <button class="btn btn-light btn-hover btn-sm btn-primary" @click="unapprove()">
         Yes</button>
     </div>
   </div>
 </div>
</div>
</div>
  <!-- <UnApproveNotification v-on:submit="Getdata()"></UnApproveNotification> -->
</page-area>
