

<page-area>
    <template slot="breadcrumbs-area">
        <h3 class="kt-subheader__title"> {{$t('navigation.bsetup')}}</h3>
        <span class="kt-subheader__separator kt-hidden"></span>
        <div class="kt-subheader__breadcrumbs">
            <a href="#" class="kt-subheader__breadcrumbs-home"><i class="flaticon2-shelter"></i></a>
            <span class="kt-subheader__breadcrumbs-separator"></span>
            <a href="" class="kt-subheader__breadcrumbs-link">
               Push Notification </a>
        </div>
    </template>
    <portlet-area action="1" title="Push Notification">
        <template slot="portlet-body">

            <div class="row">
                <div class="col-md-3 mt-2">
                  <div class="form-group">
                    <label>{{$t('modal.reports.feeReports.session')}}<span style="color:red"> *</span></label>
                    <select-ex :options="sessionModel" keyValue="sessionId" displayValue="fullName" v-model="sessionId">
                    </select-ex>
                  </div>
                </div>
                <div class="col-md-3 mt-2">
                    <div class="form-group">
                      <label>{{$t('modal.reports.feeReports.campus')}}<span style="color:red"> *</span></label>
                      <select-ex :options="campusCityList" keyValue="campusId" displayValue="campusName" v-model="campusId"
                        groupBy="cityName" @input="loadPrograms()">
                      </select-ex>
                    </div>
                  </div>

                  <div class="col-md-3">
                    <div class="form-group">
                      <div class="row">
                        <div class="col-md-8">
                          <label>{{$t('modal.reports.feeReports.program')}}</label>
                        </div>
                        <div class="col-md-4 text-right">
                          <span class="kt-switch kt-switch--sm kt-switch--icon">
                            <label class="m-0">
                              <input type="checkbox" checked="checked" 
                                v-model="checkprogram" @change="checkmate()">
                              <span></span>
                            </label>
                          </span>
                        </div>
                      </div>
                      <select-ex :options="programList" keyValue="programId" displayValue="programName" v-model="programId"
                        @input="loadProgramsOfCampus()" :disabled="!checkprogram">
                      </select-ex>
                    </div>
                  </div>

                  <div class="col-md-3">
                    <div class="form-group">
                      <div class="row">
                        <div class="col-md-8">
                          <label>{{$t('modal.reports.feeReports.programDetail')}}</label>
                        </div>
                        <div class="col-md-4 text-right">
                          <span class="kt-switch kt-switch--sm kt-switch--icon">
                            <label class="m-0">
                              <input type="checkbox" checked="checked" 
                                v-model="checkprogram" @change="checkmate()">
                              <span></span>
                            </label>
                          </span>
                        </div>
                      </div>
                      <select-ex :options="campusProgramLinkList" keyValue="programDetailId" displayValue="description"
                        v-model="programDetailId" :disabled="!checkprogram"
                        groupBy="programName"  @input="CookTag()">
                      </select-ex>
                    </div>
                  </div>



            </div>


            <div class="row">
            <div class="col-md-3">
                <div class="form-group">
                  <div class="row">
                    <div class="col-md-8">
                      <label>{{$t('modal.reports.feeReports.class')}}</label>
                    </div>
                    <div class="col-md-4 text-right">
                      <span class="kt-switch kt-switch--sm kt-switch--icon">
                        <label class="m-0">
                          <input type="checkbox" checked="checked" 
                            v-model="checkclass" @change="checkmate()">
                          <span></span>
                        </label>
                      </span>
                    </div>
                  </div>
                  <select-ex :options="classList" keyValue="classId" displayValue="fullName" v-model="classId"
                    @input="loadSection()" :disabled="!checkclass">
                  </select-ex>
                </div>
              </div>


              <div class="col-md-3">
                <div class="form-group">
                  <div class="row">
                    <div class="col-md-8">
                      <label>{{$t('modal.reports.feeReports.section')}}</label>
                    </div>
                    <div class="col-md-4 text-right">
                      <span class="kt-switch kt-switch--sm kt-switch--icon">
                        <label class="m-0">
                          <input type="checkbox" checked="checked" 
                            v-model="checksection" @change="checkmate()">
                          <span></span>
                        </label>
                      </span>
                    </div>
                  </div>
                  <select-ex :options="sectionList" keyValue="sectionId" displayValue="sectionName" v-model="sectionId"
                     :disabled="!checksection" @input="CookTag()">
                  </select-ex>
                </div>
              </div>


            </div>

            <div class="row">

                <div class="col-md-12">
                    <div class="form-group">
                        <label>Tag</label>
                        <input  class="form-control form-control-sm"
                            v-model="tag" disabled></input>
                        <!-- <label>Note : Message Should be less than 480 Characters</label> -->
                    </div>
                </div>
            </div>
          
                    
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group validated">
                                    <label class="form-control-label">Hub</label>
                                    <select-ex :options="tempdepartmentlist" keyValue="hub" displayValue="hub"
                                        v-model.trim="hubmodel">
                                    </select-ex>
                                </div>
                            </div>


                          

                            <div class="col-md-8">
                                <div class="form-group">
                                    <label>Title</label>
                                    <input  class="form-control form-control-sm"
                                        v-model="title"></input>
                                    <!-- <label>Note : Message Should be less than 480 Characters</label> -->
                                </div>
                            </div>
                        </div>

              
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group">
                                    <label>{{$t('modal.customSms.message')}}</label>
                                    <textarea  class="form-control form-control-sm" rows="5"
                                        v-model="messageText"></textarea>
                                    <!-- <label>Note : Message Should be less than 480 Characters</label> -->
                                </div>
                            </div>
                        </div>

                        <div class="modal-footer">
                            <div class="row text-right">
                                <div class="col-md-12 text-right">
                                 
                                    <button class="btn btn-light btn-hover btn-sm btn-primary" @click="saveModel" :disabled="CheckValidate()" ><i
                                            class="la la-floppy-o"></i> Send</button>
                                </div>
                            </div>
                        </div>
                    


        </template>
    </portlet-area>
</page-area>
