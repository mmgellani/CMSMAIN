<section class="notifications card navbar-notifications">
    <header class="cardHeader card-header">
        <div class="text-center mb-sm">
            <strong>You have 13 notifications</strong>
        </div>
        <div class="btn-group" role="group" aria-label="Notifications" id="notification-b-buttons">
            <button type="button" class="btn btn-secondary" @click="changeNotificationsTab(1)">Notifications</button>
            <button type="button" class="btn btn-secondary" @click="changeNotificationsTab(2)">Messages</button>
            <button type="button" class="btn btn-secondary" @click="changeNotificationsTab(3)">Progress</button>
        </div>
    </header>
    <Messages v-if="notificationsTabSelected === 2" />
    <Progress v-else-if="notificationsTabSelected === 3" />

    <footer class="cardFooter text-sm card-footer">
        <span class="fs-mini">Synced at: 21 Apr 2014 18:36</span>
        <button @click="loadNotifications"
            :class="{disabled: isLoad, 'btnNotificationsReload btn-xs float-right py-0': true}">
            <span v-if="isLoad">
                <i class="la la-refresh la-spin" /> Loading...
            </span>
            <i v-else class="la la-refresh" />
        </button>
    </footer>
</section>
